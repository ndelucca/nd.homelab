---
# Lint estático de Ansible en cada push / PR. Corre en el CI (no en la PC local, que es lenta):
# yamllint + ansible-lint con la config ya versionada (.yamllint, .ansible-lint perfil moderate).
# No necesita el vault: los linters parsean la estructura, no desencriptan valores !vault.
name: lint

'on':
  push:
    branches: ['**']
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters and collections
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint
          ansible-galaxy collection install -r requirements.yml

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint
