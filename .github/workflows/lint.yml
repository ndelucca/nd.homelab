---
# Lint estático de Ansible en cada push / PR. Corre en el CI (no en la PC local, que es lenta):
# yamllint + ansible-lint con la config ya versionada (.yamllint, .ansible-lint perfil moderate).
# No necesita el vault: los linters parsean la estructura, no desencriptan valores !vault.
name: lint

'on':
  push:
    branches: ['**']
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters and collections
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint
          ansible-galaxy collection install -r requirements.yml

      - name: yamllint
        run: yamllint .

      # ansible-lint corre `ansible-playbook --syntax-check`, que carga los group_vars
      # con valores !vault. ansible.cfg apunta vault_password_file a .vault_pass (gitignoreado,
      # ausente en CI) y sin ese archivo el syntax-check aborta. El syntax-check NO descifra los
      # valores —solo se necesita que el archivo exista—, así que un password dummy alcanza.
      - name: Provide a dummy vault password (syntax-check no descifra valores)
        run: echo dummy > .vault_pass

      - name: ansible-lint
        run: ansible-lint
