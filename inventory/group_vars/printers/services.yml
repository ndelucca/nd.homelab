---
# Configuración no secreta del grupo printers (Raspberry Pi con MainsailOS).
#
# La Pi emite y sirve su PROPIO cert TLS real vía DNS-01 (roles/acme +
# roles/mainsail_tls). DNS-01 no necesita acceso entrante ni ayuda del servidor,
# así que la Pi se auto-renueva de forma independiente. El token de deSEC es
# compartido y vive en group_vars/all/vault.yml.

# Hostname público de la UI de la impresora (resuelto a .12 internamente por
# AdGuard, en línea con el cert de nombre único emitido abajo). Derivado de
# base_domain.
printer_tls_domain: "printer.{{ base_domain }}"

acme_enabled: true
acme_email: ndelucca@protonmail.com
acme_desec_token: "{{ vault_desec_token }}"
acme_data_dir: /etc/ssl/mainsail
acme_reload_service: nginx
acme_manage_selinux: false       # Debian (MainsailOS) no tiene SELinux
acme_certificates:
  - name: "{{ printer_tls_domain }}"
    domains:
      - "{{ printer_tls_domain }}"

mainsail_tls_domain: "{{ printer_tls_domain }}"
