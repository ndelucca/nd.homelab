---
# ============================================================================
# Non-secret configuration for the homeservers group.
# ----------------------------------------------------------------------------
# Everything here is group-level config for the home server (network, DNS/DHCP,
# reverse proxy and per-app settings). Secrets live next to this file in
# vault.yml; the disk layout lives in storage.yml.
# ============================================================================

# --- Firewall ---------------------------------------------------------------
# The firewall role auto-detects the LAN interface's zone; see roles/firewall.
firewall_enabled: true

# --- AdGuard Home (DNS + DHCP for the LAN) ----------------------------------
adguard_configure_app: true

# Allowed domains (whitelist rules).
adguard_user_rules:
  - "@@||events.launchdarkly.com^"
  - "@@||clientstream.launchdarkly.com^"
  - "@@||analytics.google.com^"
  - "@@||www.google-analytics.com^"
  - "@@||api.amplitude.com^"

# DHCP configuration.
adguard_dhcp_enabled: true
adguard_dhcp_interface_name: enp6s0
adguard_dhcp_local_domain: lan
adguard_dhcp_gateway_ip: 192.168.10.1
adguard_dhcp_subnet_mask: 255.255.255.0
adguard_dhcp_range_start: 192.168.10.100
adguard_dhcp_range_end: 192.168.10.200
adguard_dhcp_lease_duration: 86400

# DHCP static leases.
adguard_dhcp_static_leases:
  - ip: 192.168.10.10
    hostname: ndelucca-server
    mac: "4c:cc:6a:d3:fc:a1"
  - ip: 192.168.10.11
    hostname: ndelucca-raspberry-printer
    mac: "b8:27:eb:f1:af:50"
  - ip: 192.168.10.12
    hostname: ndelucca-raspberry-printer-wireless
    mac: "b8:27:eb:a4:fa:05"
  - ip: 192.168.10.13
    hostname: ndelucca-acer
    mac: "fa:da:6d:73:ff:15"
  - ip: 192.168.10.20
    hostname: ndelucca-tv-tcl
    mac: "48:9e:9d:8f:65:20"
  - ip: 192.168.10.21
    hostname: ndelucca-pixel-8-5ghz
    mac: "1e:9c:15:ee:48:26"
  - ip: 192.168.10.22
    hostname: ndelucca-pixel-8-2.4ghz
    mac: "ca:61:9f:ce:53:ce"

# Local DNS rewrites. The real public domain (ndelucca.dedyn.io, hosted at deSEC)
# is resolved *internally* by AdGuard to LAN IPs; the matching wildcard TLS cert
# is issued out-of-band via DNS-01 (roles/acme), so browsers see a trusted cert
# while nothing is exposed to the internet.
adguard_dns_rewrites:
  # Server apps — reverse-proxied by NGINX on .10 (wildcard *.{{ nginx_domain }}).
  - domain: "{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "adguard.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "torrent.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "files.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "jellyfin.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "cockpit.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "gallery.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "books.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "slicer.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "home.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "market.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "git.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "status.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  # Raspberry printer (.12) — serves its OWN TLS cert (printer.{{ nginx_domain }}).
  - domain: "printer.{{ nginx_domain }}"
    answer: 192.168.10.12
    enabled: true
  # Acer client alias — no web service, no cert (kept as-is).
  - domain: ndelucca-acer.com
    answer: 192.168.10.13
    enabled: true

# --- NGINX reverse proxy ----------------------------------------------------
nginx_firewall_enabled: true
# Derived from base_domain (group_vars/all/main.yml); drives every vhost
# server_name and the wildcard cert.
nginx_domain: "{{ base_domain }}"

# --- TLS mode (real Let's Encrypt cert vs self-signed fallback) --------------
# letsencrypt = trusted wildcard issued by the acme role (default).
# selfsigned  = manual fallback if issuance ever fails: set this, re-run
#               `--tags nginx`, and NGINX serves the self-signed cert that the
#               nginx role always keeps as a bootstrap floor. No downtime.
nginx_tls_mode: letsencrypt

# Self-signed bootstrap floor (always generated by the nginx role).
nginx_selfsigned_cert: /etc/pki/nginx/server.crt
nginx_selfsigned_key: /etc/pki/nginx/server.key

# Wildcard cert issued by lego (roles/acme) — see acme_certificates below.
acme_cert_fullchain: "{{ acme_data_dir }}/certificates/{{ nginx_domain }}.crt"
acme_cert_key: "{{ acme_data_dir }}/certificates/{{ nginx_domain }}.key"

# Cert actually consumed by every vhost (server_name uses {{ nginx_domain }}).
nginx_ssl_certificate: "{{ acme_cert_fullchain if nginx_tls_mode == 'letsencrypt' else nginx_selfsigned_cert }}"
nginx_ssl_certificate_key: "{{ acme_cert_key if nginx_tls_mode == 'letsencrypt' else nginx_selfsigned_key }}"

# --- ACME / Let's Encrypt (roles/acme) --------------------------------------
acme_enabled: "{{ nginx_tls_mode == 'letsencrypt' }}"
acme_email: ndelucca@protonmail.com
acme_desec_token: "{{ vault_desec_token }}"
acme_data_dir: /etc/pki/nginx/lego
acme_reload_service: nginx
# Wildcard covers every app subdomain; apex listed first so lego names the file
# {{ nginx_domain }}.crt (matches acme_cert_fullchain above).
acme_certificates:
  - name: "{{ nginx_domain }}"
    domains:
      - "{{ nginx_domain }}"
      - "*.{{ nginx_domain }}"

# --- FileBrowser ------------------------------------------------------------
filebrowser_port: 8080
filebrowser_firewall_zone: FedoraServer
filebrowser_root_dir: /srv/disks

# --- Immich -----------------------------------------------------------------
immich_upload_location: "{{ app_media_root }}/Gallery"

# --- Kavita -----------------------------------------------------------------
kavita_extra_libraries:
  - name: books
    path: "{{ app_media_root }}/Books"

# --- Forgejo pull mirrors ---------------------------------------------------
# Forgejo mirrors all GitHub repos (GitHub = source of truth). The PAT lives in
# vault.yml as forgejo_github_token. Add repo names below for a one-time
# delete+recreate as a mirror, then empty the list again.
forgejo_pull_mirror_enabled: true
forgejo_mirror_force_recreate: []

# --- Failure alerting (ntfy) ------------------------------------------------
# One ntfy topic drives ALL failure pushes: backup failures / disk-full
# (journalctl -t restic-backup) AND Let's Encrypt renewal failures
# (journalctl -t lego-renew; acme_notify_ntfy_url defaults to this var). Leave
# commented to rely on the journal alerts only. To enable phone pushes, set it
# to your private topic URL:
# backup_notify_ntfy_url: "https://ntfy.sh/your-private-topic"
