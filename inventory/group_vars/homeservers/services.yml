---
# Configuración no secreta del grupo homeservers: ajustes de red, DNS/DHCP,
# reverse proxy y configuración por aplicación. Los secretos viven junto a este
# archivo en vault.yml; el layout de discos vive en storage.yml.

# El rol firewall autodetecta la zona de la interfaz LAN; ver roles/firewall.
firewall_enabled: true

adguard_configure_app: true

# Dominios permitidos (reglas de whitelist).
adguard_user_rules:
  - "@@||events.launchdarkly.com^"
  - "@@||clientstream.launchdarkly.com^"
  - "@@||analytics.google.com^"
  - "@@||www.google-analytics.com^"
  - "@@||api.amplitude.com^"

adguard_dhcp_enabled: true
adguard_dhcp_interface_name: enp6s0
adguard_dhcp_local_domain: lan
adguard_dhcp_gateway_ip: 192.168.10.1
adguard_dhcp_subnet_mask: 255.255.255.0
adguard_dhcp_range_start: 192.168.10.100
adguard_dhcp_range_end: 192.168.10.200
adguard_dhcp_lease_duration: 86400

adguard_dhcp_static_leases:
  - ip: 192.168.10.10
    hostname: ndelucca-server
    mac: "4c:cc:6a:d3:fc:a1"
  # La impresora Raspberry tiene dos NICs, dos reservas. Hoy se accede por WiFi
  # (.12): ansible_host (inventory/hosts.yml) y el rewrite DNS printer.<domain>
  # apuntan ambos a .12. La reserva ethernet .11 está inactiva (cable caído). Si
  # vuelve el ethernet, mover juntos ansible_host y el rewrite printer. a .11 para
  # que el nombre canónico y la IP en uso sigan sincronizados.
  - ip: 192.168.10.11
    hostname: ndelucca-raspberry-printer            # ethernet (inactivo)
    mac: "b8:27:eb:f1:af:50"
  - ip: 192.168.10.12
    hostname: ndelucca-raspberry-printer-wireless   # WiFi — ruta activa (printer. -> .12)
    mac: "b8:27:eb:a4:fa:05"
  - ip: 192.168.10.13
    hostname: ndelucca-acer
    mac: "fa:da:6d:73:ff:15"
  - ip: 192.168.10.20
    hostname: ndelucca-tv-tcl
    mac: "48:9e:9d:8f:65:20"
  - ip: 192.168.10.21
    hostname: ndelucca-pixel-8-5ghz
    mac: "1e:9c:15:ee:48:26"
  - ip: 192.168.10.22
    hostname: ndelucca-pixel-8-2.4ghz
    mac: "ca:61:9f:ce:53:ce"

# Rewrites DNS locales. El dominio público real (ndelucca.dedyn.io, alojado en
# deSEC) se resuelve *internamente* a IPs de la LAN vía AdGuard; el wildcard TLS
# correspondiente se emite fuera de banda con DNS-01 (roles/acme), así el browser
# ve un cert confiable sin exponer nada a internet.
adguard_dns_rewrites:
  # Apps del servidor — reverse-proxy de NGINX en .10 (wildcard *.{{ nginx_domain }}).
  - domain: "{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "adguard.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "torrent.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "files.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "jellyfin.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "cockpit.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "gallery.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "books.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "slicer.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "home.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "git.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  - domain: "status.{{ nginx_domain }}"
    answer: 192.168.10.10
    enabled: true
  # Impresora Raspberry (.12) — sirve su PROPIO cert TLS (printer.{{ nginx_domain }}).
  - domain: "printer.{{ nginx_domain }}"
    answer: 192.168.10.12
    enabled: true
  # Alias del cliente Acer — sin servicio web ni cert (se deja como está).
  - domain: ndelucca-acer.com
    answer: 192.168.10.13
    enabled: true

nginx_firewall_enabled: true
# Derivado de base_domain (group_vars/all/main.yml); define el server_name de
# cada vhost y el cert wildcard.
nginx_domain: "{{ base_domain }}"

# Modo TLS: letsencrypt = wildcard confiable emitido por el rol acme (default).
# selfsigned = fallback manual si la emisión falla alguna vez: setear esto,
# re-correr `--tags nginx` y NGINX sirve el cert self-signed que el rol nginx
# siempre mantiene como piso de bootstrap. Sin downtime.
nginx_tls_mode: letsencrypt

# Piso de bootstrap self-signed (siempre lo genera el rol nginx).
nginx_selfsigned_cert: /etc/pki/nginx/server.crt
nginx_selfsigned_key: /etc/pki/nginx/server.key

# Cert wildcard emitido por lego (roles/acme) — ver acme_certificates abajo.
acme_cert_fullchain: "{{ acme_data_dir }}/certificates/{{ nginx_domain }}.crt"
acme_cert_key: "{{ acme_data_dir }}/certificates/{{ nginx_domain }}.key"

# Cert que realmente consume cada vhost (server_name usa {{ nginx_domain }}).
nginx_ssl_certificate: "{{ acme_cert_fullchain if nginx_tls_mode == 'letsencrypt' else nginx_selfsigned_cert }}"
nginx_ssl_certificate_key: "{{ acme_cert_key if nginx_tls_mode == 'letsencrypt' else nginx_selfsigned_key }}"

acme_enabled: "{{ nginx_tls_mode == 'letsencrypt' }}"
acme_email: ndelucca@protonmail.com
acme_desec_token: "{{ vault_desec_token }}"
acme_data_dir: /etc/pki/nginx/lego
acme_reload_service: nginx
# El wildcard cubre cada subdominio de app; el apex va primero para que lego
# nombre el archivo {{ nginx_domain }}.crt (coincide con acme_cert_fullchain).
acme_certificates:
  - name: "{{ nginx_domain }}"
    domains:
      - "{{ nginx_domain }}"
      - "*.{{ nginx_domain }}"

filebrowser_port: 8080
filebrowser_firewall_zone: FedoraServer
filebrowser_root_dir: /srv/disks

immich_upload_location: "{{ app_media_root }}/Gallery"

kavita_extra_libraries:
  - name: books
    path: "{{ app_media_root }}/Books"

# Forgejo espeja todos los repos de GitHub (GitHub = fuente de verdad). El PAT
# vive en vault.yml como forgejo_github_token. Agregar nombres de repos abajo
# para un delete+recreate único como mirror, luego vaciar la lista otra vez.
forgejo_pull_mirror_enabled: true
forgejo_mirror_force_recreate: []

# --- Forgejo Actions (CI/CD: build + deploy en el propio server) ---
# Todo es reproducible desde el repo: los secrets de Actions se guardan vaulteados acá y el
# rol forgejo_runner los EMPUJA a Forgejo (nivel usuario) en cada corrida (tasks/secrets.yml).
# Fuente de verdad = el repo; no se toca la API a mano.
#
# Piezas:
#   - deploy_ssh_public_key: clave pública de deploy (texto plano, abajo) -> authorized_keys.
#   - deploy_ssh_private_key: clave privada (VAULTEADA en homeservers/vault.yml) -> el rol la
#     empuja como secret DEPLOY_SSH_KEY. El par ya está generado y vaulteado.
#   - vault_forgejo_api_token: token de acceso de Forgejo (scopes write:repository +
#     write:package + write:user) -> el rol lo empuja como secret REGISTRY_TOKEN (login/push al
#     registry) y el skill add-home-app lo usa para crear repos (write:user es necesario para
#     POST /user/repos). Ya creado y vaulteado en all/vault.yml.
forgejo_runner_enabled: true
deploy_ssh_enabled: true
# Clave PÚBLICA de deploy (texto plano; la privada va vaulteada como deploy_ssh_private_key).
deploy_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBx691wmrkN4IhLBzmqIrkxZS8r5/e8JVna74MyVxLT9 home-deploy"

# Un único topic de ntfy maneja TODOS los avisos de falla: fallas de backup /
# disco lleno (journalctl -t restic-backup) Y fallas de renovación de Let's
# Encrypt (journalctl -t lego-renew; acme_notify_ntfy_url toma este valor por
# defecto). Dejar comentado para depender solo de los avisos del journal. Para
# habilitar los push al teléfono, setearlo a la URL de tu topic privado:
# backup_notify_ntfy_url: "https://ntfy.sh/your-private-topic"
