---
# Configuración centralizada de almacenamiento: única fuente de verdad de los discos.
#
# Filosofía:
#   * root (xfs) contiene SOLO el SO. Es 100% reproducible desde este playbook,
#     así que una falla de root/motherboard se recupera reinstalando Fedora y
#     re-corriendo el playbook.
#   * D-Draco (NVMe) es EL disco de datos de apps: el ESTADO de cada app (bases
#     de datos, configs, caches) vive bajo {{ app_data_root }} y su MEDIA bajo
#     {{ app_media_root }}. Como los datos irremplazables viven acá (no en root),
#     sobreviven a una reinstalación del SO — re-correr el playbook devuelve las
#     apps con sus datos.
#   * D-Leo contiene el archivo personal (se navega solo vía Filebrowser; ninguna
#     app le escribe).
#   * D-Ursa es el destino de backup (ver el diseño de backup, fase 2).
#
# Los discos se direccionan por UUID del FILESYSTEM, que vive en el superblock del
# disco y por lo tanto sobrevive a un cambio de motherboard/SO. Nunca direccionarlos
# por /dev/sdX — esos nombres son inestables entre hardware y arranques.
#
# Excepción: AdGuard Home (DNS/DHCP de toda la LAN) se queda deliberadamente en root
# (/opt/AdGuardHome). Su config es totalmente reproducible desde este playbook, y
# tenerlo fuera del disco de datos hace que el DNS de la LAN sobreviva a una falla
# de montaje de D-Draco.

storage_disks:
  - name: D-Draco
    uuid: be7615af-92fe-40e7-9989-4b58c0ab4e1f
    mount: /srv/disks/D-Draco
    fstype: ext4
    role: appdata
  - name: D-Leo
    uuid: ced8adab-8745-4c2f-b1b5-2a02ed02c12e
    mount: /srv/disks/D-Leo
    fstype: ext4
    role: personal
  - name: D-Ursa
    uuid: aabf1b5e-2bf1-41f4-ab93-bc27d508fc05
    mount: /srv/disks/D-Ursa
    fstype: ext4
    role: backup

# Roles semánticos de disco — los roles referencian ESTOS, nunca rutas de montaje
# crudas ni /dev.
storage_appdata_disk: /srv/disks/D-Draco
storage_personal_disk: /srv/disks/D-Leo
storage_backup_disk: /srv/disks/D-Ursa

# Directorios base sobre los que se apoya cada app (ambos en el disco de datos).
app_data_root: "{{ storage_appdata_disk }}/appdata"   # ESTADO de las apps: DBs, configs, caches
app_media_root: "{{ storage_appdata_disk }}/media"    # MEDIA de las apps: Movies, Series, Gallery, Books

# Propietario de todo lo que cuelga del disco de datos (el usuario rootless/de
# servicio). El uid/gid están fijados para que el Podman rootless (UserNS=keep-id)
# y la propiedad de archivos sigan siendo válidos tras una reinstalación del SO.
app_storage_user: ndelucca
app_storage_group: ndelucca
app_storage_uid: 1000
app_storage_gid: 1000
