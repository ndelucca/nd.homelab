---
# Secretos compartidos por TODOS los hosts (Ansible Vault, AES256).
#
# vault_desec_token es el token de la API de deSEC que usa roles/acme para el
# challenge ACME DNS-01. Tanto el servidor Fedora como la impresora MainsailOS
# emiten sus propios certs con él, por eso vive acá y no en un solo grupo.
# Re-encriptar con:
#   ansible-vault encrypt_string --name vault_desec_token '<token>'
# Opción de hardening: reemplazarlo por un token de deSEC acotado solo a los
# subdominios que cada host necesita (ver docs/TLS-AND-DNS.md).
vault_desec_token: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          31383938356266346538633034623463383162626437643261626264633565323630303234666431
          3535626265363439393466353337613761383465316636610a626363373865303261613736373931
          62336461366233316339333966646538393233303465393138323735373566313465343135306634
          3763323838346433340a323038666663393564643762376238353730636133626337646365393062
          32333834313261386338383233336533326238626439333463363864396131613134
