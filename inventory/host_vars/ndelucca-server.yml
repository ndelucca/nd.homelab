# Forgejo pull mirrors: Forgejo mirrors all GitHub repos (GitHub = source of
# truth). Provide the GitHub PAT (classic scope 'repo', or fine-grained
# Contents+Metadata read) encrypted with:
#   ansible-vault encrypt_string --name forgejo_github_token '<PAT>'
# then paste the resulting block below and flip forgejo_pull_mirror_enabled to true.
forgejo_pull_mirror_enabled: true
# Add repo names here for a one-time delete+recreate as a mirror, then empty it.
forgejo_mirror_force_recreate: []
forgejo_github_token: !vault |
