---
# Sin overrides específicos de host para ndelucca-server.
#
# Este host es el único miembro del grupo `homeservers`, así que toda su config
# vive ahora en inventory/group_vars/homeservers/:
#   - storage.yml   layout de discos (única fuente de verdad)
#   - services.yml  red / DNS / DHCP / reverse proxy / config por app
#   - vault.yml     secretos (Ansible Vault)
#
# Poner ajustes acá solo si deben diferir de los defaults del grupo.
