# No host-specific overrides for ndelucca-server.
#
# This host is the only member of the `homeservers` group, so all of its config
# now lives in inventory/group_vars/homeservers/:
#   - storage.yml   disk layout (single source of truth)
#   - services.yml  network / DNS / DHCP / reverse proxy / per-app config
#   - vault.yml     secrets (Ansible Vault)
#
# Put settings here only if they must differ from the group defaults.
