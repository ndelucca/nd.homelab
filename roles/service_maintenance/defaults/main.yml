---
# Corrige el DHCP de AdGuard que no funciona tras un corte de luz / cold boot.
#
# Enfoque en dos frentes:
# 1. Drop-in de AdGuard: espera a la red antes de arrancar y se reinicia ante fallos.
# 2. Timer post-boot: reinicia AdGuard una vez tras el boot como red de seguridad.

service_maintenance_enabled: true

# Cuánto esperar tras el boot antes de reiniciar servicios (le da tiempo al router a levantar).
service_maintenance_boot_delay: 2min

service_maintenance_restart_services:
  - AdGuardHome

# Probe de salud del DNS: un nombre que AdGuard está configurado para resolver con
# respuesta (el rewrite del apex -> IP LAN del server). El watchdog lo consulta y
# exige una respuesta no vacía, así un AdGuard trabado-pero-escuchando (responde
# NXDOMAIN/REFUSED) se detecta como no saludable, a diferencia de consultar un
# nombre inexistente donde cualquier respuesta cuenta como "arriba". Setear en ''
# para omitir el probe de DNS y chequear solo el estado activo de la unit.
service_maintenance_dns_probe_name: "{{ base_domain | default('') }}"

# Gate de readiness acotado antes de que AdGuard arranque: pinguea el gateway de la
# LAN hasta N veces (1s cada una), avanzando apenas responde. Reemplaza un sleep
# ciego fijo. El gateway toma por defecto el del DHCP de AdGuard si está definido.
service_maintenance_gateway_ip: "{{ adguard_dhcp_gateway_ip | default('192.168.10.1') }}"
service_maintenance_network_wait_tries: 30
# Retardo antes del auto-reinicio ante fallos (segundos).
service_maintenance_adguard_restart_delay: 30

service_maintenance_unit_name: service-watchdog
service_maintenance_unit_description: "Post-boot service watchdog"
