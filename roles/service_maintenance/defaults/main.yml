---
# Default variables for service maintenance role
# Fixes AdGuard DHCP not working after power outage / cold boot
#
# Two-pronged approach:
# 1. AdGuard drop-in: Wait for network before starting, auto-restart on failure
# 2. Post-boot timer: Restart AdGuard once after boot as safety net

# Enable the post-boot watchdog timer
service_maintenance_enabled: true

# How long after boot to restart services (gives router time to come up)
service_maintenance_boot_delay: 2min

# Services to restart after boot
service_maintenance_restart_services:
  - AdGuardHome

# DNS health probe: a name AdGuard is configured to resolve to an answer (the
# apex rewrite -> the server's LAN IP). The watchdog queries this and requires a
# non-empty answer, so a wedged-but-listening AdGuard (answers NXDOMAIN/REFUSED)
# is detected as unhealthy — unlike querying a bogus name, where any reply counts
# as "up". Set to '' to skip the DNS probe and check only the unit's active state.
service_maintenance_dns_probe_name: "{{ base_domain | default('') }}"

# AdGuard drop-in configuration
# Bounded readiness gate before AdGuard starts: ping the LAN gateway up to N
# times (1s each), proceeding as soon as it answers. Replaces a fixed blind
# sleep. Gateway defaults to the AdGuard DHCP gateway if defined.
service_maintenance_gateway_ip: "{{ adguard_dhcp_gateway_ip | default('192.168.10.1') }}"
service_maintenance_network_wait_tries: 30
# Delay before auto-restart on failure (seconds)
service_maintenance_adguard_restart_delay: 30

# Systemd unit configuration
service_maintenance_unit_name: service-watchdog
service_maintenance_unit_description: "Post-boot service watchdog"
