---
- name: Verify we're running on Fedora
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] == "Fedora"
    fail_msg: "This role is designed for Fedora systems"
    success_msg: "Running on Fedora {{ ansible_facts['distribution_version'] }}"

- name: Ensure required packages are installed
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name:
      - curl
      - tar
      - libcap  # para el comando setcap
    state: present
  become: true

- name: Check if AdGuard Home is already installed
  ansible.builtin.stat:
    path: "{{ adguard_install_dir }}/AdGuardHome"
  register: adguard_binary

- name: Display installation status
  ansible.builtin.debug:
    msg: "AdGuard Home {{ 'is already installed' if adguard_binary.stat.exists else 'will be installed' }}"

- name: Check if DNS port is available
  ansible.builtin.shell: |
    ss -tulnp | grep -q ":{{ adguard_dns_port }}\s" && echo "occupied" || echo "available"
  register: adguard_port_check
  changed_when: false
  failed_when: false

- name: Display DNS port status
  ansible.builtin.debug:
    msg: "Port {{ adguard_dns_port }} is {{ adguard_port_check.stdout }}"

- name: Create working directory for AdGuard Home
  ansible.builtin.file:
    path: "{{ adguard_working_dir }}"
    state: directory
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    mode: '0755'
  become: true
