---
- name: Display SELinux status
  ansible.builtin.debug:
    msg: "SELinux is {{ ansible_facts['selinux'].mode | default('disabled') }}"

- name: Install SELinux policy packages
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
    state: present
  become: true
  when: ansible_facts['selinux'].mode | default('') == 'enforcing'

- name: Set SELinux context for AdGuard Home binary
  community.general.sefcontext:
    target: "{{ adguard_install_dir }}/AdGuardHome"
    setype: bin_t
    state: present
  become: true
  when: ansible_facts['selinux'].mode | default('') == 'enforcing'

- name: Set SELinux context for AdGuard Home working directory
  community.general.sefcontext:
    target: "{{ adguard_working_dir }}(/.*)?"
    setype: var_lib_t
    state: present
  become: true
  when: ansible_facts['selinux'].mode | default('') == 'enforcing'

- name: Apply SELinux context to AdGuard Home binary
  ansible.builtin.command: "restorecon -v {{ adguard_install_dir }}/AdGuardHome"
  become: true
  when: ansible_facts['selinux'].mode | default('') == 'enforcing'
  changed_when: false

- name: Apply SELinux context to AdGuard Home working directory
  ansible.builtin.command: "restorecon -Rv {{ adguard_working_dir }}"
  become: true
  when: ansible_facts['selinux'].mode | default('') == 'enforcing'
  changed_when: false

# Nota: el bind al puerto 53 lo otorga CAP_NET_BIND_SERVICE (setcap en install.yml),
# así que no hace falta ningún boolean de SELinux. El viejo toggle nis_enabled era
# cargo-cult — es el boolean de NIS/ypbind y no tenía ningún efecto real sobre el bind del puerto.
