---
# Instala / actualiza AdGuard Home como binario nativo.
# Consciente de la versión e idempotente:
#   - adguard_version: latest   -> resuelve la release estable más nueva de GitHub
#     (las betas son pre-releases, así que se omiten) y se (re)instala solo cuando
#     difiere del binario instalado.
#   - adguard_version: vX.Y.Z   -> fija a esa release exacta.

- name: Get installed AdGuard Home version
  ansible.builtin.command: "{{ adguard_install_dir }}/AdGuardHome --version"
  register: adguard_installed_raw
  changed_when: false
  failed_when: false
  # Sonda read-only: DEBE correr también en --check. Si se saltea, la versión instalada queda
  # vacía, `adguard_needs_install` da true por falso positivo y el dry-run entra al camino de
  # instalación con los `uri` de abajo salteados (que sí son check-mode-aware), reventando en
  # `adguard_checksums.content`. Ese era el motivo de que `site.yml --check` fallara entero.
  check_mode: false
  when: adguard_binary.stat.exists

- name: Resolve latest AdGuard Home release from GitHub
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ adguard_github_repo }}/releases/latest"
    headers:
      Accept: application/vnd.github+json
  register: adguard_release_api
  failed_when: false
  check_mode: false  # GET read-only: sin esto el dry-run no puede resolver la versión target
  when: adguard_version == 'latest'

- name: Determine requested AdGuard Home version string
  ansible.builtin.set_fact:
    adguard_requested_version: "{{ adguard_version if adguard_version != 'latest' else (adguard_release_api.json.tag_name | default('')) }}"

- name: Normalize target and installed AdGuard Home versions
  ansible.builtin.set_fact:
    adguard_target_version: '{{ (adguard_requested_version | regex_search("[0-9]+\.[0-9]+\.[0-9]+")) | default("", true) }}'
    adguard_current_version: '{{ (adguard_installed_raw.stdout | default("") | regex_search("[0-9]+\.[0-9]+\.[0-9]+")) | default("", true) }}'

- name: Fail when no version could be resolved and nothing is installed
  ansible.builtin.fail:
    msg: >-
      Could not resolve an AdGuard Home version (GitHub API unreachable?) and no
      existing binary to fall back to.
  when:
    - adguard_target_version | length == 0
    - not adguard_binary.stat.exists

- name: Decide whether AdGuard Home needs (re)install
  ansible.builtin.set_fact:
    adguard_needs_install: "{{ (not adguard_binary.stat.exists) or (adguard_target_version | length > 0 and adguard_target_version != adguard_current_version) }}"

- name: Report AdGuard Home version decision
  ansible.builtin.debug:
    msg: >-
      AdGuard Home installed={{ adguard_current_version | default('none') }}
      target={{ adguard_target_version | default('unknown') }}
      -> {{ 'installing/updating' if adguard_needs_install else 'up to date' }}

- name: Create temporary download directory
  ansible.builtin.tempfile:
    state: directory
    suffix: _adguard_download
  register: adguard_download_dir
  when: adguard_needs_install

- name: Fetch AdGuard Home release checksums
  ansible.builtin.uri:
    url: "https://github.com/{{ adguard_github_repo }}/releases/download/v{{ adguard_target_version }}/checksums.txt"
    return_content: true
  register: adguard_checksums
  check_mode: false  # GET read-only: deja que el dry-run llegue hasta el download con el sha real
  when: adguard_needs_install

- name: Extract expected SHA256 for the AdGuard Home archive
  ansible.builtin.set_fact:
    adguard_archive_sha256: >-
      {{ (adguard_checksums.content.splitlines()
          | select('search', 'AdGuardHome_linux_amd64.tar.gz')
          | first).split() | first }}
  when: adguard_needs_install

- name: Download AdGuard Home archive
  ansible.builtin.get_url:
    url: "https://github.com/{{ adguard_github_repo }}/releases/download/v{{ adguard_target_version }}/AdGuardHome_linux_amd64.tar.gz"
    dest: "{{ adguard_download_dir.path }}/AdGuardHome.tar.gz"
    checksum: "sha256:{{ adguard_archive_sha256 }}"
    mode: '0644'
  when: adguard_needs_install and adguard_download_dir.path is defined

- name: Extract AdGuard Home archive
  ansible.builtin.unarchive:
    src: "{{ adguard_download_dir.path }}/AdGuardHome.tar.gz"
    dest: "{{ adguard_download_dir.path }}"
    remote_src: true
  when: adguard_needs_install and adguard_download_dir.path is defined

- name: Stop AdGuard Home service before replacing binary
  ansible.builtin.systemd:
    name: "{{ adguard_service_name }}"
    state: stopped
  become: true
  failed_when: false
  when: adguard_needs_install and adguard_binary.stat.exists

- name: Copy AdGuard Home binary to installation directory
  ansible.builtin.copy:
    src: "{{ adguard_download_dir.path }}/AdGuardHome/AdGuardHome"
    dest: "{{ adguard_install_dir }}/AdGuardHome"
    remote_src: true
    owner: root
    group: root
    mode: '0755'
  become: true
  notify: restart adguardhome
  when: adguard_needs_install and adguard_download_dir.path is defined

- name: Read current capabilities on AdGuard Home binary
  ansible.builtin.command: getcap {{ adguard_install_dir }}/AdGuardHome
  register: adguard_current_caps
  become: true
  changed_when: false
  failed_when: false
  check_mode: false  # solo lectura; debe correr para que el chequeo de capabilities funcione en --check
  when: adguard_set_capabilities | bool

# Idempotente: solo se (re)aplica cuando se acaba de instalar un binario nuevo (las
# caps se borran al reemplazarlo) o cuando falta alguna capability deseada. getcap
# imprime las caps en minúscula (ej. "<path> cap_net_bind_service,cap_net_raw=eip");
# extraemos los tokens cap_* y comparamos el CONJUNTO, así el formato de salida
# (=eip vs +eip, orden de las comas) no causa falsos "changed".
- name: Set capabilities on AdGuard Home binary
  ansible.builtin.command: >
    setcap '{{ adguard_capabilities | map("regex_replace", "^(.*)$", "\1=+eip") | join(" ") }}'
    {{ adguard_install_dir }}/AdGuardHome
  become: true
  when:
    - adguard_set_capabilities | bool
    - >-
      adguard_needs_install
      or ((adguard_capabilities | map('lower') | list) | difference(
            adguard_current_caps.stdout | default('') | regex_findall('cap_[a-z_]+')
          ) | length > 0)
  changed_when: true

- name: Install AdGuard Home as a systemd service
  ansible.builtin.command: >
    {{ adguard_install_dir }}/AdGuardHome -s install
    -w {{ adguard_working_dir }}
  become: true
  args:
    creates: /etc/systemd/system/{{ adguard_service_name }}.service
  notify:
    - Daemon-reload

- name: Override AdGuard Home service to run as ndelucca user
  ansible.builtin.lineinfile:
    path: /etc/systemd/system/{{ adguard_service_name }}.service
    regexp: '^User='
    line: 'User={{ adguard_user }}'
    insertafter: '^\[Service\]'
  become: true
  notify: Daemon-reload

- name: Override AdGuard Home service group
  ansible.builtin.lineinfile:
    path: /etc/systemd/system/{{ adguard_service_name }}.service
    regexp: '^Group='
    line: 'Group={{ adguard_group }}'
    insertafter: '^User='
  become: true
  notify: Daemon-reload

- name: Set ownership of working directory
  ansible.builtin.file:
    path: "{{ adguard_working_dir }}"
    state: directory
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    recurse: true
  become: true

- name: Clean up temporary download directory
  ansible.builtin.file:
    path: "{{ adguard_download_dir.path }}"
    state: absent
  when: adguard_download_dir is defined and adguard_download_dir.path is defined

- name: Display installation information
  ansible.builtin.debug:
    msg: |
      AdGuard Home is installed (version {{ adguard_target_version | default(adguard_current_version) }}).

      Binary location: {{ adguard_install_dir }}/AdGuardHome
      Working directory: {{ adguard_working_dir }}
      Service name: {{ adguard_service_name }}

      Initial setup: http://{{ ansible_facts['default_ipv4'].address }}:{{ adguard_bind_port }}
