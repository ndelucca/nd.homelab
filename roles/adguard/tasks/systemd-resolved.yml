---
# Resuelve los conflictos de systemd-resolved en el puerto 53.
# Basado en: https://github.com/AdguardTeam/AdGuardHome/wiki/FAQ

- name: Create systemd-resolved configuration directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Configure systemd-resolved to disable DNSStubListener
  ansible.builtin.template:
    src: resolved.conf.j2
    dest: /etc/systemd/resolved.conf.d/adguardhome.conf
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Reload systemd-resolved

- name: Backup original resolv.conf
  ansible.builtin.copy:
    src: /etc/resolv.conf
    dest: /etc/resolv.conf.backup
    remote_src: true
    force: false
  become: true

# `state: link` + `force: true` es idempotente: solo reescribe /etc/resolv.conf
# cuando todavía no es el symlink correcto (reemplazando un archivo regular o un
# link incorrecto según haga falta), así ya no genera churn / rompe la resolución en cada re-run.
- name: Link resolv.conf to systemd-resolved
  ansible.builtin.file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  become: true

- name: Flush handlers to reload systemd-resolved
  ansible.builtin.meta: flush_handlers

# Detecta quién ocupa el :53 ANTES de esperar a que se libere. La espera de abajo
# sólo tiene sentido en bootstrap (systemd-resolved tiene el puerto y AdGuard todavía
# no bindeó). En estado estable AdGuard ES quien escucha en `*:53`, así que el puerto
# nunca pasa a "stopped": sin este gate, wait_for agota los 30s de timeout y tira un
# `fatal ...ignoring` en cada re-run (falso positivo: "occupied" es el estado deseado).
- name: Check whether AdGuard Home already owns the DNS port
  ansible.builtin.shell: |
    set -o pipefail
    ss -tulnpH 'sport = :53' 2>/dev/null | grep -q AdGuardHome && echo owned || echo not-owned
  register: adguard_owns_port_53
  changed_when: false
  become: true

- name: Wait for systemd-resolved to release DNS port
  ansible.builtin.wait_for:
    port: 53
    state: stopped
    timeout: 30
  ignore_errors: true
  when: adguard_owns_port_53.stdout != 'owned'

- name: Verify DNS port is free
  ansible.builtin.shell: |
    ss -tulnp | grep -q ":53\s" && echo "occupied" || echo "free"
  register: adguard_port_53_check
  changed_when: false
  become: true

- name: Display DNS port status
  ansible.builtin.debug:
    msg: "Port 53 is {{ adguard_port_53_check.stdout }}"
