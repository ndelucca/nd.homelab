---
- name: Daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Restart adguardhome
  ansible.builtin.systemd:
    name: "{{ adguard_service_name }}"
    state: restarted
  become: true
  listen: restart adguardhome

- name: Reload systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: reloaded
  become: true

- name: Reload firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: reloaded
  become: true

- name: Wait for adguard
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 53
    timeout: 10
    msg: "AdGuard DNS did not come back up"
  listen: restart adguardhome

# NGINX NO se arranca acá a propósito. Arrancarlo es tarea del play de orquestación
# (site.yml post_tasks), que corre después de cada role — así el acoplamiento entre
# roles (y el ignore_errors que ocultaba un NGINX roto) vive en un único lugar
# explícito en vez de dispararse en cada reinicio de AdGuard.
