---
# Variables por defecto del role reutilizable de ACME (lego).
# Emite certificados TLS reales y públicamente confiables usando el challenge DNS-01
# de ACME contra deSEC. DNS-01 solo crea un registro TXT vía la API de deSEC, así que
# la CA nunca se conecta a este host -> sin puertos entrantes, nada expuesto a internet.

acme_enabled: true

# Contacto de la cuenta ACME (avisos de vencimiento de Let's Encrypt). Sobrescribir en group_vars.
acme_email: "ndelucca@protonmail.com"

# Proveedor de DNS para el challenge DNS-01. 'desec' es el id de proveedor de lego;
# lee el token de la API desde la variable de entorno DESEC_TOKEN.
acme_dns_provider: desec
# acme_desec_token: provisto vía vault, mapeado en group_vars (vault_desec_token).

# Resolvers que usa lego para determinar el apex/zona. Un resolver público limpio, NO
# el AdGuard local (127.0.0.1:53), que responde por la zona / cachea negativos.
acme_dns_resolvers: "1.1.1.1:53,8.8.8.8:53"

# Omite la espera de propagación de lego sobre resolvers *recursivos*. Ese chequeo
# consulta resolvers públicos (1.1.1.1, ...) que cachean el TXT _acme-challenge por
# el TTL del registro y devuelven valores viejos — lento (2 min/dominio) y poco
# confiable. El chequeo autoritativo contra los propios nameservers de deSEC queda
# activo y es fresco al instante, así la emisión es correcta y rápida. Es la
# configuración correcta para deSEC.
acme_dns_disable_rns: true

# Instalación del binario de lego. Consciente de la versión e idempotente, igual que el role adguard:
#   acme_version: latest    -> release estable más nueva de GitHub (se omiten las pre-releases)
#   acme_version: vX.Y.Z     -> fija a una release exacta.
acme_version: latest
acme_github_repo: go-acme/lego
acme_install_dir: /usr/local/bin
acme_lego_bin: "{{ acme_install_dir }}/lego"

# Dónde guarda lego el estado de la cuenta y los certificados (sobrescribir por grupo).
# Los certs quedan en {{ acme_data_dir }}/certificates/<name>.crt (+ .key).
acme_data_dir: /etc/ssl/lego

# Certificados que este host debe gestionar. Cada item:
#   name    -> dominio principal/primero; lego nombra los archivos <name>.crt / <name>.key
#   domains -> lista SAN completa (ej. apex + wildcard, o un único nombre)
acme_certificates: []

# Comportamiento de renovación.
acme_renew_days: 30                  # renueva cuando quedan menos de N días
acme_staging: false                  # true -> CA de staging de Let's Encrypt (no confiable, sin rate limits)
acme_reload_service: nginx           # servicio que se recarga tras la emisión/renovación

# Alerting de fallas. lego-renew.service dispara OnFailure=lego-renew-notify.service,
# que loguea en el journal (tag lego-renew) y, cuando hay una URL seteada, hace push a ntfy.
# Por defecto usa el topic de ntfy del role de backup, así un solo setting cubre todas las alertas.
acme_notify_script: "{{ acme_install_dir }}/acme-notify.sh"
acme_notify_ntfy_url: "{{ backup_notify_ntfy_url | default('') }}"

# SELinux (Fedora). Se omite automáticamente donde SELinux no está habilitado (ej. la Pi).
acme_manage_selinux: true
