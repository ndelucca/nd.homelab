---
# Renovación automática: un timer diario de systemd corre `lego renew` por cada
# certificado gestionado y recarga el servicio consumidor vía el --renew-hook de lego.

- name: Deploy deSEC credentials env file
  ansible.builtin.template:
    src: desec.env.j2
    dest: "{{ acme_data_dir }}/desec.env"
    owner: root
    group: root
    mode: '0600'
  become: true
  no_log: true

- name: Deploy the renewal-failure notify script
  ansible.builtin.template:
    src: acme-notify.sh.j2
    dest: "{{ acme_notify_script }}"
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Deploy lego renewal failure-notify unit
  ansible.builtin.template:
    src: lego-renew-notify.service.j2
    dest: /etc/systemd/system/lego-renew-notify.service
    owner: root
    group: root
    mode: '0644'
  become: true
  register: acme_renew_notify_unit

- name: Deploy lego renewal service unit
  ansible.builtin.template:
    src: lego-renew.service.j2
    dest: /etc/systemd/system/lego-renew.service
    owner: root
    group: root
    mode: '0644'
  become: true
  register: acme_renew_service_unit

- name: Deploy lego renewal timer unit
  ansible.builtin.template:
    src: lego-renew.timer.j2
    dest: /etc/systemd/system/lego-renew.timer
    owner: root
    group: root
    mode: '0644'
  become: true
  register: acme_renew_timer_unit

- name: Enable and start the lego renewal timer
  ansible.builtin.systemd:
    name: lego-renew.timer
    enabled: true
    state: started
    daemon_reload: "{{ (acme_renew_service_unit is changed) or (acme_renew_timer_unit is changed) or (acme_renew_notify_unit is changed) }}"
  become: true
