---
# El rol es data-driven: ABRE el puñado de puertos/servicios de cara a la LAN y
# CIERRA todo lo que debe quedar detrás de NGINX. Todas las reglas van a una sola
# zona, auto-detectada de la interfaz LAN activa (FedoraServer en Fedora Server),
# para que las reglas no caigan en una zona por la que el tráfico nunca pasa.

firewall_enabled: true

# Zona de fallback, usada solo si no se puede detectar la zona activa de la interfaz.
firewall_default_zone: FedoraServer

# Interfaz cuya zona apuntan todas las reglas (la misma NIC donde AdGuard sirve DHCP).
firewall_interface: "{{ adguard_dhcp_interface_name | default('enp6s0') }}"

# Puerto git-SSH del contenedor de Forgejo (el único puerto de app expuesto a propósito).
forgejo_firewall_enabled: true
forgejo_ssh_port: 2222

firewall_open_ports:
  - { port: "53/tcp", comment: "AdGuard DNS", when: "{{ adguard_firewall_enabled | default(true) | bool }}" }
  - { port: "53/udp", comment: "AdGuard DNS", when: "{{ adguard_firewall_enabled | default(true) | bool }}" }
  - { port: "80/tcp", comment: "NGINX HTTP", when: "{{ nginx_firewall_enabled | default(true) | bool }}" }
  - { port: "443/tcp", comment: "NGINX HTTPS", when: "{{ nginx_firewall_enabled | default(true) | bool }}" }
  - { port: "{{ forgejo_ssh_port }}/tcp", comment: "Forgejo git SSH", when: "{{ forgejo_firewall_enabled | default(true) | bool }}" }
  # Puerto de peers BitTorrent de Cloud Torrent — apagado por defecto (host solo en
  # LAN, sin forward en el router, así que no pueden llegar peers entrantes). Setear
  # cloud_torrent_open_peer_port y cloud_torrent_peer_port en services.yml para
  # exponerlos a este rol.
  - { port: "{{ cloud_torrent_peer_port | default(50007) }}/tcp", comment: "Cloud Torrent BitTorrent peers", when: "{{ cloud_torrent_open_peer_port | default(false) | bool }}" }
  - { port: "{{ cloud_torrent_peer_port | default(50007) }}/udp", comment: "Cloud Torrent BitTorrent peers (uTP)", when: "{{ cloud_torrent_open_peer_port | default(false) | bool }}" }

firewall_open_services:
  - { service: dhcp, comment: "AdGuard DHCP", when: "{{ adguard_dhcp_enabled | default(false) | bool }}" }

# Cockpit viene habilitado en la zona FedoraServer, así que hay que quitarlo
# explícitamente: la UI solo es accesible vía el vhost 443 de NGINX (el rol cockpit
# además bindea cockpit.socket a 127.0.0.1). 853 es la regla muerta de DoT/DoQ
# (AdGuard tiene TLS deshabilitado).
firewall_blocked:
  - { service: cockpit, comment: "Cockpit only via NGINX 443" }
  - { port: "853/tcp", comment: "Dead DoT rule (TLS disabled)" }
  - { port: "853/udp", comment: "Dead DoQ rule (TLS disabled)" }
  - { port: "3000/tcp", comment: "Forgejo HTTP — localhost only, behind NGINX" }
  - { port: "8096/tcp", comment: "Jellyfin direct HTTP" }
  - { port: "8920/tcp", comment: "Jellyfin direct HTTPS" }
  - { port: "2283/tcp", comment: "Immich direct" }
  - { port: "5000/tcp", comment: "Kavita direct" }
  - { port: "3011/tcp", comment: "Uptime-Kuma direct" }
  - { port: "8123/tcp", comment: "Home Assistant direct" }
  - { port: "{{ filebrowser_port | default(8080) }}/tcp", comment: "FileBrowser direct" }
  - { port: "9091/tcp", comment: "Cloud Torrent direct" }
  - { port: "3001/tcp", comment: "OrcaSlicer direct" }
