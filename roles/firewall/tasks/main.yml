---
# Rol firewall, data-driven. Una sola zona (auto-detectada de la interfaz LAN)
# contiene todas las reglas. Abre los pocos puertos/servicios de cara a la LAN y
# cierra todo lo que debe quedar detrás de NGINX. Ver defaults/main.yml para las
# listas de reglas.

- name: Ensure firewalld is installed
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name: firewalld
    state: present
  become: true

- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true
  become: true

- name: Detect the zone bound to the LAN interface
  ansible.builtin.command: firewall-cmd --get-zone-of-interface={{ firewall_interface }}
  register: firewall_detected_zone
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: Resolve the effective firewall zone
  ansible.builtin.set_fact:
    firewall_zone: >-
      {{ firewall_detected_zone.stdout | trim
         if (firewall_detected_zone.rc == 0 and (firewall_detected_zone.stdout | trim | length) > 0)
         else firewall_default_zone }}

- name: Report the zone every rule will target
  ansible.builtin.debug:
    msg: "Firewall: interface '{{ firewall_interface }}' resolves to zone '{{ firewall_zone }}'."

- name: Open LAN-facing ports
  ansible.posix.firewalld:
    port: "{{ item.port }}"
    zone: "{{ firewall_zone }}"
    permanent: true
    immediate: true
    state: enabled
  become: true
  loop: "{{ firewall_open_ports }}"
  loop_control:
    label: "{{ item.port }} — {{ item.comment | default('') }}"
  when: item.when | default(true) | bool

- name: Open LAN-facing services
  ansible.posix.firewalld:
    service: "{{ item.service }}"
    zone: "{{ firewall_zone }}"
    permanent: true
    immediate: true
    state: enabled
  become: true
  loop: "{{ firewall_open_services }}"
  loop_control:
    label: "{{ item.service }} — {{ item.comment | default('') }}"
  when: item.when | default(true) | bool

- name: Close ports/services that must stay behind NGINX (and legacy cleanup)
  ansible.posix.firewalld:
    service: "{{ item.service | default(omit) }}"
    port: "{{ item.port | default(omit) }}"
    zone: "{{ firewall_zone }}"
    permanent: true
    immediate: true
    state: disabled
  become: true
  loop: "{{ firewall_blocked }}"
  loop_control:
    label: "{{ item.service | default(item.port) }} — {{ item.comment | default('') }}"
  when: item.when | default(true) | bool
