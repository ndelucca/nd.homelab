---
# Firewall configuration for Forgejo
# Web (HTTP 3000) stays on localhost behind NGINX and is NOT exposed.
# Only the git SSH port is opened so repos can be cloned/pushed over SSH.
# This is the Forgejo container's own SSH server, not the host sshd (port 22).

- name: Open Forgejo git SSH port
  ansible.posix.firewalld:
    port: "{{ forgejo_ssh_port | default(2222) }}/tcp"
    zone: "{{ forgejo_firewall_zone | default('FedoraServer') }}"
    permanent: true
    immediate: true
    state: enabled
  become: true
  notify: reload firewalld
