---
# Firewall configuration for Uptime-Kuma (monitoring)
# Uptime-Kuma is behind the NGINX reverse proxy.
# Access via status.ndelucca-server.com on ports 80/443.

- name: Ensure Uptime-Kuma port is NOT exposed externally (behind NGINX)
  ansible.posix.firewalld:
    port: "{{ monitoring_port | default(3011) }}/tcp"
    zone: "{{ monitoring_firewall_zone | default('FedoraServer') }}"
    permanent: true
    immediate: true
    state: disabled
  become: true
  notify: reload firewalld
  ignore_errors: true
