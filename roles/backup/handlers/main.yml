---
# Handlers del role backup.

# `systemctl --user daemon-reload` explícito: el daemon_reload en user-scope del
# módulo systemd no regenera las units de forma confiable, mientras que el comando
# sí. El nombre del handler es único por role para que nunca colisione con los
# handlers de reload de otros roles (un nombre duplicado suprime uno en silencio).
- name: Backup daemon-reload-user  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: systemctl --user daemon-reload
  become: true
  become_user: "{{ backup_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ backup_uid }}"
  changed_when: false
