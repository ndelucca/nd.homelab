---
# Variables por defecto del role backup.
#
# Backups locales disco-a-disco a D-Ursa usando restic. Corre enteramente como el
# service user rootless (ndelucca): puede leer todo appdata/media/D-Leo
# (owned ndelucca:ndelucca) y hacer `podman exec` al Postgres de Immich por el
# socket de usuario. Un timer *user* de systemd diario corre el backup; uno
# semanal hace prune.
#
# RIESGO ACEPTADO: esto es 2-1-1, no 3-2-1. D-Ursa es un segundo disco en el MISMO
# chasis, escribible por el mismo uid que corre las apps. Un incendio/robo/pico de
# tensión o un service user comprometido puede llevarse ambas copias. Trade-off
# deliberado para un home-lab de un solo admin (el objetivo es sobrevivir la falla
# del disco primario, no resiliencia offsite/ransomware). Agregar `restic copy` a
# un target offsite/append-only si ese perfil de riesgo llega a cambiar.

# Service user: se reutiliza el storage user central (rootless, uid 1000).
backup_user: "{{ app_storage_user }}"
backup_group: "{{ app_storage_group }}"
backup_uid: "{{ app_storage_uid }}"

# Repositorio de restic en el disco de backup (D-Ursa).
backup_repo: "{{ storage_backup_disk }}/restic"

# Manejo del password. restic SIEMPRE encripta; no hay modo en texto plano. Para
# mantener el disaster recovery sin fricción (sin secreto que memorizar) el
# password vive en el vault Y se escribe en un archivo 0600 en la máquina:
# re-correr el playbook recrea el archivo, así que un restore no necesita recordar
# nada. La encriptación es un detalle interno, no un secreto a cuidar (el disco es
# local a la misma máquina). DEBE setearse vía vault en host_vars.
backup_password: ""
backup_config_dir: "/home/{{ backup_user }}/.config/restic"
backup_password_file: "{{ backup_config_dir }}/password"
backup_excludes_file: "{{ backup_config_dir }}/excludes.txt"

# Dónde aterrizan los scripts auxiliares y las user units de systemd.
backup_bin_dir: "/home/{{ backup_user }}/.local/bin"
backup_run_script: "{{ backup_bin_dir }}/restic-backup-run.sh"
backup_maintenance_script: "{{ backup_bin_dir }}/restic-backup-maintenance.sh"
backup_notify_script: "{{ backup_bin_dir }}/restic-backup-notify.sh"
backup_restore_drill_script: "{{ backup_bin_dir }}/restic-restore-drill.sh"
backup_user_unit_dir: "/home/{{ backup_user }}/.config/systemd/user"

# Hace visibles las fallas de backup o maintenance (y un disco de backup que se
# llena) en lugar de dejarlas fallar en silencio. El script de notify SIEMPRE
# loguea la alerta al journal con prioridad de error (para que `journalctl -t
# restic-backup` y el alerting basado en journald la vean); si hay una URL de
# topic de ntfy seteada, además manda una alerta al teléfono. Cableado vía
# systemd `OnFailure=backup-notify@%n.service` en ambas units.
backup_notify_enabled: true
# Target del push de ntfy, p. ej. https://ntfy.sh/<tu-topic-privado> o una URL
# self-hosted. Dejar vacío para depender solo de la alerta del journal.
backup_notify_ntfy_url: ""
# Avisar cuando el disco de backup cruza este porcentaje de uso (se chequea semanalmente).
backup_disk_usage_warn_percent: 85

# El `restic check` semanal además relee un subconjunto de los packs reales para
# detectar bitrot en disco (un `restic check` simple solo valida estructura/
# metadata). Se usa la forma m/n de restic y se avanza m por semana ISO, así la
# cobertura ROTA y todo el repo se verifica a lo largo de esta cantidad de
# semanas. (Un "N%" fijo relee ~los mismos packs cada semana —determinístico por
# pack ID— así que ~90% nunca se chequearía.)
backup_check_read_data_partitions: 5

# OnFailure solo dispara cuando una unit CORRE y falla. La falla más peligrosa es
# que el backup nunca llegue a correr (linger apagado, user manager muerto, timer
# deshabilitado): eso falla en silencio. Un chequeo diario alerta cuando el último
# snapshot supera el umbral de antigüedad (o no hay snapshots), vía el mismo
# script de notify (journal + ntfy opcional).
backup_freshness_enabled: true
backup_freshness_max_age_hours: 26
backup_freshness_script: "{{ backup_bin_dir }}/restic-backup-freshness.sh"
# Corre después de que el backup diario tuvo tiempo de completarse (el backup
# diario es a las 03:00; el umbral de 26h hace que una corrida perdida salte a las ~06:00).
backup_schedule_freshness: "*-*-* 06:00:00"
backup_freshness_units:
  - backup-freshness.service
  - backup-freshness.timer
backup_freshness_timers:
  - backup-freshness.timer

# Qué respaldar: solo los datos irreemplazables.
backup_paths:
  - "{{ app_data_root }}"               # ESTADO de las apps: DBs + config (incl. dumps/)
  - "{{ app_media_root }}/Gallery"      # biblioteca de fotos de Immich (irreemplazable)
  - "{{ app_media_root }}/Books"        # chico, no se re-consigue trivialmente
  - "{{ storage_personal_disk }}"       # archivo personal de D-Leo

# Qué NO respaldar: regenerable o inconsistente en reposo.
backup_excludes:
  - "{{ app_media_root }}/Movies"               # re-descargable
  - "{{ app_media_root }}/Series"               # re-descargable
  - "{{ app_data_root }}/immich/postgres"       # datos PG vivos: respaldados vía pg_dump
  - "{{ app_data_root }}/jellyfin/cache"        # regenerable
  - "{{ app_data_root }}/jellyfin/data/data/transcodes"
  - "{{ app_data_root }}/immich/model-cache"    # modelos de ML, se re-descargan
  - "lost+found"

# Retención aplicada por `restic forget` (diario); el prune ocurre semanalmente.
# Topeada en ~1 mes: granularidad diaria para la última semana, luego semanal
# hasta ~4 semanas. Sin snapshots mensuales, así que nada más viejo que ~28 días sobrevive.
backup_keep_daily: 7
backup_keep_weekly: 4
backup_keep_monthly: 0

# Schedules (OnCalendar de systemd). Backup diario fuera de pico; prune semanal
# más tarde; restore drill mensual (día 1 del mes) para probar que el repo es restaurable.
backup_schedule_daily: "*-*-* 03:00:00"
backup_schedule_maintenance: "Sun *-*-* 04:30:00"
backup_schedule_restore_drill: "*-*-01 05:30:00"

# Restore drill mensual: restaura los dumps de las DBs del último snapshot a un
# directorio temporal y verifica que vuelvan no vacíos. Prueba end-to-end barata de restaurabilidad.
backup_restore_drill_enabled: true

# user units de systemd que despliega el role. El template notify@ respalda la
# alerta OnFailure=; las units del restore-drill se agregan solo cuando está habilitado.
backup_units:
  - backup.service
  - backup.timer
  - backup-maintenance.service
  - backup-maintenance.timer
  - backup-notify@.service
backup_restore_drill_units:
  - backup-restore-drill.service
  - backup-restore-drill.timer
# Timers a habilitar (el timer del drill se agrega cuando el drill está habilitado).
backup_timers:
  - backup.timer
  - backup-maintenance.timer
backup_restore_drill_timers:
  - backup-restore-drill.timer

# Dumps de las bases de datos (consistentes, sin downtime del servicio).
# El dump de cada app se escribe bajo {{ app_data_root }}/<app>/dumps/ para que el
# snapshot de restic capture una copia consistente. El dump es la fuente
# autoritativa de restore; el archivo de DB vivo también se captura pero es secundario.

# Immich PostgreSQL (corriendo en el container rootless `immich-database`).
backup_immich_enabled: true
backup_immich_container: immich-database
backup_immich_db_user: immich
backup_immich_db_name: immich

# Bases SQLite (`.backup` online, seguro mientras la app está corriendo).
backup_sqlite_dbs:
  - app: jellyfin
    path: "{{ app_data_root }}/jellyfin/data/data/jellyfin.db"
  - app: forgejo
    path: "{{ app_data_root }}/forgejo/data/data/gitea.db"
  - app: kavita
    path: "{{ app_data_root }}/kavita/config/kavita.db"

# Bases de un solo archivo no-SQLite respaldadas por copia. Filebrowser usa
# BoltDB, que es transaccional/crash-consistent en disco, así que una copia simple
# es un snapshot válido (y solo escribe ante cambios de config de usuarios/shares).
backup_copy_dbs:
  - app: filebrowser
    path: "{{ app_data_root }}/filebrowser/filebrowser.db"
