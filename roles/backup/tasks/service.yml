---
# Enable and start the backup timers (user scope). The .service units are
# oneshot and triggered by their timers, so only the timers are enabled.

- name: Enable and start backup timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    scope: user
    daemon_reload: true
  become: true
  become_user: "{{ backup_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ backup_uid }}"
  loop: "{{ backup_timers + (backup_restore_drill_timers if backup_restore_drill_enabled else []) }}"

- name: Show backup status
  ansible.builtin.debug:
    msg: |
      Backup configured.

      Repository: {{ backup_repo }}
      Daily backup:  {{ backup_schedule_daily }}
      Weekly prune:  {{ backup_schedule_maintenance }}
      {% if backup_restore_drill_enabled %}Restore drill: {{ backup_schedule_restore_drill }}{% endif %}

      Run a backup now:
        systemctl --user -M {{ backup_user }}@ start backup.service
      Run a restore drill now:
        systemctl --user -M {{ backup_user }}@ start backup-restore-drill.service
      List snapshots:
        sudo -u {{ backup_user }} env RESTIC_REPOSITORY={{ backup_repo }} \
          RESTIC_PASSWORD_FILE={{ backup_password_file }} restic snapshots
      Logs:
        journalctl --user -M {{ backup_user }}@ -u backup.service
