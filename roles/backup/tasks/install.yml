---
# Instala restic y las herramientas de las que depende el script de backup.

- name: Install restic and SQLite client
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name:
      - restic    # motor de backup (dedup + snapshots + retención)
      - sqlite    # CLI sqlite3 para el .backup online consistente de las DBs de las apps
    state: present
  become: true

- name: Verify restic installation
  ansible.builtin.command: restic version
  register: backup_restic_version
  changed_when: false

- name: Display restic version
  ansible.builtin.debug:
    msg: "Installed {{ backup_restic_version.stdout }}"

- name: Enable lingering for user (allows user timers without an active login)
  ansible.builtin.command: loginctl enable-linger {{ backup_user }}
  args:
    creates: /var/lib/systemd/linger/{{ backup_user }}
  become: true
