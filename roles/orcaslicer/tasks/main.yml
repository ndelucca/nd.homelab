---
- name: Include preflight checks
  ansible.builtin.import_tasks: preflight.yml
  tags: ['orcaslicer', 'preflight']

- name: Install Podman and dependencies
  ansible.builtin.import_tasks: install.yml
  tags: ['orcaslicer', 'install']

- name: Deploy Quadlet configuration
  ansible.builtin.import_tasks: quadlet.yml
  tags: ['orcaslicer', 'quadlet']

# Se aplican los contextos de SELinux antes de que arranque el container para que
# un host en enforcing no deniegue el acceso al volume en la primera corrida.
- name: Configure SELinux (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: selinux
  tags: ['orcaslicer', 'selinux']
  when: orcaslicer_manage_selinux | bool

- name: Configure systemd service (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: service
  tags: ['orcaslicer', 'service']
