---
# Chequeos de preflight y armado de directorios para OrcaSlicer

- name: Common container preflight (Fedora, uid, port)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: preflight
  vars:
    container_base_user: "{{ orcaslicer_user }}"
    container_base_port: "{{ orcaslicer_port }}"

- name: Map the resolved UID to orcaslicer_uid
  ansible.builtin.set_fact:
    orcaslicer_uid: "{{ container_base_uid }}"

- name: Ensure base directory exists
  ansible.builtin.file:
    path: "{{ orcaslicer_base_dir }}"
    state: directory
    owner: "{{ orcaslicer_user }}"
    group: "{{ orcaslicer_group }}"
    mode: '0755'
  become: true

# La propiedad del árbol de config se le entrega al usuario de la app del container
# más abajo (vía podman unshare), así que estas tareas solo aseguran que los dirs
# existan con el mode correcto. NO setear owner acá: la imagen LSIO corre
# OrcaSlicer con un uid in-container que rootless Podman mapea a un sub-uid del
# host, NO a {{ orcaslicer_user }}. Forzar la propiedad a {{ orcaslicer_user }} es
# justo lo que bloquea a la app para escribir (ej. "permission denied" al guardar
# G-code en config/gcodes).
- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ orcaslicer_config_dir }}"
    state: directory
    mode: '0755'
  become: true

- name: Ensure downloads and gcodes directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  become: true
  loop:
    - "{{ orcaslicer_config_dir }}/downloads"
    - "{{ orcaslicer_config_dir }}/gcodes"

# Se le entrega el árbol de config al usuario de la app del container. OrcaSlicer
# corre dentro del container como uid {{ orcaslicer_uid }} (PUID), que rootless
# Podman mapea a un sub-uid del host (ej. 525287). `podman unshare` entra a ese
# user namespace, así que un chown al uid in-container resuelve automáticamente al
# sub-uid correcto del host — no hace falta hardcodearlo. El acceso del host para
# {{ orcaslicer_user }} se preserva con las ACLs de abajo. NOTA: keep-id NO se usa
# acá a propósito; esta imagen LSIO/s6 arranca como root y dropea privilegios, y
# keep-id rompe su init (no puede hacer chown de su propio rootfs), así que la app
# nunca arranca.
- name: Hand the config tree to the container's app user (rootless sub-uid)
  ansible.builtin.command:
    cmd: "podman unshare chown -R {{ orcaslicer_uid }}:{{ orcaslicer_uid }} {{ orcaslicer_config_dir }}"
  become: true
  become_user: "{{ orcaslicer_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ orcaslicer_uid }}"
  changed_when: false

- name: Set ACLs for user access to downloads and gcodes
  ansible.posix.acl:
    path: "{{ item.path }}"
    entity: "{{ orcaslicer_user }}"
    etype: user
    permissions: rwx
    default: "{{ item.default }}"
    state: present
  become: true
  loop:
    - { path: "{{ orcaslicer_config_dir }}/downloads", default: false }
    - { path: "{{ orcaslicer_config_dir }}/downloads", default: true }
    - { path: "{{ orcaslicer_config_dir }}/gcodes", default: false }
    - { path: "{{ orcaslicer_config_dir }}/gcodes", default: true }
