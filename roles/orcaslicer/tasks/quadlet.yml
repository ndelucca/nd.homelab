---
- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: "{{ orcaslicer_quadlet_dir }}/{{ orcaslicer_uid }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Deploy OrcaSlicer Quadlet .container unit
  ansible.builtin.template:
    src: orcaslicer.container.j2
    dest: "{{ orcaslicer_quadlet_dir }}/{{ orcaslicer_uid }}/{{ orcaslicer_service_name }}.container"
    owner: root
    # Legible por el grupo del usuario rootless del servicio (NO por todos): el
    # unit incrusta el password web de OrcaSlicer, pero el generador de Quadlet
    # por usuario corre COMO este usuario y necesita leer el archivo para generar
    # el .service — 0600 root:root se lo ocultaría al usuario y el unit nunca se
    # generaría.
    group: "{{ orcaslicer_group }}"
    mode: '0640'
  become: true
  notify:
    - Container daemon-reload-user
    # Volumen category-less (sin :Z): relabelear a container_file_t:s0 ANTES del restart,
    # o el container nuevo crashea contra la categoría MCS vieja (le pasó a cert.pem).
    - Container apply selinux context
    - Container restart
