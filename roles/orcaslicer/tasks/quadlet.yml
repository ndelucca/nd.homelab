---
# Deploy Podman Quadlet configuration for OrcaSlicer

- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: "{{ orcaslicer_quadlet_dir }}/{{ orcaslicer_uid }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Deploy OrcaSlicer Quadlet .container unit
  ansible.builtin.template:
    src: orcaslicer.container.j2
    dest: "{{ orcaslicer_quadlet_dir }}/{{ orcaslicer_uid }}/{{ orcaslicer_service_name }}.container"
    owner: root
    # Group-readable by the rootless service user (NOT world): the unit inlines
    # the OrcaSlicer web password, but the per-user Quadlet generator runs AS
    # this user and must read the file to generate the .service — 0600 root:root
    # would hide it from the user and the unit would never be generated.
    group: "{{ orcaslicer_group }}"
    mode: '0640'
  become: true
  notify:
    - container daemon-reload-user
    - container restart
