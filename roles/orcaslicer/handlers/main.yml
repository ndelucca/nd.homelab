---
# Handlers for OrcaSlicer rootless Podman role

# Explicit `systemctl --user daemon-reload`: the systemd module's user-scope
# daemon_reload does not reliably regenerate Quadlet units (the generated unit
# keeps stale paths), whereas the command does.
- name: orcaslicer daemon-reload-user  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: systemctl --user daemon-reload
  become: true
  become_user: "{{ orcaslicer_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ orcaslicer_uid }}"
  changed_when: false

- name: restart orcaslicer
  ansible.builtin.systemd:
    name: "{{ orcaslicer_service_name }}"
    state: restarted
    scope: user
  become: true
  become_user: "{{ orcaslicer_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ orcaslicer_uid }}"

- name: orcaslicer apply selinux context
  ansible.builtin.command: "restorecon -Rv {{ item }}"
  become: true
  loop:
    - "{{ orcaslicer_config_dir }}"
  changed_when: false
