---
orcaslicer_user: ndelucca
orcaslicer_group: ndelucca
orcaslicer_uid: 1000

# El estado vive en el disco de appdata (app_data_root, definido en
# group_vars/homeservers/storage.yml).
orcaslicer_base_dir: "{{ app_data_root }}/orcaslicer"
orcaslicer_config_dir: "{{ orcaslicer_base_dir }}/config"

orcaslicer_quadlet_dir: /etc/containers/systemd/users
# Tag pineado para deploys reproducibles (antes era ':latest').
# Releases más nuevos: https://hub.docker.com/r/linuxserver/orcaslicer/tags
orcaslicer_image: lscr.io/linuxserver/orcaslicer:2.4.0

orcaslicer_port: 3001
orcaslicer_host: 127.0.0.1

orcaslicer_timezone: America/Los_Angeles

# Autenticación (el password debe setearse en host_vars, encriptado con vault).
orcaslicer_custom_user: ndelucca
orcaslicer_password: ""

# Aceleración por GPU (deshabilitada: la GeForce 210 no está soportada).
orcaslicer_gpu_enabled: false

orcaslicer_service_name: orcaslicer
orcaslicer_service_enabled: true
orcaslicer_service_state: started

orcaslicer_firewall_zone: FedoraServer
orcaslicer_firewall_enabled: false

orcaslicer_manage_selinux: true

# Contrato de container_base — alimenta el install + handlers compartidos (ver
# container_base).
container_user: "{{ orcaslicer_user }}"
container_uid: "{{ orcaslicer_uid }}"
container_service_name: "{{ orcaslicer_service_name }}"
container_selinux_paths: "{{ [orcaslicer_config_dir] }}"
# Contrato del service-step de container_base (enable + wait_for).
container_host: "{{ orcaslicer_host }}"
container_port: "{{ orcaslicer_port }}"
container_service_enabled: "{{ orcaslicer_service_enabled }}"
container_service_state: "{{ orcaslicer_service_state }}"
