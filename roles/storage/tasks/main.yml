---
# Role storage: pinea el usuario del servicio, monta los discos de datos por UUID
# y arma el esqueleto de app-data. Corre primero en site.yml para que todo
# mountpoint y dir base exista antes de que despliegue cualquier role de app.

# Identidad del usuario del servicio (crítica para DR). Rootless Podman
# (UserNS=keep-id) y la propiedad de cada archivo en el disco de datos asumen este
# uid/gid exacto. Pinearlos mantiene los datos válidos tras una reinstalación del
# OS.
- name: Ensure service group has the fixed gid
  ansible.builtin.group:
    name: "{{ app_storage_group }}"
    gid: "{{ app_storage_gid }}"
    state: present
  become: true

- name: Ensure service user has the fixed uid/gid
  ansible.builtin.user:
    name: "{{ app_storage_user }}"
    uid: "{{ app_storage_uid }}"
    group: "{{ app_storage_group }}"
    state: present
  become: true

# Mounts (la fuente de verdad para /etc/fstab). Por UUID para que los mounts
# sobrevivan un cambio de board/OS. nofail mantiene la máquina booteable si falta
# un disco; el dir del mountpoint se crea con propiedad de root, lo que también es
# la guarda de "mount faltante": si un disco no monta, el mountpoint vacío (de
# root) no es escribible por el usuario del servicio, así que las apps rootless
# fallan al escribir ahí en vez de shadowear silenciosamente los datos sobre el
# filesystem root.
- name: Mount data disks by UUID (managed fstab)
  ansible.posix.mount:
    path: "{{ item.mount }}"
    src: "UUID={{ item.uuid }}"
    fstype: "{{ item.fstype }}"
    opts: "{{ storage_mount_opts }}"
    state: mounted
  become: true
  loop: "{{ storage_disks }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.mount }}"

# Guarda de mount. Falla rápido si el disco de appdata no llegó a montarse. Con
# `nofail`, un disco faltante dejaría que los dirs del esqueleto de abajo
# aterricen en el filesystem root bajo el mountpoint vacío — anulando la guarda de
# "mount faltante" de arriba y shadoweando silenciosamente los datos sobre root.
# findmnt --mountpoint devuelve non-zero salvo que el path sea un mountpoint real.
- name: Assert the appdata disk is mounted before creating the skeleton
  ansible.builtin.command: "findmnt --mountpoint {{ storage_appdata_disk }}"
  become: true
  changed_when: false

# Esqueleto de app-data. Se crean después de montar para que aterricen en el disco
# de appdata, con propiedad del usuario del servicio. Cada role de app crea su
# propio subdir bajo estos.
- name: Create appdata/media roots on the data disk
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_storage_user }}"
    group: "{{ app_storage_group }}"
    mode: '0755'
  become: true
  loop: "{{ storage_appdata_skeleton }}"
