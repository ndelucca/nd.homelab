---
# Opciones de mount para los discos de datos.
#   nofail                    -> la máquina igual bootea si falta un disco
#   x-systemd.device-timeout  -> acota cuánto espera el boot por el dispositivo
storage_mount_opts: "defaults,nofail,x-systemd.device-timeout=10"

# Roots a pre-crear en el disco de appdata para que las apps aterricen en el disco
# y no en un mountpoint vacío. Se crean con la propiedad del usuario del servicio
# DESPUÉS de montar el disco.
storage_appdata_skeleton:
  - "{{ app_data_root }}"
  - "{{ app_media_root }}"
