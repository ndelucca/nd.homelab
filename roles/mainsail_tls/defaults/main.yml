---
# Variables por defecto del role mainsail_tls.
# Sirve la UI web de MainsailOS sobre HTTPS usando un cert real emitido en la
# propia Pi por el role acme (DNS-01). Reutiliza los upstreams de MainsailOS
# (apiserver / mjpgstreamerN, definidos en /etc/nginx/conf.d/upstreams.conf) y la
# map $connection_upgrade (/etc/nginx/conf.d/common_vars.conf).

mainsail_tls_domain: "printer.{{ base_domain }}"

# Rutas del certificado (emitido por roles/acme dentro de acme_data_dir en este host).
mainsail_tls_cert: "{{ acme_data_dir }}/certificates/{{ mainsail_tls_domain }}.crt"
mainsail_tls_key: "{{ acme_data_dir }}/certificates/{{ mainsail_tls_domain }}.key"

# Sitio nginx de MainsailOS que gestionamos (reemplaza al stock; el original se conserva como .orig).
mainsail_tls_site_path: /etc/nginx/sites-available/mainsail

# Web root estático que sirve MainsailOS (coincide con la directiva `root` stock).
mainsail_tls_web_root: "/home/{{ ansible_user | default('ndelucca') }}/mainsail"

# Redirige HTTP plano a HTTPS (poner false para servir también la UI en el puerto 80).
mainsail_tls_redirect_http: true
