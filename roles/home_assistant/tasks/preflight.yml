---
# Preflight checks and directory setup for Home Assistant

- name: Verify Fedora operating system
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Fedora"
    fail_msg: "This role only supports Fedora"
    success_msg: "Running on Fedora {{ ansible_distribution_version }}"

- name: Resolve home_assistant user UID for rootless Podman
  ansible.builtin.getent:
    database: passwd
    key: "{{ home_assistant_user }}"
  check_mode: false

- name: Set home_assistant_uid fact
  ansible.builtin.set_fact:
    home_assistant_uid: "{{ getent_passwd[home_assistant_user][1] }}"

- name: Display user UID
  ansible.builtin.debug:
    msg: "Using UID {{ home_assistant_uid }} for user {{ home_assistant_user }}"

- name: Ensure base directory exists
  ansible.builtin.file:
    path: "{{ home_assistant_base_dir }}"
    state: directory
    owner: "{{ home_assistant_user }}"
    group: "{{ home_assistant_group }}"
    mode: '0755'
  become: true

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ home_assistant_config_dir }}"
    state: directory
    owner: "{{ home_assistant_user }}"
    group: "{{ home_assistant_group }}"
    mode: '0755'
  become: true

- name: Check availability of port {{ home_assistant_port }}
  ansible.builtin.shell: |
    ss -tulnp | grep -q ":{{ home_assistant_port }}\s" && echo "occupied" || echo "available"
  register: port_check
  changed_when: false
  failed_when: false

- name: Display port status
  ansible.builtin.debug:
    msg: "Port {{ home_assistant_port }} is {{ port_check.stdout }}"

# A warning, not a failure: on a re-run the port is expected to be held by
# Home Assistant itself (consistent with the other container roles).
- name: Warn if port is occupied
  ansible.builtin.debug:
    msg: "WARNING: port {{ home_assistant_port }} is already in use (expected if Home Assistant is already running)"
  when: port_check.stdout == "occupied"
