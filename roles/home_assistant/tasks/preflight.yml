---
# Chequeos de preflight y armado de directorios para Home Assistant

- name: Common container preflight (Fedora, uid, port)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: preflight
  vars:
    container_base_user: "{{ home_assistant_user }}"
    container_base_port: "{{ home_assistant_port }}"

- name: Map the resolved UID to home_assistant_uid
  ansible.builtin.set_fact:
    home_assistant_uid: "{{ container_base_uid }}"

- name: Ensure base directory exists
  ansible.builtin.file:
    path: "{{ home_assistant_base_dir }}"
    state: directory
    owner: "{{ home_assistant_user }}"
    group: "{{ home_assistant_group }}"
    mode: '0755'
  become: true

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ home_assistant_config_dir }}"
    state: directory
    owner: "{{ home_assistant_user }}"
    group: "{{ home_assistant_group }}"
    mode: '0755'
  become: true
