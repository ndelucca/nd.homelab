---
# Punto de entrada principal del role Home Assistant

- name: Include preflight checks
  ansible.builtin.import_tasks: preflight.yml
  tags: ['home_assistant', 'preflight']

- name: Install Podman and dependencies
  ansible.builtin.import_tasks: install.yml
  tags: ['home_assistant', 'install']

- name: Deploy Quadlet configuration
  ansible.builtin.import_tasks: quadlet.yml
  tags: ['home_assistant', 'quadlet']

# Se aplican los contextos SELinux antes de que arranque el container para que un host
# en modo enforcing no deniegue el acceso a los volúmenes en la primera corrida.
- name: Configure SELinux (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: selinux
  tags: ['home_assistant', 'selinux']
  when: home_assistant_manage_selinux | bool

- name: Configure systemd service (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: service
  tags: ['home_assistant', 'service']
