---
- name: Daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Restart jellyfin
  ansible.builtin.systemd:
    name: "{{ jellyfin_service_name }}"
    state: restarted
  become: true

- name: Jellyfin apply selinux context
  ansible.builtin.command: "restorecon -Rv {{ item }}"
  become: true
  changed_when: false
  # El media root NO se relabelea entero: `Gallery` (immich) y `Books` (kavita) son volumes
  # de container y un `restorecon -R` acá los repinta a public_content_rw_t, dejándolos
  # ilegibles para container_t (crash-loop → 502). Sólo las bibliotecas propias.
  loop: "{{ [jellyfin_data_dir, jellyfin_config_dir, jellyfin_cache_dir, jellyfin_log_dir]
            + jellyfin_media_selinux_dirs }}"
