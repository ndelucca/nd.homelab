---
- name: Display SELinux status
  ansible.builtin.debug:
    msg: "SELinux is {{ ansible_facts['selinux'].mode | default('disabled') }}"

- name: Install SELinux policy packages
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
    state: present
  become: true
  when: ansible_facts['selinux'].mode | default('') == 'enforcing'

- name: Set SELinux file contexts for Jellyfin directories
  community.general.sefcontext:
    target: "{{ item.target }}(/.*)?"
    setype: "{{ item.setype }}"
    state: present
  become: true
  loop:
    - { target: "{{ jellyfin_data_dir }}", setype: var_lib_t }
    - { target: "{{ jellyfin_config_dir }}", setype: var_lib_t }
    - { target: "{{ jellyfin_cache_dir }}", setype: var_lib_t }
    - { target: "{{ jellyfin_log_dir }}", setype: var_log_t }
    - { target: "{{ jellyfin_media_dir }}", setype: public_content_rw_t }
  loop_control:
    label: "{{ item.target }}"
  when: ansible_facts['selinux'].mode | default('') == 'enforcing'
  notify: Jellyfin apply selinux context

- name: Allow Jellyfin to bind to custom HTTP port
  community.general.seport:
    ports: "{{ jellyfin_http_port }}"
    proto: tcp
    setype: http_port_t
    state: present
  become: true
  when:
    - ansible_facts['selinux'].mode | default('') == 'enforcing'
    - jellyfin_http_port != 80 and jellyfin_http_port != 443

- name: Allow Jellyfin to bind to custom HTTPS port
  community.general.seport:
    ports: "{{ jellyfin_https_port }}"
    proto: tcp
    setype: http_port_t
    state: present
  become: true
  when:
    - ansible_facts['selinux'].mode | default('') == 'enforcing'
    - jellyfin_https_port != 80 and jellyfin_https_port != 443

- name: Enable SELinux boolean for network connectivity
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true
  become: true
  when: ansible_facts['selinux'].mode | default('') == 'enforcing'
  failed_when: false
