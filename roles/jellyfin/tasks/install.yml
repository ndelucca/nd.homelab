---
- name: Install Jellyfin server and dependencies
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name:
      - jellyfin
      - jellyfin-server
      - jellyfin-web
    state: present
  become: true
  notify: Restart jellyfin

- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: rpm

- name: Display Jellyfin version
  ansible.builtin.debug:
    msg: "Installed jellyfin-{{ ansible_facts.packages['jellyfin'][0].version }}"

- name: Display installation information
  ansible.builtin.debug:
    msg: |
      Jellyfin has been installed successfully from RPMFusion!

      Data directory: {{ jellyfin_data_dir }}
      Config directory: {{ jellyfin_config_dir }}
      Service name: {{ jellyfin_service_name }}

      Web UI: http://{{ ansible_facts['default_ipv4'].address }}:{{ jellyfin_http_port }}
