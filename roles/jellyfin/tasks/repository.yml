---
# Setup RPMFusion repository for Jellyfin

# Import the RPMFusion GPG keys BEFORE installing the release RPMs so their
# signatures are actually verified (these 2020 keys cover Fedora 33-46).
# rpm_key is idempotent: a no-op once the fingerprint is already present.
- name: Import RPMFusion GPG keys
  ansible.builtin.rpm_key:
    key: "https://rpmfusion.org/keys?action=AttachFile&do=get&target=RPM-GPG-KEY-rpmfusion-{{ item }}-fedora-2020"
    state: present
  become: true
  loop:
    - free
    - nonfree

# Installing the release RPM by URL is already idempotent: dnf reports "ok"
# (not changed) once the rpmfusion-*-release package is present, so no manual
# `dnf repolist` string-matching is needed (that matched 'rpmfusion-free' inside
# 'rpmfusion-free-updates' and could skip the base repo, or never refresh the
# cache when only nonfree was added). Register the installs and refresh the
# cache only when a repo was actually added.
- name: Install RPMFusion Free repository
  ansible.builtin.dnf:
    name: "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_version }}.noarch.rpm"
    state: present
  become: true
  register: jellyfin_rpmfusion_free
  when: jellyfin_rpmfusion_free_enabled | bool

- name: Install RPMFusion Nonfree repository (optional)
  ansible.builtin.dnf:
    name: "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_version }}.noarch.rpm"
    state: present
  become: true
  register: jellyfin_rpmfusion_nonfree
  when: jellyfin_rpmfusion_nonfree_enabled | bool

- name: Update DNF cache after adding RPMFusion
  ansible.builtin.dnf:
    update_cache: true
  become: true
  when: (jellyfin_rpmfusion_free is changed) or (jellyfin_rpmfusion_nonfree is changed)

- name: Display repository status
  ansible.builtin.debug:
    msg: "RPMFusion repositories configured successfully"
