---
# Se importan las claves GPG de RPMFusion ANTES de instalar los RPMs de release
# para que sus firmas se verifiquen de verdad (estas claves de 2020 cubren Fedora
# 33-46). rpm_key es idempotente: no hace nada si el fingerprint ya está presente.
- name: Import RPMFusion GPG keys
  ansible.builtin.rpm_key:
    key: "https://rpmfusion.org/keys?action=AttachFile&do=get&target=RPM-GPG-KEY-rpmfusion-{{ item }}-fedora-2020"
    state: present
  become: true
  loop:
    - free
    - nonfree

# Instalar el RPM de release por URL ya es idempotente: dnf reporta "ok" (no
# changed) una vez que el paquete rpmfusion-*-release está presente, así que no
# hace falta el string-matching manual con `dnf repolist` (que matcheaba
# 'rpmfusion-free' dentro de 'rpmfusion-free-updates' y podía saltear el repo
# base, o nunca refrescar la cache cuando solo se agregaba nonfree). Se registran
# las instalaciones y se refresca la cache solo cuando se agregó un repo de verdad.
- name: Install RPMFusion Free repository
  ansible.builtin.dnf:
    name: "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_version }}.noarch.rpm"
    state: present
  become: true
  register: jellyfin_rpmfusion_free
  when: jellyfin_rpmfusion_free_enabled | bool

- name: Install RPMFusion Nonfree repository (optional)
  ansible.builtin.dnf:
    name: "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_version }}.noarch.rpm"
    state: present
  become: true
  register: jellyfin_rpmfusion_nonfree
  when: jellyfin_rpmfusion_nonfree_enabled | bool

- name: Update DNF cache after adding RPMFusion
  ansible.builtin.dnf:
    update_cache: true
  become: true
  when: (jellyfin_rpmfusion_free is changed) or (jellyfin_rpmfusion_nonfree is changed)

- name: Display repository status
  ansible.builtin.debug:
    msg: "RPMFusion repositories configured successfully"
