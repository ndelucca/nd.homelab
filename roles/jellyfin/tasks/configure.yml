---
# Configure Jellyfin directories and initial setup

- name: Ensure all Jellyfin directories exist with correct ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ jellyfin_user }}"
    group: "{{ jellyfin_group }}"
    mode: '0755'
    recurse: true
  become: true
  loop:
    - "{{ jellyfin_data_dir }}"
    - "{{ jellyfin_config_dir }}"
    - "{{ jellyfin_cache_dir }}"
    - "{{ jellyfin_log_dir }}"
    - "{{ jellyfin_media_dir }}"
