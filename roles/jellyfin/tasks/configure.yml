---
# Configure Jellyfin directories and initial setup

# Top-level only, no recurse: Jellyfin runs as {{ jellyfin_user }} and creates
# everything under these dirs as that user, so ownership is already correct.
# A recursive chown/chmod here would walk thousands of metadata/cache files on
# every run (slow, churny) for no benefit — same reasoning as the media dir below.
- name: Ensure Jellyfin's own state directories exist with correct ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ jellyfin_user }}"
    group: "{{ jellyfin_group }}"
    mode: '0755'
  become: true
  loop:
    - "{{ jellyfin_data_dir }}"
    - "{{ jellyfin_config_dir }}"
    - "{{ jellyfin_cache_dir }}"
    - "{{ jellyfin_log_dir }}"

# The media root is shared with other apps (immich, filebrowser, …) and is
# created/owned by the storage role. Only ensure the top-level dir exists — do
# NOT recurse: a recursive chown/chmod here would rewrite ownership and force
# 0755 on every media file on every run (slow, churny, and would clobber the
# other apps' files under the shared tree).
- name: Ensure the media directory exists (top-level only, no recurse)
  ansible.builtin.file:
    path: "{{ jellyfin_media_dir }}"
    state: directory
    owner: "{{ jellyfin_user }}"
    group: "{{ jellyfin_group }}"
    mode: '0755'
  become: true
