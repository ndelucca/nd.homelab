---
# Solo el nivel superior, sin recursión: Jellyfin corre como {{ jellyfin_user }} y
# crea todo bajo estos dirs como ese usuario, así que la propiedad ya es correcta.
# Un chown/chmod recursivo acá recorrería miles de archivos de metadata/cache en
# cada corrida (lento y ruidoso) sin beneficio — mismo razonamiento que el dir de
# medios más abajo.
- name: Ensure Jellyfin's own state directories exist with correct ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ jellyfin_user }}"
    group: "{{ jellyfin_group }}"
    mode: '0755'
  become: true
  loop:
    - "{{ jellyfin_data_dir }}"
    - "{{ jellyfin_config_dir }}"
    - "{{ jellyfin_cache_dir }}"
    - "{{ jellyfin_log_dir }}"

# El media root es compartido con otras apps (immich, filebrowser, …) y lo
# crea/posee el role storage. Solo se asegura que exista el dir de nivel superior;
# NO recursivo: un chown/chmod recursivo acá reescribiría la propiedad y forzaría
# 0755 sobre cada archivo de medios en cada corrida (lento, ruidoso, y pisaría los
# archivos de las otras apps bajo el árbol compartido).
- name: Ensure the media directory exists (top-level only, no recurse)
  ansible.builtin.file:
    path: "{{ jellyfin_media_dir }}"
    state: directory
    owner: "{{ jellyfin_user }}"
    group: "{{ jellyfin_group }}"
    mode: '0755'
  become: true
