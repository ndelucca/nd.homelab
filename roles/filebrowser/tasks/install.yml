---
# Install / update the FileBrowser binary.
# Version-aware and idempotent:
#   - filebrowser_version: latest  -> resolves the newest GitHub release and
#     (re)installs only when it differs from the installed binary.
#   - filebrowser_version: vX.Y.Z  -> pins to that exact release.

- name: Check if FileBrowser is already installed
  ansible.builtin.stat:
    path: "{{ filebrowser_install_dir }}/filebrowser"
  register: filebrowser_binary

- name: Get installed FileBrowser version
  ansible.builtin.command: "{{ filebrowser_install_dir }}/filebrowser version"
  register: filebrowser_installed_raw
  changed_when: false
  failed_when: false
  when: filebrowser_binary.stat.exists

- name: Resolve latest FileBrowser release from GitHub
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ filebrowser_github_repo }}/releases/latest"
    headers:
      Accept: application/vnd.github+json
  register: filebrowser_release_api
  failed_when: false
  when: filebrowser_version == 'latest'

- name: Determine requested FileBrowser version string
  ansible.builtin.set_fact:
    filebrowser_requested_version: "{{ filebrowser_version if filebrowser_version != 'latest' else (filebrowser_release_api.json.tag_name | default('')) }}"

- name: Normalize target and installed FileBrowser versions
  ansible.builtin.set_fact:
    filebrowser_target_version: '{{ (filebrowser_requested_version | regex_search("[0-9]+\.[0-9]+\.[0-9]+")) | default("", true) }}'
    filebrowser_current_version: '{{ (filebrowser_installed_raw.stdout | default("") | regex_search("[0-9]+\.[0-9]+\.[0-9]+")) | default("", true) }}'

- name: Fail when no version could be resolved and nothing is installed
  ansible.builtin.fail:
    msg: >-
      Could not resolve a FileBrowser version (GitHub API unreachable?) and no
      existing binary to fall back to.
  when:
    - filebrowser_target_version | length == 0
    - not filebrowser_binary.stat.exists

- name: Decide whether FileBrowser needs (re)install
  ansible.builtin.set_fact:
    filebrowser_needs_install: "{{ (not filebrowser_binary.stat.exists) or (filebrowser_target_version | length > 0 and filebrowser_target_version != filebrowser_current_version) }}"

- name: Report FileBrowser version decision
  ansible.builtin.debug:
    msg: >-
      FileBrowser installed={{ filebrowser_current_version | default('none') }}
      target={{ filebrowser_target_version | default('unknown') }}
      -> {{ 'installing/updating' if filebrowser_needs_install else 'up to date' }}

- name: Create temporary download directory
  ansible.builtin.tempfile:
    state: directory
    suffix: _filebrowser_download
  register: download_dir
  when: filebrowser_needs_install

- name: Fetch FileBrowser release checksums
  ansible.builtin.uri:
    url: "https://github.com/{{ filebrowser_github_repo }}/releases/download/v{{ filebrowser_target_version }}/filebrowser_{{ filebrowser_target_version }}_checksums.txt"
    return_content: true
  register: filebrowser_checksums
  when: filebrowser_needs_install

- name: Extract expected SHA256 for the FileBrowser archive
  ansible.builtin.set_fact:
    filebrowser_archive_sha256: >-
      {{ (filebrowser_checksums.content.splitlines()
          | select('search', 'linux-' + filebrowser_arch + '-filebrowser.tar.gz')
          | first).split() | first }}
  when: filebrowser_needs_install

- name: Download FileBrowser archive
  ansible.builtin.get_url:
    url: "https://github.com/{{ filebrowser_github_repo }}/releases/download/v{{ filebrowser_target_version }}/linux-{{ filebrowser_arch }}-filebrowser.tar.gz"
    dest: "{{ download_dir.path }}/filebrowser.tar.gz"
    checksum: "sha256:{{ filebrowser_archive_sha256 }}"
    mode: '0644'
  when: filebrowser_needs_install

- name: Extract FileBrowser archive
  ansible.builtin.unarchive:
    src: "{{ download_dir.path }}/filebrowser.tar.gz"
    dest: "{{ download_dir.path }}"
    remote_src: true
  when: filebrowser_needs_install

- name: Install FileBrowser binary
  ansible.builtin.copy:
    src: "{{ download_dir.path }}/filebrowser"
    dest: "{{ filebrowser_install_dir }}/filebrowser"
    remote_src: true
    owner: root
    group: root
    mode: '0755'
  become: true
  notify: restart filebrowser
  when: filebrowser_needs_install

- name: Clean up temporary download directory
  ansible.builtin.file:
    path: "{{ download_dir.path }}"
    state: absent
  when: download_dir is defined and download_dir.path is defined

- name: Verify FileBrowser binary is executable
  ansible.builtin.command: "{{ filebrowser_install_dir }}/filebrowser version"
  register: filebrowser_version_check
  changed_when: false

- name: Display FileBrowser version
  ansible.builtin.debug:
    msg: "Installed {{ filebrowser_version_check.stdout }}"
