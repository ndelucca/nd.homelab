---
# Siembra el usuario admin INICIAL de FileBrowser. FileBrowser guarda los usuarios
# en su base de datos (bbolt), NO en config.json, así que sin este paso el
# filebrowser_admin_password del vault nunca se aplicaría — el servicio
# simplemente auto-crearía un admin/admin por defecto en el primer arranque.
#
# Esto corre una sola vez, ANTES de que el servicio arranque por primera vez, así
# que no hay un lock exclusivo de la DB bbolt tomado por el server corriendo con el
# que pelear. Una vez que la DB existe, no hace nada; cambiar el password después
# desde la UI de FileBrowser.

- name: Check if the FileBrowser database already exists
  ansible.builtin.stat:
    path: "{{ filebrowser_database }}"
  register: filebrowser_db_stat

- name: Ensure the FileBrowser working directory exists
  ansible.builtin.file:
    path: "{{ filebrowser_working_dir }}"
    state: directory
    owner: "{{ filebrowser_user }}"
    group: "{{ filebrowser_group }}"
    mode: '0750'
  become: true
  when: not filebrowser_db_stat.stat.exists

- name: Initialise the FileBrowser database
  ansible.builtin.command:
    cmd: "{{ filebrowser_install_dir }}/filebrowser -d {{ filebrowser_database }} config init"
    chdir: "{{ filebrowser_working_dir }}"
  become: true
  become_user: "{{ filebrowser_user }}"
  when: not filebrowser_db_stat.stat.exists
  changed_when: true

- name: Create the initial FileBrowser admin user
  ansible.builtin.command:
    cmd: >
      {{ filebrowser_install_dir }}/filebrowser -d {{ filebrowser_database }}
      users add {{ filebrowser_admin_username }} {{ filebrowser_admin_password }}
      --perm.admin
    chdir: "{{ filebrowser_working_dir }}"
  become: true
  become_user: "{{ filebrowser_user }}"
  no_log: true
  when: not filebrowser_db_stat.stat.exists
  changed_when: true

# Rotación opt-in para una DB EXISTENTE. bbolt mantiene un lock exclusivo mientras
# el server corre, así que primero hay que frenarlo; service.yml lo reinicia
# después. Gobernado por filebrowser_force_admin_password para que los converges
# normales nunca molesten al server.
- name: Stop FileBrowser to rotate the admin password
  ansible.builtin.systemd:
    name: "{{ filebrowser_service_name }}"
    state: stopped
  become: true
  when:
    - filebrowser_db_stat.stat.exists
    - filebrowser_force_admin_password | bool

- name: Update the FileBrowser admin password
  ansible.builtin.command:
    cmd: >
      {{ filebrowser_install_dir }}/filebrowser -d {{ filebrowser_database }}
      users update {{ filebrowser_admin_username }} --password {{ filebrowser_admin_password }}
    chdir: "{{ filebrowser_working_dir }}"
  become: true
  become_user: "{{ filebrowser_user }}"
  no_log: true
  when:
    - filebrowser_db_stat.stat.exists
    - filebrowser_force_admin_password | bool
  changed_when: true
