---
# Default variables for FileBrowser role
# Only essential installation and service configuration

# Installation configuration
# 'latest' auto-resolves the newest GitHub release on every run; or pin to an
# exact tag like "v2.63.15" to freeze the version.
filebrowser_version: latest
filebrowser_arch: amd64
filebrowser_github_repo: filebrowser/filebrowser
filebrowser_install_dir: /usr/local/bin
# State (SQLite DB + config) lives on the appdata disk (app_data_root, defined in
# group_vars/homeservers/storage.yml).
filebrowser_working_dir: "{{ app_data_root }}/filebrowser"
filebrowser_user: ndelucca
filebrowser_group: ndelucca

# Service configuration
filebrowser_service_name: filebrowser
filebrowser_service_enabled: true
filebrowser_service_state: started

# Network configuration
filebrowser_bind_address: 127.0.0.1
filebrowser_port: 8080

# Firewall settings (used by firewall role)
filebrowser_firewall_zone: public

# Root directory to serve — the disks mount root, so all disks are browsable
# directly (no per-disk symlinks). Can override in inventory.
filebrowser_root_dir: /srv/disks

# Database location
filebrowser_database: "{{ filebrowser_working_dir }}/filebrowser.db"

# Configuration file (optional - FileBrowser can use CLI flags instead)
filebrowser_use_config_file: true
filebrowser_config_file: "{{ filebrowser_working_dir }}/config.json"

# SELinux configuration
filebrowser_manage_selinux: true

# Initial admin credentials (override in host_vars or vault)
filebrowser_admin_username: ndelucca
filebrowser_admin_password: !vault |
  $ANSIBLE_VAULT;1.1;AES256
  32653231303665616139383161393830353334396639633838613533633461353964646132653530
  3262623063643262313966313137343539613665643965340a393665343431383832653036363633
  32346536303335636266663935626565303935346465303336613939303063653437356464393837
  3664666236386631610a383134363334353463393961326163306263366539356363376239313731
  37373131336135326162383931663336303566313561393564326331643533383137
