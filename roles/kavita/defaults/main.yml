---
# Variables por defecto del role Kavita

kavita_user: ndelucca
kavita_group: ndelucca
kavita_uid: 1000  # Se obtiene dinámicamente vía getent en preflight

# Directorios — el estado vive en el disco de appdata (app_data_root, definido en
# group_vars/homeservers/storage.yml).
kavita_base_dir: "{{ app_data_root }}/kavita"
kavita_config_dir: "{{ kavita_base_dir }}/config"
kavita_library_dir: "{{ kavita_base_dir }}/library"

# Rutas de bibliotecas adicionales a montar (lista de rutas)
kavita_extra_libraries: []

kavita_quadlet_dir: /etc/containers/systemd/users  # Containers de usuario gestionados por el sistema

kavita_port: 5000
kavita_host: 127.0.0.1

kavita_timezone: America/Los_Angeles

# Desplegado como un único quadlet .container, así que la unit es kavita.service (el
# viejo .kube producía kavita-pod.service; quadlet.yml limpia la unit legacy).
kavita_service_name: kavita
kavita_service_enabled: true
kavita_service_state: started

kavita_firewall_enabled: false  # false porque NGINX maneja el acceso externo

kavita_manage_selinux: true

# Imagen de Podman. El tag :latest de upstream flota, así que pineamos por digest por
# reproducibilidad. Para actualizar: pullear la imagen nueva y actualizar el digest acá
# (el digest de abajo era la imagen que corría cuando se pineó).
kavita_image: "docker.io/jvmilazz0/kavita@sha256:ca6af7a18d7124d014702983c2364e485294f808c1552e9555f2595b7cda7982"
