---
# Despliega los archivos de unit de Quadlet.

# Migración: el role antes traía un pod .kube (kavita-pod.service). Se frena y elimina
# la unit legacy para que solo quede la nueva kavita.service.
- name: Stop legacy kavita-pod service if present
  ansible.builtin.systemd:
    name: kavita-pod.service
    state: stopped
    scope: user
  become: true
  become_user: "{{ kavita_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ kavita_uid }}"
  failed_when: false

- name: Remove legacy .kube unit and pod YAML
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - "{{ kavita_quadlet_dir }}/{{ kavita_uid }}/kavita-pod.kube"
    - "{{ kavita_config_dir }}/kavita-pod.yaml"
  notify: Container daemon-reload-user

- name: Deploy Kavita Quadlet .container unit
  ansible.builtin.template:
    src: kavita.container.j2
    dest: "{{ kavita_quadlet_dir }}/{{ kavita_uid }}/kavita.container"
    owner: root
    group: root
    mode: '0644'
  become: true
  notify:
    - Container daemon-reload-user
    # Volumen category-less (sin :Z): relabelear a container_file_t:s0 ANTES del restart,
    # o el container nuevo crashea contra la categoría MCS vieja.
    - Container apply selinux context
    - Container restart

# NO se flushean los handlers acá: el paso de service compartido (container_base) los flushea
# DESPUÉS de promover container_base_uid/user/service_name y los paths de SELinux a host facts.
# Flushear antes (como estaba) dispara daemon-reload/restart con container_base_uid undefined
# —corre antes de los include_role de selinux y service— y rompe la corrida al cambiar la unit.
