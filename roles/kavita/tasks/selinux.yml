---
# Configure SELinux for Kavita containers

- name: Display SELinux status
  ansible.builtin.debug:
    msg: "SELinux is {{ ansible_selinux.mode | default('disabled') }}"

- name: Install SELinux policy packages
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
      - container-selinux
    state: present
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'

- name: Set SELinux file contexts for Kavita directories
  community.general.sefcontext:
    target: "{{ item }}(/.*)?"
    setype: container_file_t
    state: present
  become: true
  loop: "{{ [kavita_config_dir, kavita_library_dir] + (kavita_extra_libraries | map(attribute='path') | list) }}"
  when: ansible_selinux.mode | default('') == 'enforcing'
  notify: container apply selinux context

- name: Enable SELinux boolean for container port binding
  ansible.posix.seboolean:
    name: container_use_devices
    state: true
    persistent: true
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'
  failed_when: false
