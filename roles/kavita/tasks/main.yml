---
# Punto de entrada principal del role Kavita

- name: Include preflight checks
  ansible.builtin.import_tasks: preflight.yml
  tags: ['kavita', 'preflight']

- name: Install Podman and dependencies
  ansible.builtin.import_tasks: install.yml
  tags: ['kavita', 'install']

- name: Deploy Quadlet unit files
  ansible.builtin.import_tasks: quadlet.yml
  tags: ['kavita', 'quadlet']

# Se aplican los contextos SELinux antes de que arranque el container para que un host
# en modo enforcing no deniegue el acceso a los volúmenes en la primera corrida.
- name: Configure SELinux (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: selinux
  vars:
    container_base_selinux_paths: "{{ [kavita_config_dir, kavita_library_dir] + (kavita_extra_libraries | map(attribute='path') | list) }}"
  tags: ['kavita', 'selinux']
  when: kavita_manage_selinux | bool

- name: Configure systemd service (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: service
  vars:
    container_base_user: "{{ kavita_user }}"
    container_base_uid: "{{ kavita_uid }}"
    container_base_service_name: "{{ kavita_service_name }}"
    container_base_host: "{{ kavita_host }}"
    container_base_port: "{{ kavita_port }}"
    container_base_service_enabled: "{{ kavita_service_enabled }}"
    container_base_service_state: "{{ kavita_service_state }}"
  tags: ['kavita', 'service']
