---
# Chequeos de preflight para la instalación de Kavita

- name: Common container preflight (Fedora, uid, port, quadlet dir)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: preflight
  vars:
    container_base_user: "{{ kavita_user }}"
    container_base_port: "{{ kavita_port }}"
    container_base_quadlet_dir: "{{ kavita_quadlet_dir }}"

- name: Map the resolved UID to kavita_uid
  ansible.builtin.set_fact:
    kavita_uid: "{{ container_base_uid }}"

- name: Create Kavita base directory
  ansible.builtin.file:
    path: "{{ kavita_base_dir }}"
    state: directory
    owner: "{{ kavita_user }}"
    group: "{{ kavita_group }}"
    mode: '0755'
  become: true

- name: Create Kavita config directory
  ansible.builtin.file:
    path: "{{ kavita_config_dir }}"
    state: directory
    owner: "{{ kavita_user }}"
    group: "{{ kavita_group }}"
    mode: '0755'
  become: true

- name: Create Kavita library directory
  ansible.builtin.file:
    path: "{{ kavita_library_dir }}"
    state: directory
    owner: "{{ kavita_user }}"
    group: "{{ kavita_group }}"
    mode: '0755'
  become: true
