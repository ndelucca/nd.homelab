---
# Chequeos de preflight para la instalación de Kavita

- name: Verify running on Fedora
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Fedora"
    fail_msg: "This role is designed for Fedora systems"
    success_msg: "Running on Fedora {{ ansible_distribution_version }}"

- name: Resolve Kavita user UID for rootless Podman
  ansible.builtin.getent:
    database: passwd
    key: "{{ kavita_user }}"
  check_mode: false

- name: Set kavita_uid fact
  ansible.builtin.set_fact:
    kavita_uid: "{{ getent_passwd[kavita_user][1] }}"

- name: Check availability of port {{ kavita_port }}
  ansible.builtin.shell: |
    ss -tulnp | grep -q ":{{ kavita_port }}\s" && echo "occupied" || echo "available"
  register: kavita_port_check
  changed_when: false
  failed_when: false

- name: Display port status
  ansible.builtin.debug:
    msg: "Port {{ kavita_port }} is {{ kavita_port_check.stdout }}"

# Es una advertencia, no un error: en una re-ejecución se espera que el puerto lo tenga
# ocupado el propio Kavita. `fail` + `ignore_errors` era un guard no-op que nunca se
# disparaba; una advertencia explícita expresa la intención honestamente sin abortar el play.
- name: Warn if port is occupied
  ansible.builtin.debug:
    msg: "WARNING: port {{ kavita_port }} is already in use (expected if Kavita is already running)"
  when: kavita_port_check.stdout == "occupied"

- name: Create Kavita base directory
  ansible.builtin.file:
    path: "{{ kavita_base_dir }}"
    state: directory
    owner: "{{ kavita_user }}"
    group: "{{ kavita_group }}"
    mode: '0755'
  become: true

- name: Create Kavita config directory
  ansible.builtin.file:
    path: "{{ kavita_config_dir }}"
    state: directory
    owner: "{{ kavita_user }}"
    group: "{{ kavita_group }}"
    mode: '0755'
  become: true

- name: Create Kavita library directory
  ansible.builtin.file:
    path: "{{ kavita_library_dir }}"
    state: directory
    owner: "{{ kavita_user }}"
    group: "{{ kavita_group }}"
    mode: '0755'
  become: true

- name: Create Quadlet directory for user
  ansible.builtin.file:
    path: "{{ kavita_quadlet_dir }}/{{ kavita_uid }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
