# Los handlers de Kavita los provee el role compartido container_base (incluido desde
# tasks/install.yml). Este role solo aporta las variables de contrato en
# defaults/main.yml (container_user/uid/service_name/selinux_paths) y notifica los
# handlers genéricos: `container daemon-reload-user`, `container restart`,
# `container apply selinux context`.
