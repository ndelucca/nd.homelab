---
# Handlers for Kavita role

- name: daemon-reload-user
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ kavita_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ kavita_uid }}"

- name: restart kavita-pod
  ansible.builtin.systemd:
    name: "{{ kavita_service_name }}"
    state: restarted
    scope: user
  become: true
  become_user: "{{ kavita_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ kavita_uid }}"

- name: apply selinux context
  ansible.builtin.command: "restorecon -Rv {{ item }}"
  become: true
  changed_when: false
  loop: "{{ [kavita_config_dir, kavita_library_dir] + (kavita_extra_libraries | map(attribute='path') | list) }}"
