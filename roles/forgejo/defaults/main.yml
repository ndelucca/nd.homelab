---
# Variables por defecto del role Forgejo

forgejo_user: ndelucca
forgejo_group: ndelucca
forgejo_uid: 1000  # Se obtiene dinámicamente vía getent en preflight

# Directorios — el estado vive en el disco de appdata (app_data_root, definido en
# group_vars/homeservers/storage.yml).
forgejo_base_dir: "{{ app_data_root }}/forgejo"
forgejo_data_dir: "{{ forgejo_base_dir }}/data"      # -> /var/lib/gitea
forgejo_config_dir: "{{ forgejo_base_dir }}/config"  # -> /etc/gitea (app.ini)

forgejo_quadlet_dir: /etc/containers/systemd/users  # Containers de usuario gestionados por el sistema
forgejo_container_name: forgejo

forgejo_port: 3000          # HTTP, bindeado a localhost, servido vía NGINX
forgejo_host: 127.0.0.1
forgejo_ssh_port: 2222      # git sobre SSH, expuesto en la LAN (sshd propio del container)
# Se bindea git-SSH a la IP de la LAN, no a 0.0.0.0, para que sea accesible en la LAN
# pero no en ninguna otra interfaz (ej. una futura VPN/WAN). Por defecto toma la IPv4
# primaria del host; sobreescribir en host_vars si la NIC de la LAN no es la ruta por defecto.
forgejo_ssh_host: "{{ ansible_default_ipv4.address }}"

# La variante de imagen -rootless corre directamente como el usuario git (sin s6/drop
# de root), que es la forma soportada de correr bajo Podman rootless con UserNS=keep-id.
forgejo_version: "11.0.1-rootless"   # Tag de imagen pineado
forgejo_image: "codeberg.org/forgejo/forgejo:{{ forgejo_version }}"
forgejo_domain: "git.{{ nginx_domain }}"
forgejo_root_url: "https://{{ forgejo_domain }}/"
forgejo_timezone: America/Los_Angeles
forgejo_disable_registration: true

# Usuario admin (creado tras el deploy). La contraseña DEBE setearse vía vault en host_vars.
forgejo_admin_user: ndelucca
forgejo_admin_email: ndelucca@protonmail.com
forgejo_admin_password: ""

forgejo_service_name: forgejo  # unit forgejo.container -> forgejo.service
forgejo_service_enabled: true
forgejo_service_state: started

forgejo_firewall_zone: FedoraServer
forgejo_firewall_enabled: true  # true: hay que abrir el puerto de git SSH

forgejo_manage_selinux: true

# Pull mirrors: Forgejo replica repos remotos (GitHub) con fetch periódico.
# El home-server no es accesible desde GitHub, pero GitHub siempre lo es desde el
# server, así que la sincronización es saliente (Forgejo hace pull). GitHub es la
# fuente de verdad; los repos en Forgejo son mirrors de solo lectura (se sobreescriben
# en cada sync).
forgejo_pull_mirror_enabled: false                  # interruptor maestro (activar en host_vars)
forgejo_mirror_interval: "8h0m0s"                   # >= [mirror].MIN_INTERVAL (10m)
forgejo_github_user: "{{ forgejo_admin_user }}"     # de quién enumerar los repos de GitHub
forgejo_mirror_owner: "{{ forgejo_admin_user }}"    # dueño de los mirrors dentro de Forgejo
forgejo_mirror_include_forks: true
forgejo_mirror_include_archived: true
forgejo_mirror_max_pages: 5                          # tope de paginación (5*100=500 repos); avisa si se llena
forgejo_mirror_force_recreate: []                   # repos a borrar+recrear como mirror (destructivo, una sola vez)

# GitHub Personal Access Token (classic: scope 'repo'; o fine-grained: Contents
# Read + Metadata Read). REQUERIDO cuando forgejo_pull_mirror_enabled — setear vía vault.
forgejo_github_token: ""

# Contrato de container_base — alimenta el install + handlers compartidos (ver container_base).
container_user: "{{ forgejo_user }}"
container_uid: "{{ forgejo_uid }}"
container_service_name: "{{ forgejo_service_name }}"
container_selinux_paths: "{{ [forgejo_data_dir, forgejo_config_dir] }}"
# Contrato del service-step de container_base (enable + wait_for). El primer arranque
# de Forgejo puede ser lento, así que se permite un timeout de espera más largo.
container_host: "{{ forgejo_host }}"
container_port: "{{ forgejo_port }}"
container_service_enabled: "{{ forgejo_service_enabled }}"
container_service_state: "{{ forgejo_service_state }}"
container_wait_timeout: 180
