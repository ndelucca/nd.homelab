---
# Handlers for Forgejo rootless Podman role

- name: daemon-reload-user
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ forgejo_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ forgejo_uid }}"

- name: restart forgejo
  ansible.builtin.systemd:
    name: "{{ forgejo_service_name }}"
    state: restarted
    scope: user
  become: true
  become_user: "{{ forgejo_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ forgejo_uid }}"

- name: apply selinux context
  ansible.builtin.command: "restorecon -Rv {{ item }}"
  become: true
  loop:
    - "{{ forgejo_data_dir }}"
    - "{{ forgejo_config_dir }}"
  changed_when: false
