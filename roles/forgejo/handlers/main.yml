---
# Handlers for Forgejo rootless Podman role

# Explicit `systemctl --user daemon-reload`: the systemd module's user-scope
# daemon_reload does not reliably regenerate Quadlet units (the generated unit
# keeps stale paths), whereas the command does.
- name: forgejo daemon-reload-user  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: systemctl --user daemon-reload
  become: true
  become_user: "{{ forgejo_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ forgejo_uid }}"
  changed_when: false

- name: restart forgejo
  ansible.builtin.systemd:
    name: "{{ forgejo_service_name }}"
    state: restarted
    scope: user
  become: true
  become_user: "{{ forgejo_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ forgejo_uid }}"

- name: forgejo apply selinux context
  ansible.builtin.command: "restorecon -Rv {{ item }}"
  become: true
  loop:
    - "{{ forgejo_data_dir }}"
    - "{{ forgejo_config_dir }}"
  changed_when: false
