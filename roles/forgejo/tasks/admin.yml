---
# Crea el usuario admin inicial de Forgejo (idempotente).
# Corre `forgejo admin user create` dentro del container en ejecución, como el
# usuario de servicio rootless. Tolera re-ejecuciones: un usuario ya existente se
# reporta pero no se trata como error.

- name: Ensure admin password is set
  ansible.builtin.assert:
    that:
      - forgejo_admin_password | length > 0
    fail_msg: "forgejo_admin_password must be set (use Ansible Vault in host_vars)"

# La contraseña se pasa al container vía `podman exec --env NAME` (pass-through:
# podman lee NAME de su propio entorno, que Ansible setea abajo) y se referencia como
# $FORGEJO_ADMIN_PASSWORD dentro de un `sh -c`, así el texto plano nunca aparece en
# la tabla de procesos / argv del host.
- name: Create Forgejo admin user
  ansible.builtin.command:
    argv:
      - podman
      - exec
      - --env
      - FORGEJO_ADMIN_PASSWORD
      - "{{ forgejo_container_name }}"
      - sh
      - -c
      - >-
        forgejo admin user create --admin
        --username "{{ forgejo_admin_user }}"
        --password "$FORGEJO_ADMIN_PASSWORD"
        --email "{{ forgejo_admin_email }}"
        --must-change-password=false
  become: true
  become_user: "{{ forgejo_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ forgejo_uid }}"
    FORGEJO_ADMIN_PASSWORD: "{{ forgejo_admin_password }}"
  register: forgejo_admin_create
  changed_when: "'has been successfully created' in forgejo_admin_create.stdout"
  failed_when:
    - forgejo_admin_create.rc != 0
    - "'user already exists' not in forgejo_admin_create.stderr"
    - "'name is already used' not in forgejo_admin_create.stderr"
  no_log: true

# `admin user create` se saltea una vez que el usuario existe, así que la contraseña
# puede divergir del valor del vault. Se fuerza en cada deploy para que la API (basic
# auth) funcione. Mismo truco de pass-through por entorno para mantener el secreto
# fuera del argv del host.
- name: Enforce Forgejo admin password
  ansible.builtin.command:
    argv:
      - podman
      - exec
      - --env
      - FORGEJO_ADMIN_PASSWORD
      - "{{ forgejo_container_name }}"
      - sh
      - -c
      - >-
        forgejo admin user change-password
        --username "{{ forgejo_admin_user }}"
        --password "$FORGEJO_ADMIN_PASSWORD"
        --must-change-password=false
  become: true
  become_user: "{{ forgejo_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ forgejo_uid }}"
    FORGEJO_ADMIN_PASSWORD: "{{ forgejo_admin_password }}"
  register: forgejo_admin_password_set
  # Forgejo reporta éxito haya diferido o no la contraseña, así que no podemos detectar
  # un cambio real; se trata como un paso idempotente que fuerza el estado.
  changed_when: false
  no_log: true
