---
# Chequeos de preflight y armado de directorios para Forgejo

- name: Verify Fedora operating system
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Fedora"
    fail_msg: "This role only supports Fedora"
    success_msg: "Running on Fedora {{ ansible_distribution_version }}"

- name: Resolve forgejo user UID for rootless Podman
  ansible.builtin.getent:
    database: passwd
    key: "{{ forgejo_user }}"
  check_mode: false

- name: Set forgejo_uid fact
  ansible.builtin.set_fact:
    forgejo_uid: "{{ getent_passwd[forgejo_user][1] }}"

- name: Display user UID
  ansible.builtin.debug:
    msg: "Using UID {{ forgejo_uid }} for user {{ forgejo_user }}"

- name: Ensure base directory exists
  ansible.builtin.file:
    path: "{{ forgejo_base_dir }}"
    state: directory
    owner: "{{ forgejo_user }}"
    group: "{{ forgejo_group }}"
    mode: '0755'
  become: true

- name: Ensure data and config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ forgejo_user }}"
    group: "{{ forgejo_group }}"
    mode: '0750'
  become: true
  loop:
    - "{{ forgejo_data_dir }}"
    - "{{ forgejo_config_dir }}"

- name: Check availability of port {{ forgejo_port }}
  ansible.builtin.shell: |
    ss -tulnp | grep -q ":{{ forgejo_port }}\s" && echo "occupied" || echo "available"
  register: forgejo_port_check
  changed_when: false
  failed_when: false

- name: Display port status
  ansible.builtin.debug:
    msg: "Port {{ forgejo_port }} is {{ forgejo_port_check.stdout }}"

# Es una advertencia, no un error: en una re-ejecución se espera que el puerto lo
# tenga ocupado el propio Forgejo (consistente con los demás roles de container).
- name: Warn if port is occupied
  ansible.builtin.debug:
    msg: "WARNING: port {{ forgejo_port }} is already in use (expected if Forgejo is already running)"
  when: forgejo_port_check.stdout == "occupied"
