---
# Chequeos de preflight y armado de directorios para Forgejo

- name: Common container preflight (Fedora, uid, port)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: preflight
  vars:
    container_base_user: "{{ forgejo_user }}"
    container_base_port: "{{ forgejo_port }}"

- name: Map the resolved UID to forgejo_uid
  ansible.builtin.set_fact:
    forgejo_uid: "{{ container_base_uid }}"

- name: Ensure base directory exists
  ansible.builtin.file:
    path: "{{ forgejo_base_dir }}"
    state: directory
    owner: "{{ forgejo_user }}"
    group: "{{ forgejo_group }}"
    mode: '0755'
  become: true

- name: Ensure data and config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ forgejo_user }}"
    group: "{{ forgejo_group }}"
    mode: '0750'
  become: true
  loop:
    - "{{ forgejo_data_dir }}"
    - "{{ forgejo_config_dir }}"
