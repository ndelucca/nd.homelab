---
# Main entry point for Forgejo role

- name: Include preflight checks
  ansible.builtin.import_tasks: preflight.yml
  tags: ['forgejo', 'preflight']

- name: Install Podman and dependencies
  ansible.builtin.import_tasks: install.yml
  tags: ['forgejo', 'install']

- name: Deploy Quadlet configuration
  ansible.builtin.import_tasks: quadlet.yml
  tags: ['forgejo', 'quadlet']

# Apply SELinux contexts before the container starts so an enforcing host does
# not deny volume access on the first run (admin/mirror run after, against the
# already-running container).
- name: Configure SELinux
  ansible.builtin.import_tasks: selinux.yml
  tags: ['forgejo', 'selinux']
  when: forgejo_manage_selinux | bool

- name: Configure systemd service
  ansible.builtin.import_tasks: service.yml
  tags: ['forgejo', 'service']

- name: Create admin user
  ansible.builtin.import_tasks: admin.yml
  tags: ['forgejo', 'admin']

- name: Configure pull mirrors from GitHub
  ansible.builtin.import_tasks: mirror.yml
  tags: ['forgejo', 'mirror']
