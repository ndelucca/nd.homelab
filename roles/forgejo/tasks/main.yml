---
# Punto de entrada principal del role Forgejo

- name: Include preflight checks
  ansible.builtin.import_tasks: preflight.yml
  tags: ['forgejo', 'preflight']

- name: Install Podman and dependencies
  ansible.builtin.import_tasks: install.yml
  tags: ['forgejo', 'install']

- name: Deploy Quadlet configuration
  ansible.builtin.import_tasks: quadlet.yml
  tags: ['forgejo', 'quadlet']

# Se aplican los contextos SELinux antes de que arranque el container para que un host
# en modo enforcing no deniegue el acceso a los volúmenes en la primera corrida
# (admin/mirror corren después, contra el container ya en ejecución).
- name: Configure SELinux (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: selinux
  tags: ['forgejo', 'selinux']
  when: forgejo_manage_selinux | bool

- name: Configure systemd service (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: service
  tags: ['forgejo', 'service']

- name: Create admin user
  ansible.builtin.import_tasks: admin.yml
  tags: ['forgejo', 'admin']

- name: Configure pull mirrors from GitHub
  ansible.builtin.import_tasks: mirror.yml
  tags: ['forgejo', 'mirror']
