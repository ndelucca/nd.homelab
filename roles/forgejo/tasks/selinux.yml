---
# Configure SELinux for Forgejo

- name: Check SELinux status
  ansible.builtin.command: getenforce
  register: selinux_status
  changed_when: false

- name: Display SELinux status
  ansible.builtin.debug:
    msg: "SELinux is {{ selinux_status.stdout }}"

- name: Install SELinux packages
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
      - container-selinux
    state: present
  become: true
  when: selinux_status.stdout == "Enforcing"

- name: Set SELinux context for data and config directories
  community.general.sefcontext:
    target: "{{ item }}(/.*)?"
    setype: container_file_t
    state: present
  become: true
  loop:
    - "{{ forgejo_data_dir }}"
    - "{{ forgejo_config_dir }}"
  when: selinux_status.stdout == "Enforcing"
  notify: apply selinux context

- name: Apply SELinux context immediately
  ansible.builtin.command: "restorecon -Rv {{ item }}"
  become: true
  loop:
    - "{{ forgejo_data_dir }}"
    - "{{ forgejo_config_dir }}"
  when: selinux_status.stdout == "Enforcing"
  changed_when: false
