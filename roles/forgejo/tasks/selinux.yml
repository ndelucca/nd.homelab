---
# Configure SELinux for Forgejo

- name: Display SELinux status
  ansible.builtin.debug:
    msg: "SELinux is {{ ansible_selinux.mode | default('disabled') }}"

- name: Install SELinux packages
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
      - container-selinux
    state: present
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'

- name: Set SELinux context for data and config directories
  community.general.sefcontext:
    target: "{{ item }}(/.*)?"
    setype: container_file_t
    state: present
  become: true
  loop:
    - "{{ forgejo_data_dir }}"
    - "{{ forgejo_config_dir }}"
  when: ansible_selinux.mode | default('') == 'enforcing'
  notify: forgejo apply selinux context

- name: Apply SELinux context immediately
  ansible.builtin.command: "restorecon -Rv {{ item }}"
  become: true
  loop:
    - "{{ forgejo_data_dir }}"
    - "{{ forgejo_config_dir }}"
  when: ansible_selinux.mode | default('') == 'enforcing'
  changed_when: false
