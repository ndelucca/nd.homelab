---
# Actualiza el ecosistema Klipper a través de la API de update de Moonraker:
# exactamente lo que hace el botón "Update" de Mainsail. Moonraker maneja los git
# pulls, las reconstrucciones de venv, las dependencias del sistema y los
# reinicios de servicios en el orden correcto. Corre como el usuario de la
# impresora (become: false); 127.0.0.1 mantiene las peticiones en la confianza de
# loopback de Moonraker.

# refresh=false usa el cache ya poblado de Moonraker (instantáneo); refresh=true
# fuerza una consulta síncrona a GitHub por cada componente y rutinariamente
# excede el timeout HTTP. De todos modos el POST /machine/update/full real
# refresca por su cuenta.
- name: Fetch the pre-update status
  ansible.builtin.uri:
    url: "{{ mainsailos_moonraker_url }}/machine/update/status?refresh=false"
    headers: "{{ mainsailos_api_headers }}"
    timeout: 60
    status_code: [200, 401]
  register: mainsailos_klipper_pre
  changed_when: false
  check_mode: false
  become: false

- name: Fail clearly if Moonraker rejected the request (auth required)
  ansible.builtin.fail:
    msg: >-
      Moonraker returned 401 Unauthorized. The loopback trust may be disabled.
      Set mainsailos_moonraker_api_key (e.g. via -e or host_vars) to a valid key
      from the Pi's ~/printer_data/moonraker.secrets and re-run.
  when: mainsailos_klipper_pre.status | default(200) == 401

- name: Report components that have updates available
  ansible.builtin.debug:
    msg: >-
      {{ item.key }}: {{ item.value.version | default('?') }}
      -> {{ item.value.remote_version | default(item.value.version | default('?')) }}
  loop: "{{ (mainsailos_klipper_pre.json.result.version_info | default({})) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Build the list of Moonraker update endpoints
  ansible.builtin.set_fact:
    mainsailos_update_endpoints: >-
      {{ [mainsailos_moonraker_url + '/machine/update/full']
         if mainsailos_moonraker_update_target == 'full'
         else (
           (mainsailos_components
              | map('regex_replace', '^', mainsailos_moonraker_url + '/machine/update/')
              | list)
           + (mainsailos_web_clients
              | map('regex_replace', '^(.*)$',
                    mainsailos_moonraker_url + '/machine/update/client?name=\\1')
              | list)
         ) }}

# El POST bloquea hasta que termina todo el update, que en una Pi 3B+ puede llevar
# bastante más de una hora en un salto grande (las reconstrucciones de venv
# compilan wheels en swap). Un timeout HTTP del lado del cliente NO cancela el
# trabajo: Moonraker corre el update en su propia tarea y sigue después de que nos
# desconectamos. Por eso tratamos un timeout acá como no fatal y dejamos que el
# busy-poll de abajo sea la espera autoritativa.
- name: Trigger the Moonraker update(s)
  ansible.builtin.uri:
    url: "{{ item }}"
    method: POST
    headers: "{{ mainsailos_api_headers }}"
    timeout: "{{ mainsailos_update_timeout }}"
    status_code: [200]
  loop: "{{ mainsailos_update_endpoints }}"
  loop_control:
    label: "{{ item }}"
  register: mainsailos_update_results
  become: false
  failed_when: false
  when: not ansible_check_mode

- name: Wait until Moonraker is no longer busy updating (authoritative)
  ansible.builtin.uri:
    url: "{{ mainsailos_moonraker_url }}/machine/update/status?refresh=false"
    headers: "{{ mainsailos_api_headers }}"
    timeout: 30
    status_code: [200]
  register: mainsailos_poll
  # Moonraker se reinicia a sí mismo a mitad del update, así que el endpoint queda
  # brevemente inalcanzable (status -1): reintentamos hasta que responda 200 Y
  # reporte que no está ocupado.
  until: (mainsailos_poll.status | default(-1)) == 200 and not (mainsailos_poll.json.result.busy | default(true))
  retries: "{{ mainsailos_update_poll_retries }}"
  delay: "{{ mainsailos_update_poll_delay }}"
  changed_when: false
  failed_when: false
  become: false
  when: not ansible_check_mode

- name: Fetch the post-update status
  ansible.builtin.uri:
    url: "{{ mainsailos_moonraker_url }}/machine/update/status?refresh=false"
    headers: "{{ mainsailos_api_headers }}"
    timeout: 60
  register: mainsailos_klipper_post
  changed_when: false
  become: false
  when: not ansible_check_mode

- name: Report installed versions after the Klipper stack update
  ansible.builtin.debug:
    msg: "{{ item.key }}: now at {{ item.value.version | default('?') }}"
  loop: "{{ (mainsailos_klipper_post.json.result.version_info | default({})) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: not ansible_check_mode

- name: Warn about any component still behind its remote version
  ansible.builtin.debug:
    msg: >-
      {{ item.key }} did not reach the latest version
      ({{ item.value.version | default('?') }} != {{ item.value.remote_version | default('?') }}).
      Re-run the playbook or check the Mainsail update panel.
  loop: "{{ (mainsailos_klipper_post.json.result.version_info | default({})) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - not ansible_check_mode
    - item.value.remote_version is defined
    - item.value.version is defined
    - item.value.version != item.value.remote_version
