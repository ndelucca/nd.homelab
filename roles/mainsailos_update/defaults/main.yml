---
# Variables por defecto del role mainsailos_update.
# Sobrescribir por host en inventory/host_vars o con -e en la línea de comandos.

mainsailos_backup_enabled: true          # siempre hacer backup antes de cambiar nada
mainsailos_update_klipper_stack: true    # klipper/moonraker/mainsail/crowsnest vía Moonraker
mainsailos_apt_upgrade: true             # upgrade de paquetes del SO Debian
mainsailos_reboot_if_required: true      # auto-reboot cuando el SO lo pide
mainsailos_fail_on_mcu_mismatch: false   # por defecto solo advierte (no flashea el MCU)

# 127.0.0.1 (literal) mantiene las peticiones en el camino de confianza de
# loopback, así no hace falta API key salvo que se haya endurecido
# [authorization] en la Pi.
mainsailos_moonraker_url: "http://127.0.0.1:7125"
mainsailos_moonraker_update_target: full   # full | per-component
mainsailos_moonraker_api_key: ""           # header X-Api-Key si la confianza de loopback está deshabilitada
# Se envía en cada petición a Moonraker; dict vacío cuando no hay API key configurada.
mainsailos_api_headers: >-
  {{ {'X-Api-Key': mainsailos_moonraker_api_key}
     if (mainsailos_moonraker_api_key | length > 0) else {} }}
# Timeout HTTP por POST. Un timeout acá no es fatal (el update sigue corriendo del
# lado del server); un valor más chico solo nos lleva antes al busy-poll
# autoritativo. El presupuesto de poll de abajo es lo que realmente acota cuánto
# esperamos.
mainsailos_update_timeout: 600
mainsailos_update_poll_retries: 180        # 180 * 30s = hasta 90 min para los saltos grandes
mainsailos_update_poll_delay: 30
# Se usa solo cuando mainsailos_moonraker_update_target != 'full'
mainsailos_components:
  - klipper
  - moonraker
mainsailos_web_clients:
  - mainsail

mainsailos_printer_data_dir: "/home/{{ ansible_user }}/printer_data"
mainsailos_backup_dir: "/home/{{ ansible_user }}/printer_data_backups"
mainsailos_backup_paths:                 # subdirectorios de printer_data a archivar
  - config
  - database
  - certs
mainsailos_backup_include_gcodes: false  # los gcodes son grandes y no críticos
mainsailos_backup_retention: 5           # conservar los N archivos más nuevos
mainsailos_backup_remote_fetch: false    # además traer el tar de vuelta al controller
mainsailos_backup_fetch_dest: "./backups/mainsailos/"
mainsailos_managed_repos:                # capturados en el manifiesto de rollback
  - "/home/{{ ansible_user }}/klipper"
  - "/home/{{ ansible_user }}/moonraker"
  - "/home/{{ ansible_user }}/crowsnest"
  - "/home/{{ ansible_user }}/mainsail-config"
  - "/home/{{ ansible_user }}/moonraker-timelapse"
  - "/home/{{ ansible_user }}/klipper-conf"
mainsailos_mainsail_version_file: "/home/{{ ansible_user }}/mainsail/.version"

mainsailos_apt_upgrade_type: safe        # safe | dist | full
mainsailos_apt_autoremove: true
mainsailos_apt_cache_valid_time: 3600

mainsailos_services:
  - klipper
  - moonraker
  - crowsnest
  - nginx
