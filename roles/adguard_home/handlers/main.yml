---
# Handlers for AdGuard Home role

- name: daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: restart adguardhome
  ansible.builtin.systemd:
    name: "{{ adguard_service_name }}"
    state: restarted
  become: true
  listen: restart adguardhome

- name: reload systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: reloaded
  become: true

- name: reload firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: reloaded
  become: true

- name: wait for adguard
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 53
    timeout: 10
    msg: "AdGuard DNS did not come back up"
  listen: restart adguardhome

# NGINX is intentionally NOT started here. Starting it is the orchestration
# play's job (site.yml post_tasks), which runs after every role — so the cross-
# role coupling (and the ignore_errors that hid a broken NGINX) lives in one
# explicit place instead of firing on every AdGuard restart.
