---
# Configure SELinux for AdGuard Home native installation

- name: Display SELinux status
  ansible.builtin.debug:
    msg: "SELinux is {{ ansible_selinux.mode | default('disabled') }}"

- name: Install SELinux policy packages
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
    state: present
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'

- name: Set SELinux context for AdGuard Home binary
  community.general.sefcontext:
    target: "{{ adguard_install_dir }}/AdGuardHome"
    setype: bin_t
    state: present
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'

- name: Set SELinux context for AdGuard Home working directory
  community.general.sefcontext:
    target: "{{ adguard_working_dir }}(/.*)?"
    setype: var_lib_t
    state: present
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'

- name: Apply SELinux context to AdGuard Home binary
  ansible.builtin.command: "restorecon -v {{ adguard_install_dir }}/AdGuardHome"
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'
  changed_when: false

- name: Apply SELinux context to AdGuard Home working directory
  ansible.builtin.command: "restorecon -Rv {{ adguard_working_dir }}"
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'
  changed_when: false

# Note: binding to port 53 is granted by CAP_NET_BIND_SERVICE (setcap in
# install.yml), so no SELinux boolean is needed. The old nis_enabled toggle was
# cargo-cult — it is the NIS/ypbind boolean and had no real effect on port binding.
