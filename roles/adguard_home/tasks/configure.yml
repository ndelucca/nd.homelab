---
# Configure AdGuard Home with custom settings

# Seed-once for users/passwords: the admin password is editable in the web UI,
# which writes the new bcrypt hash back into AdGuardHome.yaml. To avoid clobbering
# it on every converge, read the live config and reuse its users if it already
# has any; only fall back to the vault-seeded adguard_users on first deploy.
- name: Check for an existing AdGuard Home config
  ansible.builtin.stat:
    path: "{{ adguard_working_dir }}/AdGuardHome.yaml"
  register: adguard_existing_config
  become: true
  when: adguard_configure_app | bool

- name: Read the existing AdGuard Home config (to preserve UI-set users)
  ansible.builtin.slurp:
    src: "{{ adguard_working_dir }}/AdGuardHome.yaml"
  register: adguard_existing_raw
  become: true
  no_log: true
  when:
    - adguard_configure_app | bool
    - adguard_existing_config.stat.exists | default(false)

- name: Resolve the users to render (seed once, then preserve)
  ansible.builtin.set_fact:
    adguard_effective_users: >-
      {{ (adguard_existing_raw.content | b64decode | from_yaml).users
         if (adguard_existing_config.stat.exists | default(false)
              and (adguard_existing_raw.content | default('') | b64decode | from_yaml).users | default([]) | length > 0)
         else adguard_users }}
  no_log: true
  when: adguard_configure_app | bool

- name: Stop AdGuard Home service before configuration
  ansible.builtin.systemd:
    name: "{{ adguard_service_name }}"
    state: stopped
  become: true
  when: adguard_configure_app | bool

- name: Deploy AdGuard Home configuration file
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ adguard_working_dir }}/AdGuardHome.yaml"
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    mode: '0600'
  become: true
  when: adguard_configure_app | bool
  notify: restart adguardhome

- name: Ensure data directory exists
  ansible.builtin.file:
    path: "{{ adguard_working_dir }}/data"
    state: directory
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    mode: '0700'
  become: true
  when: adguard_configure_app | bool

- name: Deploy DHCP static leases configuration
  ansible.builtin.template:
    src: leases.json.j2
    dest: "{{ adguard_working_dir }}/data/leases.json"
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    mode: '0600'
  become: true
  when:
    - adguard_configure_app | bool
    - adguard_dhcp_enabled | bool
    - adguard_dhcp_static_leases | length > 0
  notify: restart adguardhome

# Reconcile: if static leases were configured before but the list is now empty
# (or DHCP turned off), remove the stale leases.json instead of leaving the old
# reservations on disk.
- name: Remove stale DHCP leases file when no static leases are configured
  ansible.builtin.file:
    path: "{{ adguard_working_dir }}/data/leases.json"
    state: absent
  become: true
  when:
    - adguard_configure_app | bool
    - not (adguard_dhcp_enabled | bool) or (adguard_dhcp_static_leases | length == 0)
  notify: restart adguardhome

- name: Display configuration information
  ansible.builtin.debug:
    msg: |
      AdGuard Home configuration has been deployed.

      Configuration file: {{ adguard_working_dir }}/AdGuardHome.yaml
      DHCP leases: {{ adguard_working_dir }}/data/leases.json

      IMPORTANT: If you set custom passwords in the configuration,
      make sure they are bcrypt hashed.

      To generate a bcrypt hash:
      htpasswd -nbB "" "yourpassword" | cut -d ":" -f 2
  when: adguard_configure_app | bool
