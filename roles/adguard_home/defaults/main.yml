---
# Variables por defecto del role de AdGuard Home.
# Solo configuración esencial de instalación y servicio; los valores de config de
# la aplicación van hardcodeados en el template.

# Fijado a un tag exacto para reproducibilidad. IMPORTANTE: mantener esto en sync
# con adguard_schema_version más abajo — el config templado lleva un schema_version
# que debe coincidir con el schema nativo del binario, o AdGuard re-migra el config
# en cada reinicio y puede descartar campos que el template no modela. El schema
# nativo de v0.107.77 es 34 (LastSchemaVersion de confmigrate). Poné 'latest' solo
# si además dejás de templar por completo AdGuardHome.yaml. Subí ambos juntos.
adguard_version: v0.107.77
adguard_github_repo: AdguardTeam/AdGuardHome
adguard_install_dir: /usr/local/bin
adguard_working_dir: /opt/AdGuardHome
adguard_user: ndelucca
adguard_group: ndelucca

adguard_service_name: AdGuardHome
adguard_service_enabled: true
adguard_service_state: started

# Puertos de red (usados por el role de firewall)
adguard_bind_host: 127.0.0.1
adguard_bind_port: 3000
adguard_admin_port: 8081
adguard_dns_port: 53
adguard_dns_over_tls_port: 853
adguard_dns_over_quic_port: 853
adguard_dns_over_https_port: 443

adguard_set_capabilities: true
adguard_capabilities:
  - CAP_NET_BIND_SERVICE
  - CAP_NET_RAW

adguard_disable_systemd_resolved_stub: true
adguard_resolved_dns_servers:
  - 127.0.0.1
adguard_resolved_fallback_dns:
  - 1.1.1.1
  - 8.8.8.8

adguard_selinux_state: enforcing
adguard_manage_selinux: true

adguard_configure_app: false  # poné true en el inventario para desplegar el config

# Usuarios - proveer en host_vars con passwords hasheadas. Estas SIEMBRAN el config
# solo en el primer deploy; después se preserva la password que setees en la web UI
# (configure.yml lee el config vivo y conserva sus usuarios). Para rotar desde Ansible,
# cambiala en la UI, o borrá AdGuardHome.yaml para re-sembrar.
adguard_users: []

# Resuelto en runtime por configure.yml: los usuarios ya presentes en la máquina si
# el config ya tiene alguno, sino adguard_users. El template renderiza ESTO, no el
# adguard_users crudo, así una password seteada en la UI nunca se pisa en los re-runs.
adguard_effective_users: "{{ adguard_users }}"

# Servidores DNS upstream - se pueden sobrescribir en host_vars
adguard_upstream_dns:
  - tls://1.1.1.1
  - tls://8.8.8.8
  - tls://94.140.14.140

# DNS de bootstrap - se pueden sobrescribir en host_vars
adguard_bootstrap_dns:
  - 1.1.1.1
  - 8.8.8.8

adguard_fallback_dns:
  - 1.1.1.1
  - 8.8.8.8

# Hosts bloqueados - se pueden sobrescribir en host_vars
adguard_blocked_hosts:
  - version.bind
  - id.server
  - hostname.bind

adguard_cache_enabled: true

adguard_querylog_interval: 2160h  # 90 días
adguard_querylog_enabled: true
adguard_querylog_file_enabled: true

adguard_stats_interval: 24h
adguard_stats_enabled: true

# Filtros - proveer la estructura compleja en host_vars
adguard_filters:
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
    name: AdGuard DNS filter
    id: 1

# Configuración de DHCP - valores simples en el inventario
adguard_dhcp_enabled: false
adguard_dhcp_interface_name: eth0
adguard_dhcp_local_domain: lan
adguard_dhcp_gateway_ip: 192.168.1.1
adguard_dhcp_subnet_mask: 255.255.255.0
adguard_dhcp_range_start: 192.168.1.100
adguard_dhcp_range_end: 192.168.1.200
adguard_dhcp_lease_duration: 86400

# Leases estáticos de DHCP - proveer la estructura compleja en host_vars
adguard_dhcp_static_leases: []

# Rewrites de DNS - proveer la estructura compleja en host_vars
adguard_dns_rewrites: []

# Reglas de usuario - reglas de filtrado custom (usar @@||domain^ para whitelist)
adguard_user_rules: []

adguard_filtering_enabled: true
adguard_rewrites_enabled: true
adguard_protection_enabled: true

# Versión del schema. DEBE coincidir con el schema nativo del adguard_version fijado
# (ver la nota allá). v0.107.77 -> 34. Subí ambos juntos al actualizar.
adguard_schema_version: 34
