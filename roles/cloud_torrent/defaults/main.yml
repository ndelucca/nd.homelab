---
cloud_torrent_version: "0.9.4"
cloud_torrent_arch: amd64
cloud_torrent_download_url: "https://github.com/jpillora/cloud-torrent/releases/download/v{{ cloud_torrent_version }}/cloud-torrent_{{ cloud_torrent_version }}_linux_{{ cloud_torrent_arch }}.gz"
# SHA256 del archive linux/amd64 pineado, tomado del archivo de checksums del
# release (cloud-torrent_{{ cloud_torrent_version }}_checksums.txt). Actualizar si
# cambia la versión o la arch pineada.
cloud_torrent_sha256: "ef8b5e21730d50a962af8cf7bbc46a6c46aa8ed3285ee39c1a9728ccee67f95a"
cloud_torrent_install_dir: /usr/local/bin
# El estado (config + metadata de torrents) vive en el disco de appdata
# (app_data_root, definido en group_vars/homeservers/storage.yml).
cloud_torrent_working_dir: "{{ app_data_root }}/cloud-torrent"

cloud_torrent_user: ndelucca
cloud_torrent_group: ndelucca
cloud_torrent_service_name: cloud-torrent
cloud_torrent_service_enabled: true
cloud_torrent_service_state: started

cloud_torrent_port: 9091
cloud_torrent_host: 127.0.0.1

# Puerto de peers (entrante) de BitTorrent. Es el IncomingPort por defecto del
# motor de torrents, persistido en cloud_torrent_config_path (el motor no tiene
# flag de CLI para esto; se cambia desde la web UI para sobrescribirlo). Se nombra
# acá para que no sea un número mágico sin trazar. Abrirlo en la LAN está gobernado
# por el toggle de abajo y está OFF por defecto: el host es solo LAN sin
# port-forward en el router, así que igual no pueden llegar peers entrantes desde
# internet. El peering saliente (NAT) funciona sin ningún puerto abierto. Cambiar
# el toggle (y agregar un forward en el router) si eso cambia; el role firewall
# consume ambas vars (setearlas en services.yml para exponerlas a ese role).
cloud_torrent_peer_port: 50007
cloud_torrent_open_peer_port: false

cloud_torrent_title: "Cloud Torrent"
cloud_torrent_downloads_dir: "{{ app_media_root }}"
cloud_torrent_config_path: "{{ cloud_torrent_working_dir }}/cloud-torrent.json"

# Autenticación (deshabilitada a pedido del usuario).
cloud_torrent_enable_auth: false
cloud_torrent_auth_user: ""
cloud_torrent_auth_password: ""

cloud_torrent_firewall_zone: FedoraServer
cloud_torrent_firewall_enabled: true

cloud_torrent_manage_selinux: true
