---
- name: Set SELinux file contexts for Cloud Torrent
  community.general.sefcontext:
    target: "{{ item.target }}"
    setype: "{{ item.setype }}"
    state: present
  become: true
  loop:
    - { target: "{{ cloud_torrent_install_dir }}/cloud-torrent", setype: bin_t }
    - { target: "{{ cloud_torrent_working_dir }}(/.*)?", setype: var_lib_t }
    - { target: "{{ cloud_torrent_downloads_dir }}(/.*)?", setype: public_content_rw_t }
  loop_control:
    label: "{{ item.target }}"
  when: ansible_selinux.mode | default('') == 'enforcing'
  notify: cloud_torrent apply selinux context

- name: Configure SELinux port for Cloud Torrent
  community.general.seport:
    ports: "{{ cloud_torrent_port }}"
    proto: tcp
    setype: http_port_t
    state: present
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'

- name: Enable httpd_can_network_connect SELinux boolean
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'
