---
# Default variables for the monitoring role.
#
# Uptime-Kuma watches that every service (and the host) is actually up, from the
# outside, and alerts when one goes down. It fits the rootless model cleanly: it
# only makes outbound HTTP/TCP/DNS/ping checks, so it needs no host namespaces or
# elevated privileges — unlike host-metric agents. System/disk metrics on demand
# stay in Cockpit; the backup disk has its own usage alert in the backup role.

# Service user configuration.
monitoring_user: ndelucca
monitoring_group: ndelucca
monitoring_uid: 1000  # Resolved dynamically via getent in preflight

# Directory configuration — state on the appdata disk (app_data_root, defined in
# group_vars/homeservers/storage.yml).
monitoring_base_dir: "{{ app_data_root }}/uptime-kuma"
monitoring_data_dir: "{{ monitoring_base_dir }}/data"

# Podman configuration.
monitoring_pod_name: uptime-kuma
monitoring_quadlet_dir: /etc/containers/systemd/users  # System-managed user containers

# Network configuration — localhost only; NGINX handles external access.
monitoring_port: 3011        # host port (3011 is free; 3001 is OrcaSlicer)
monitoring_container_port: 3001
monitoring_host: 127.0.0.1

# Application configuration. Pinned to an exact patch release (the :1 tag floats
# across the 1.x line); bump monitoring_version to upgrade.
monitoring_version: "1.23.17"
monitoring_image: "docker.io/louislam/uptime-kuma:{{ monitoring_version }}"

# Service configuration. Deployed as a single .container quadlet, so the unit is
# uptime-kuma.service (the old .kube produced uptime-kuma-pod.service; quadlet.yml
# cleans up the legacy unit).
monitoring_service_name: uptime-kuma
monitoring_service_enabled: true
monitoring_service_state: started

# Firewall settings — closed; reachable only via NGINX.
monitoring_firewall_zone: FedoraServer
monitoring_firewall_enabled: false

# SELinux configuration.
monitoring_manage_selinux: true

# --- What to monitor --------------------------------------------------------
# The server's LAN IP (where NGINX listens) and the gateway, used for ping
# checks and for resolving the service subdomains from inside the container.
monitoring_host_ip: 192.168.10.10
monitoring_gateway_ip: 192.168.10.1

# HTTP(S) checks, one per service, hit directly on the host loopback (the pod
# runs with hostNetwork). This tests each backend itself, not just the proxy.
# Redirects/auth pages are fine — accepted status codes span 200-399.
monitoring_http_checks:
  - {name: "Forgejo (git)", url: "http://127.0.0.1:3000"}
  - {name: "Jellyfin", url: "http://127.0.0.1:8096"}
  - {name: "Immich (gallery)", url: "http://127.0.0.1:2283"}
  - {name: "Kavita (books)", url: "http://127.0.0.1:5000"}
  - {name: "FileBrowser (files)", url: "http://127.0.0.1:8080"}
  - {name: "Cloud Torrent", url: "http://127.0.0.1:9091"}
  - {name: "Home Assistant", url: "http://127.0.0.1:8123"}
  - {name: "Cockpit", url: "https://127.0.0.1:9090"}
  - {name: "AdGuard Home", url: "http://127.0.0.1:8081"}
  - {name: "OrcaSlicer", url: "https://127.0.0.1:3001", accepted_codes: ["200-499"]}  # 401 = up, auth required
  - {name: "NGINX (reverse proxy)", url: "https://127.0.0.1:443"}

# Accepted HTTP status ranges (tolerate redirects to login/dashboards).
monitoring_http_accepted_codes: ["200-399"]

# Port checks (TCP) for non-HTTP services.
monitoring_port_checks:
  - {name: "AdGuard DNS", host: "127.0.0.1", port: 53}

# Ping checks for raw host reachability.
monitoring_ping_checks:
  - {name: "Server (host)", host: "{{ monitoring_host_ip }}"}
  - {name: "Router (gateway)", host: "{{ monitoring_gateway_ip }}"}

# Monitor defaults applied to every check.
monitoring_check_interval: 60     # seconds between checks
monitoring_check_retries: 2       # failures before marking DOWN

# Idempotently seed the monitors above straight into Uptime-Kuma's SQLite DB
# (no API/password needed). Only missing monitors are added; the pod is briefly
# stopped while the DB is written. Disable to manage monitors by hand in the UI.
#
# FRAGILITY NOTE: seeding writes raw INSERTs into Uptime-Kuma's PRIVATE schema.
# That schema can change between releases, so when you bump monitoring_version
# RE-VERIFY that seeding still works (run with --tags monitoring,monitors and
# check the dashboard); a schema change could make the INSERT fail or be
# rejected. Already-seeded monitors are matched by name only and never updated —
# edit URLs/intervals in the UI after the first seed.
monitoring_configure_monitors: true

# container_base contract — feeds the shared install + handlers (see container_base).
container_user: "{{ monitoring_user }}"
container_uid: "{{ monitoring_uid }}"
container_service_name: "{{ monitoring_service_name }}"
container_selinux_paths: "{{ [monitoring_data_dir] }}"
