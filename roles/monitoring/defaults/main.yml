---
# Variables por defecto del role monitoring.
#
# Uptime-Kuma vigila que cada servicio (y el host) esté realmente arriba, desde
# afuera, y alerta cuando alguno se cae. Encaja limpiamente en el modelo rootless:
# solo hace checks salientes HTTP/TCP/DNS/ping, así que no necesita namespaces del
# host ni privilegios elevados, a diferencia de los agentes de métricas de host.
# Las métricas de sistema/disco bajo demanda quedan en Cockpit; el disco de backup
# tiene su propia alerta de uso en el role backup.

monitoring_user: ndelucca
monitoring_group: ndelucca
monitoring_uid: 1000  # Se resuelve dinámicamente vía getent en preflight

# El estado vive en el disco de appdata (app_data_root, definido en
# group_vars/homeservers/storage.yml).
monitoring_base_dir: "{{ app_data_root }}/uptime-kuma"
monitoring_data_dir: "{{ monitoring_base_dir }}/data"

monitoring_quadlet_dir: /etc/containers/systemd/users  # containers de usuario gestionados por el sistema

# Solo localhost; NGINX maneja el acceso externo.
monitoring_port: 3011        # puerto del host (3011 está libre; 3001 es OrcaSlicer)
monitoring_container_port: 3001
monitoring_host: 127.0.0.1

# Fijado a un patch release exacto de la línea 2.x (el tag :2 flota); subí
# monitoring_version para actualizar. OJO: 2.x cambió el schema privado de kuma.db
# respecto de 1.x — re-verificá la siembra de monitors tras un bump (ver monitors.yml).
monitoring_version: "2.4.0"
monitoring_image: "docker.io/louislam/uptime-kuma:{{ monitoring_version }}"

# Desplegado como un único Quadlet .container, así que la unit es
# uptime-kuma.service (el viejo .kube producía uptime-kuma-pod.service; quadlet.yml
# limpia la unit legacy).
monitoring_service_name: uptime-kuma
monitoring_service_enabled: true
monitoring_service_state: started

# Firewall cerrado; alcanzable solo vía NGINX.
monitoring_firewall_zone: FedoraServer
monitoring_firewall_enabled: false

monitoring_manage_selinux: true

# La IP LAN del servidor (donde escucha NGINX) y el gateway, usadas para los
# checks de ping y para resolver los subdominios de los servicios desde dentro del container.
monitoring_host_ip: 192.168.10.10
monitoring_gateway_ip: 192.168.10.1

# Puertos de backend para los checks HTTP, definidos UNA SOLA VEZ acá en lugar de
# enterrados como literales dentro de cada URL. Cada uno mapea al puerto de escucha
# del role dueño; hay que mantenerlo en sync con el default *_port de ese role
# (anotado al lado). No pueden ser una cross-reference viva porque las vars de role
# son privadas a su role (private_role_vars); filebrowser_port SÍ es una group var
# (services.yml), así que esa se referencia en vivo.
monitoring_service_ports:
  forgejo: 3000                                          # forgejo_port
  jellyfin: 8096                                         # puerto HTTP fijo de Jellyfin
  immich: 2283                                           # containerPort de immich
  kavita: 5000                                           # kavita_port
  filebrowser: "{{ filebrowser_port | default(8080) }}"  # group var (services.yml)
  cloud_torrent: 9091                                    # cloud_torrent_port
  home_assistant: 8123                                   # home_assistant_port
  cockpit: 9090                                          # puerto fijo del socket de Cockpit
  adguard: 8081                                          # adguard_admin_port
  orcaslicer: 3001                                       # orcaslicer_port
  nginx: 443                                             # HTTPS de NGINX

# Checks HTTP(S), uno por servicio, golpeados directamente en el loopback del host
# (el pod corre con hostNetwork). Esto prueba cada backend en sí, no solo el proxy.
# Las redirecciones/páginas de auth están bien: los códigos de estado aceptados van de 200 a 399.
monitoring_http_checks:
  - {name: "Forgejo (git)", url: "http://127.0.0.1:{{ monitoring_service_ports.forgejo }}"}
  - {name: "Jellyfin", url: "http://127.0.0.1:{{ monitoring_service_ports.jellyfin }}"}
  - {name: "Immich (gallery)", url: "http://127.0.0.1:{{ monitoring_service_ports.immich }}"}
  - {name: "Kavita (books)", url: "http://127.0.0.1:{{ monitoring_service_ports.kavita }}"}
  - {name: "FileBrowser (files)", url: "http://127.0.0.1:{{ monitoring_service_ports.filebrowser }}"}
  - {name: "Cloud Torrent", url: "http://127.0.0.1:{{ monitoring_service_ports.cloud_torrent }}"}
  - {name: "Home Assistant", url: "http://127.0.0.1:{{ monitoring_service_ports.home_assistant }}"}
  - {name: "Cockpit", url: "https://127.0.0.1:{{ monitoring_service_ports.cockpit }}"}
  - {name: "AdGuard Home", url: "http://127.0.0.1:{{ monitoring_service_ports.adguard }}"}
  - {name: "OrcaSlicer", url: "https://127.0.0.1:{{ monitoring_service_ports.orcaslicer }}", accepted_codes: ["200-499"]}  # 401 = arriba, requiere auth
  - {name: "NGINX (reverse proxy)", url: "https://127.0.0.1:{{ monitoring_service_ports.nginx }}"}

# Rangos de códigos de estado HTTP aceptados (tolerar redirecciones a login/dashboards).
monitoring_http_accepted_codes: ["200-399"]

# Checks de puerto (TCP) para los servicios no-HTTP.
monitoring_port_checks:
  - {name: "AdGuard DNS", host: "127.0.0.1", port: 53}

# Checks de ping para la alcanzabilidad básica del host.
monitoring_ping_checks:
  - {name: "Server (host)", host: "{{ monitoring_host_ip }}"}
  - {name: "Router (gateway)", host: "{{ monitoring_gateway_ip }}"}

# Defaults de monitor aplicados a cada check.
monitoring_check_interval: 60     # segundos entre checks
monitoring_check_retries: 2       # fallas antes de marcar DOWN

# Siembra de forma idempotente los monitors de arriba directo en la DB SQLite de
# Uptime-Kuma (sin necesidad de API/password). Solo se agregan los monitors
# faltantes; el pod se detiene brevemente mientras se escribe la DB. Deshabilitar
# para gestionar los monitors a mano en la UI.
#
# NOTA DE FRAGILIDAD: la siembra escribe INSERTs crudos en el schema PRIVADO de
# Uptime-Kuma. Ese schema puede cambiar entre releases, así que cuando subas
# monitoring_version RE-VERIFICÁ que la siembra siga funcionando (corré con --tags
# monitoring,monitors y revisá el dashboard); un cambio de schema podría hacer que
# el INSERT falle o sea rechazado. Los monitors ya sembrados se matchean solo por
# nombre y nunca se actualizan: editá URLs/intervalos en la UI después de la primera siembra.
monitoring_configure_monitors: true
