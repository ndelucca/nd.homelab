---
# Chequeos de preflight del role monitoring.

- name: Common container preflight (Fedora, uid, port, quadlet dir)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: preflight
  vars:
    container_base_user: "{{ monitoring_user }}"
    container_base_port: "{{ monitoring_port }}"
    container_base_quadlet_dir: "{{ monitoring_quadlet_dir }}"

- name: Map the resolved UID to monitoring_uid
  ansible.builtin.set_fact:
    monitoring_uid: "{{ container_base_uid }}"

- name: Create Uptime-Kuma base directory
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}"
    state: directory
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0755'
  become: true

- name: Create Uptime-Kuma data directory
  ansible.builtin.file:
    path: "{{ monitoring_data_dir }}"
    state: directory
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0755'
  become: true
