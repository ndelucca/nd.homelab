---
# Configure the systemd service for the Uptime-Kuma pod.

- name: Enable and start Uptime-Kuma pod service
  ansible.builtin.systemd:
    name: "{{ monitoring_service_name }}"
    enabled: "{{ monitoring_service_enabled }}"
    state: "{{ monitoring_service_state }}"
    scope: user
    daemon_reload: true
  become: true
  become_user: "{{ monitoring_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ monitoring_uid }}"

- name: Wait for Uptime-Kuma to be available
  ansible.builtin.wait_for:
    host: "{{ monitoring_host }}"
    port: "{{ monitoring_port }}"
    delay: 10
    timeout: 120
  when: monitoring_service_state == 'started'

- name: Display Uptime-Kuma access information
  ansible.builtin.debug:
    msg: |
      Uptime-Kuma has been deployed successfully!

      Access via NGINX: https://status.{{ nginx_domain }}
      Monitors for every service are seeded automatically (see monitors.yml).
      First run: create the admin account in the UI. Optionally add a built-in
      notification (ntfy/Telegram/email) so downtime pings your phone.

      Data location: {{ monitoring_data_dir }}

      Manage service:
      - Status: systemctl --user -M {{ monitoring_user }}@ status {{ monitoring_service_name }}
      - Logs: journalctl --user -M {{ monitoring_user }}@ -u {{ monitoring_service_name }}
