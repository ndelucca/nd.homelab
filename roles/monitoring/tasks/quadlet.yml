---
# Despliega los archivos de unit de Quadlet.

# Migración: el role antes shippeaba un pod .kube (uptime-kuma-pod.service).
# Se detiene y elimina la unit legacy para que solo quede el nuevo uptime-kuma.service.
- name: Stop legacy uptime-kuma-pod service if present
  ansible.builtin.systemd:
    name: uptime-kuma-pod.service
    state: stopped
    scope: user
  become: true
  become_user: "{{ monitoring_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ monitoring_uid }}"
  failed_when: false

- name: Remove legacy .kube unit and pod YAML
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - "{{ monitoring_quadlet_dir }}/{{ monitoring_uid }}/uptime-kuma-pod.kube"
    - "{{ monitoring_data_dir }}/uptime-kuma-pod.yaml"
  notify: Container daemon-reload-user

- name: Deploy Uptime-Kuma Quadlet .container unit
  ansible.builtin.template:
    src: uptime-kuma.container.j2
    dest: "{{ monitoring_quadlet_dir }}/{{ monitoring_uid }}/uptime-kuma.container"
    owner: root
    group: root
    mode: '0644'
  become: true
  notify:
    - Container daemon-reload-user
    # Volumen category-less (sin :Z): relabelear a container_file_t:s0 ANTES del restart,
    # o el container nuevo crashea contra la categoría MCS vieja.
    - Container apply selinux context
    - Container restart

# NO se flushean los handlers acá. El paso de service compartido (container_base) los flushea
# DESPUÉS de promover container_base_uid/user/service_name y los paths de SELinux a host facts;
# hacerlo antes (como estaba) disparaba daemon-reload/restart con container_base_uid undefined
# —el flush corría antes de los include_role de selinux y service— rompiendo `-t monitoring`.
