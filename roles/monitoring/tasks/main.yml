---
# Punto de entrada principal del role monitoring (Uptime-Kuma).

- name: Include preflight checks
  ansible.builtin.import_tasks: preflight.yml
  tags: ['monitoring', 'preflight']

- name: Install Podman and dependencies
  ansible.builtin.import_tasks: install.yml
  tags: ['monitoring', 'install']

- name: Deploy Quadlet unit files
  ansible.builtin.import_tasks: quadlet.yml
  tags: ['monitoring', 'quadlet']

# Aplica los contextos SELinux antes de que arranque el container para que un host
# en enforcing no deniegue el acceso al volumen en la primera corrida.
- name: Configure SELinux (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: selinux
  vars:
    container_base_selinux_paths: "{{ [monitoring_data_dir] }}"
  tags: ['monitoring', 'selinux']
  when: monitoring_manage_selinux | bool

- name: Configure systemd service (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: service
  vars:
    container_base_user: "{{ monitoring_user }}"
    container_base_uid: "{{ monitoring_uid }}"
    container_base_service_name: "{{ monitoring_service_name }}"
    container_base_host: "{{ monitoring_host }}"
    container_base_port: "{{ monitoring_port }}"
    container_base_service_enabled: "{{ monitoring_service_enabled }}"
    container_base_service_state: "{{ monitoring_service_state }}"
  tags: ['monitoring', 'service']

- name: Seed monitors into Uptime-Kuma
  ansible.builtin.import_tasks: monitors.yml
  tags: ['monitoring', 'monitors']
  when: monitoring_configure_monitors | bool
