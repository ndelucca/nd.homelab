---
# Configure SELinux for the Uptime-Kuma container.

- name: Display SELinux status
  ansible.builtin.debug:
    msg: "SELinux is {{ ansible_selinux.mode | default('disabled') }}"

- name: Install SELinux policy packages
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
      - container-selinux
    state: present
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'

- name: Set SELinux file contexts for Uptime-Kuma data
  community.general.sefcontext:
    target: "{{ monitoring_data_dir }}(/.*)?"
    setype: container_file_t
    state: present
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'
  notify: monitoring apply selinux context

- name: Enable SELinux boolean for container port binding
  ansible.posix.seboolean:
    name: container_use_devices
    state: true
    persistent: true
  become: true
  when: ansible_selinux.mode | default('') == 'enforcing'
  failed_when: false
