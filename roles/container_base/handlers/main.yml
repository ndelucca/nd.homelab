---
# Handlers compartidos para roles de container con Podman rootless/Quadlet. Se
# vuelven disponibles en un rol consumidor vía
# `include_role: { name: container_base, tasks_from: install }` en su paso de
# install. El consumidor provee las variables del contrato vía el vars: de cada
# include_role (container_base_user, container_base_uid, container_base_service_name,
# container_base_selinux_paths) y flushea sus propios handlers dentro del rol, así las
# variables resuelven a los valores de ese rol incluso cuando varios roles de
# container corren en un play.

# `systemctl --user daemon-reload` explícito: el daemon_reload en user-scope del
# módulo systemd no regenera de forma confiable los units de Quadlet (el unit
# generado conserva paths viejos), mientras que el comando sí.
- name: Container daemon-reload-user  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: systemctl --user daemon-reload
  become: true
  become_user: "{{ container_base_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ container_base_uid }}"
  changed_when: false

# `-F` (force): resetea el contexto COMPLETO al default del fcontext DB, incluida la
# parte de nivel/MCS. Sin `-F`, restorecon corrige sólo el type y PRESERVA la categoría
# MCS por container (`s0:cX,cY`) que pudo quedar pegada de una instancia anterior (o de
# un mount `:Z`). Si esa categoría no matchea la del container que corre hoy, SELinux le
# niega leer su propio volume aunque los permisos Unix sean correctos: el backend queda
# en crash-loop y NGINX devuelve 502 (le pasó a orcaslicer y su cert.pem, y a HA con /config
# en un bump de imagen). `-F` fuerza el label category-less `container_file_t:s0`, que
# cualquier categoría de container domina y puede leer. Para los volumes `:Z` (forgejo,
# nd_market, forgejo_runner) es inocuo: el start del container que sigue re-aplica la privada.
#
# DEBE estar definido ANTES de `Container restart`: los handlers se ejecutan en orden de
# DEFINICIÓN, no de notificación. Los roles de volumen category-less (home_assistant,
# orcaslicer, kavita, monitoring) notifican este handler desde su deploy de Quadlet junto
# con el restart; si el relabel corriera después del restart, el container nuevo arrancaría
# contra el label MCS viejo y crashearía igual (se arreglaría recién en la corrida siguiente).
- name: Container apply selinux context
  ansible.builtin.command: "restorecon -RvF {{ item }}"
  become: true
  changed_when: false
  loop: "{{ container_base_selinux_paths | default([]) }}"
  when: container_base_selinux_paths | default([]) | length > 0

- name: Container restart
  ansible.builtin.systemd:
    name: "{{ container_base_service_name }}"
    state: restarted
    scope: user
  become: true
  become_user: "{{ container_base_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ container_base_uid }}"
