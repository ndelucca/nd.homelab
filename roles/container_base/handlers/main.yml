---
# Handlers compartidos para roles de container con Podman rootless/Quadlet. Se
# vuelven disponibles en un role consumidor vía
# `include_role: { name: container_base, tasks_from: install }` en su paso de
# install. El consumidor provee las variables del contrato vía sus defaults
# (container_user, container_uid, container_service_name, container_selinux_paths)
# y flushea sus propios handlers dentro del role, así las variables resuelven a los
# valores de ese role incluso cuando varios roles de container corren en un play.

# `systemctl --user daemon-reload` explícito: el daemon_reload en user-scope del
# módulo systemd no regenera de forma confiable los units de Quadlet (el unit
# generado conserva paths viejos), mientras que el comando sí.
- name: Container daemon-reload-user  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: systemctl --user daemon-reload
  become: true
  become_user: "{{ container_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ container_uid }}"
  changed_when: false

- name: Container restart
  ansible.builtin.systemd:
    name: "{{ container_service_name }}"
    state: restarted
    scope: user
  become: true
  become_user: "{{ container_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ container_uid }}"

- name: Container apply selinux context
  ansible.builtin.command: "restorecon -Rv {{ item }}"
  become: true
  changed_when: false
  loop: "{{ container_selinux_paths }}"
