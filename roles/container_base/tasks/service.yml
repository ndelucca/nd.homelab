---
# Shared service step for rootless-Podman/Quadlet container roles. Included via
# `include_role: { name: container_base, tasks_from: service }`.
#
# Flushes pending handlers FIRST (daemon-reload-user + any SELinux relabel
# notified by the selinux step) so the regenerated unit and its volume contexts
# are in place before the container starts, then enables/starts the user service
# and waits for it to answer.
#
# Contract vars (consumer's defaults): container_user, container_uid,
# container_service_name, container_host, container_port, and optionally
# container_service_enabled (default true), container_service_state (default
# 'started'), container_wait_delay (default 10), container_wait_timeout
# (default 120).

- name: Flush handlers so the unit + SELinux contexts are applied before start
  ansible.builtin.meta: flush_handlers

- name: Enable and start the rootless user service {{ container_service_name }}
  ansible.builtin.systemd:
    name: "{{ container_service_name }}"
    enabled: "{{ container_service_enabled | default(true) }}"
    state: "{{ container_service_state | default('started') }}"
    scope: user
    daemon_reload: true
  become: true
  become_user: "{{ container_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ container_uid }}"

- name: Wait for the service to become available {{ container_service_name }}
  ansible.builtin.wait_for:
    host: "{{ container_host }}"
    port: "{{ container_port }}"
    delay: "{{ container_wait_delay | default(10) }}"
    timeout: "{{ container_wait_timeout | default(120) }}"
  when: (container_service_state | default('started')) == 'started'

- name: Report status of the user service {{ container_service_name }}
  ansible.builtin.debug:
    msg: >-
      {{ container_service_name }} is up on {{ container_host }}:{{ container_port }}.
      Manage: systemctl --user -M {{ container_user }}@ status {{ container_service_name }}
