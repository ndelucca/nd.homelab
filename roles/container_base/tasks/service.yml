---
# Paso de service compartido para roles de container con Podman rootless/Quadlet.
# Se incluye vía `include_role: { name: container_base, tasks_from: service }`.
#
# PRIMERO flushea los handlers pendientes (daemon-reload-user + cualquier relabel de
# SELinux notificado por el paso de selinux) para que el unit regenerado y los
# contextos de sus volumes estén en su lugar antes de que arranque el container,
# luego habilita/arranca el servicio de usuario y espera a que responda.
#
# Variables del contrato (pasadas en el vars: del include): container_base_user,
# container_base_uid, container_base_service_name, container_base_host,
# container_base_port, y opcionalmente container_base_service_enabled (default true),
# container_base_service_state (default 'started'), container_base_wait_delay
# (default 10), container_base_wait_timeout (default 120) — estos últimos con default
# en defaults/main.yml de este rol.
#
# container_base_wait_for_port (default true): los servicios que escuchan un puerto
# esperan a que responda antes de seguir. Un servicio saliente-puro (ej. el runner de
# Forgejo, que no escucha nada) lo pasa en false para saltear el wait_for; en ese caso
# container_base_host/port no se usan.

# Promueve el contrato a host facts ANTES del flush: los handlers compartidos
# (`container restart`, `container daemon-reload-user`) los notifica el paso de quadlet
# del consumidor y se flushean acá, y los vars: del include_role no llegan a los handlers.
- name: Register the service contract as host facts for the shared handlers
  ansible.builtin.set_fact:
    container_base_user: "{{ container_base_user }}"
    container_base_uid: "{{ container_base_uid }}"
    container_base_service_name: "{{ container_base_service_name }}"

- name: Flush handlers so the unit + SELinux contexts are applied before start
  ansible.builtin.meta: flush_handlers

- name: Enable and start the rootless user service {{ container_base_service_name }}
  ansible.builtin.systemd:
    name: "{{ container_base_service_name }}"
    enabled: "{{ container_base_service_enabled }}"
    state: "{{ container_base_service_state }}"
    scope: user
    daemon_reload: true
  become: true
  become_user: "{{ container_base_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ container_base_uid }}"

- name: Wait for the service to become available {{ container_base_service_name }}
  ansible.builtin.wait_for:
    host: "{{ container_base_host }}"
    port: "{{ container_base_port }}"
    delay: "{{ container_base_wait_delay }}"
    timeout: "{{ container_base_wait_timeout }}"
  when:
    - container_base_service_state == 'started'
    - container_base_wait_for_port | default(true) | bool

- name: Report status of the user service {{ container_base_service_name }}
  ansible.builtin.debug:
    msg: >-
      {{ container_base_service_name }} is up{% if container_base_wait_for_port | default(true) | bool %} on
      {{ container_base_host }}:{{ container_base_port }}{% endif %}. Manage:
      systemctl --user -M {{ container_base_user }}@ status {{ container_base_service_name }}
