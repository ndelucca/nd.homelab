---
# container_base se consume vía `tasks_from: install`, no como role completo.
# Entrar sin un tasks_from explícito es casi seguro un error.
- name: container_base must be included with tasks_from
  ansible.builtin.fail:
    msg: >-
      container_base is a helper role — include it as
      `include_role: { name: container_base, tasks_from: install }`,
      not as a standalone role.
