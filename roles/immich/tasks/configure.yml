---
# Configura el pod de Immich. Todas las variables de entorno van inline en el YAML del
# pod de abajo, así que no se genera un archivo .env aparte.

- name: Generate Kubernetes YAML pod definition
  ansible.builtin.template:
    src: immich-pod.yaml.j2
    dest: "{{ immich_config_dir }}/immich-pod.yaml"
    owner: "{{ immich_user }}"
    group: "{{ immich_group }}"
    # 0600: el YAML del pod incluye la contraseña de Postgres inline, así que no debe
    # ser legible por todo el mundo.
    mode: '0600'
  become: true
  notify: Container restart
