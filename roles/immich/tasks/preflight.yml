---
# Chequeos de preflight para la instalación de Immich

- name: Common container preflight (Fedora, uid, port, quadlet dir)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: preflight
  vars:
    container_base_user: "{{ immich_user }}"
    container_base_port: "{{ immich_port }}"
    container_base_quadlet_dir: "{{ immich_quadlet_dir }}"

- name: Map the resolved UID to immich_uid
  ansible.builtin.set_fact:
    immich_uid: "{{ container_base_uid }}"

- name: Require the Immich DB password to be set (from vault)
  ansible.builtin.assert:
    that:
      - immich_db_password | length > 0
    fail_msg: >-
      immich_db_password is empty. Define it in group_vars/homeservers/vault.yml
      (it must match the password the running Postgres already uses).
    success_msg: "Immich DB password is set"

- name: Create Immich base directory
  ansible.builtin.file:
    path: "{{ immich_base_dir }}"
    state: directory
    owner: "{{ immich_user }}"
    group: "{{ immich_group }}"
    mode: '0755'
  become: true

- name: Create Immich upload directory
  ansible.builtin.file:
    path: "{{ immich_upload_location }}"
    state: directory
    owner: "{{ immich_user }}"
    group: "{{ immich_group }}"
    mode: '0755'
  become: true

# NO se fuerza owner/group acá a propósito. El pod corre con UserNS=keep-id, así que el
# usuario del host immich_user (uid 1000) mapea a ROOT dentro del container. Postgres
# corre como el usuario `postgres` (uid 999 del container) y es dueño de su propio PGDATA;
# forzar owner=immich_user en cada corrida lo dejaba root:root adentro y Postgres no podía
# abrir sus archivos ("could not open file global/pg_filenode.map: Permission denied"),
# rompiendo toda conexión nueva y el pg_dump del backup. Se crea el dir si falta y se deja
# que Postgres administre el ownership de su contenido.
- name: Ensure Immich database directory exists
  ansible.builtin.file:
    path: "{{ immich_db_data_location }}"
    state: directory
    mode: '0700'
  become: true

- name: Create Immich config directory
  ansible.builtin.file:
    path: "{{ immich_config_dir }}"
    state: directory
    owner: "{{ immich_user }}"
    group: "{{ immich_group }}"
    mode: '0755'
  become: true

- name: Create Immich model cache directory
  ansible.builtin.file:
    path: "{{ immich_model_cache }}"
    state: directory
    owner: "{{ immich_user }}"
    group: "{{ immich_group }}"
    mode: '0755'
  become: true
