---
# Punto de entrada principal del role Immich

- name: Include preflight checks
  ansible.builtin.import_tasks: preflight.yml
  tags: ['immich', 'preflight']

- name: Install Podman and dependencies
  ansible.builtin.import_tasks: install.yml
  tags: ['immich', 'install']

- name: Configure Immich pod and environment
  ansible.builtin.import_tasks: configure.yml
  tags: ['immich', 'configure']

- name: Deploy Quadlet unit files
  ansible.builtin.import_tasks: quadlet.yml
  tags: ['immich', 'quadlet']

# Los contextos SELinux deben aplicarse ANTES de que arranque el container: el pod de
# immich monta volúmenes hostPath sin relabel :Z, así que en un host en modo enforcing
# el primer arranque se queda sin acceso a menos que los contextos de archivo ya existan.
- name: Configure SELinux (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: selinux
  tags: ['immich', 'selinux']
  when: immich_manage_selinux | bool

- name: Configure systemd service (shared container_base step)
  ansible.builtin.include_role:
    name: container_base
    tasks_from: service
  tags: ['immich', 'service']
