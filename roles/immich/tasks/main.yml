---
# Main entry point for Immich role

- name: Include preflight checks
  ansible.builtin.import_tasks: preflight.yml
  tags: ['immich', 'preflight']

- name: Install Podman and dependencies
  ansible.builtin.import_tasks: install.yml
  tags: ['immich', 'install']

- name: Configure Immich pod and environment
  ansible.builtin.import_tasks: configure.yml
  tags: ['immich', 'configure']

- name: Deploy Quadlet unit files
  ansible.builtin.import_tasks: quadlet.yml
  tags: ['immich', 'quadlet']

# SELinux contexts must be applied BEFORE the container starts: the immich pod
# mounts hostPath volumes with no :Z relabel, so on an enforcing host the first
# start is denied access unless the file contexts already exist.
- name: Configure SELinux
  ansible.builtin.import_tasks: selinux.yml
  tags: ['immich', 'selinux']
  when: immich_manage_selinux | bool

- name: Configure systemd service
  ansible.builtin.import_tasks: service.yml
  tags: ['immich', 'service']
