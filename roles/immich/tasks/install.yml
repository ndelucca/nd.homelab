---
# Install Podman and dependencies

- name: Install Podman packages
  ansible.builtin.dnf:
    name:
      - podman
      - slirp4netns     # For rootless networking
      - fuse-overlayfs  # For rootless storage
      - crun            # Modern OCI runtime
    state: present
  become: true

- name: Verify Podman installation
  ansible.builtin.command: podman --version
  register: podman_version
  changed_when: false
  check_mode: false  # read-only; must run so the version assert works in --check

- name: Display Podman version
  ansible.builtin.debug:
    msg: "Installed {{ podman_version.stdout }}"

- name: Check Podman version is >= 4.4 (required for Quadlet)
  ansible.builtin.assert:
    that:
      - podman_version.stdout is version('podman version 4.4', '>=', version_type='loose')
    fail_msg: "Podman 4.4+ is required for Quadlet support"
    success_msg: "Podman version is compatible with Quadlet"
  when: podman_version.stdout is defined

- name: Enable lingering for user (allows user services without login)
  ansible.builtin.command: loginctl enable-linger {{ immich_user }}
  args:
    creates: /var/lib/systemd/linger/{{ immich_user }}
  become: true

- name: Install Node.js and npm for Immich CLI
  ansible.builtin.dnf:
    name:
      - nodejs
      - npm
    state: present
  become: true

- name: Check the currently installed Immich CLI version
  ansible.builtin.command: immich --version
  register: immich_cli_current
  changed_when: false
  failed_when: false
  check_mode: false  # read-only; must run so the guard below is accurate in --check

- name: Install Immich CLI at the pinned version (only when missing or mismatched)
  ansible.builtin.command: npm install -g @immich/cli@{{ immich_cli_version }}
  become: true
  register: immich_cli_install
  changed_when: "'added' in immich_cli_install.stdout or 'changed' in immich_cli_install.stdout"
  when: immich_cli_version not in (immich_cli_current.stdout | default(''))

- name: Display Immich CLI version
  ansible.builtin.debug:
    msg: "Immich CLI pinned to {{ immich_cli_version }}"
