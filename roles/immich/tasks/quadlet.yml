---
# Despliega los archivos de unit de Quadlet

- name: Deploy Immich Quadlet .kube unit
  ansible.builtin.template:
    src: immich.kube.j2
    dest: "{{ immich_quadlet_dir }}/{{ immich_uid }}/{{ immich_service_name }}.kube"
    owner: root
    group: root
    mode: '0644'
  become: true
  notify:
    - Container daemon-reload-user
    - Container restart

# NO se flushean los handlers acá: el paso de service compartido (container_base) los flushea
# DESPUÉS de promover container_base_uid/user/service_name a host facts. Flushear antes (como
# estaba) dispara daemon-reload/restart con container_base_uid undefined —corre antes de los
# include_role de selinux y service— y rompe la corrida cuando la unit cambia (ej. bump de imagen).
