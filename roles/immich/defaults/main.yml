---
# Variables por defecto del role Immich

immich_user: ndelucca
immich_group: ndelucca
immich_uid: 1000  # Se obtiene dinámicamente vía getent en preflight

# Directorios — el estado vive en el disco de appdata, la biblioteca de fotos en el
# media root compartido de las apps (ambos definidos en group_vars/homeservers/storage.yml).
immich_base_dir: "{{ app_data_root }}/immich"
immich_upload_location: "{{ app_media_root }}/Gallery"
immich_db_data_location: "{{ immich_base_dir }}/postgres"
immich_config_dir: "{{ immich_base_dir }}/config"
immich_model_cache: "{{ immich_base_dir }}/model-cache"

immich_pod_name: immich
immich_quadlet_dir: /etc/containers/systemd/users  # Containers de usuario gestionados por el sistema

immich_port: 2283
immich_host: 127.0.0.1

# Se pinea a un release exacto por reproducibilidad; bumpear esto (y immich_cli_version
# para que coincida) para actualizar. Ver los releases de upstream.
immich_version: v2.7.5
immich_cli_version: "2.7.5"  # mantener en sync con immich_version
immich_timezone: America/Los_Angeles

# immich_db_password DEBE proveerse vía vault (ver group_vars/homeservers/vault.yml);
# preflight verifica que esté seteada. NO generamos un default aleatorio — eso rotaría
# silenciosamente la contraseña de Postgres en cada corrida y dejaría a la app afuera
# de su propia base de datos.
immich_db_username: immich
immich_db_database: immich
immich_db_password: ""

immich_service_name: immich-pod
immich_service_enabled: true
immich_service_state: started

immich_firewall_zone: FedoraServer
immich_firewall_enabled: false  # false porque NGINX maneja el acceso externo

immich_manage_selinux: true

immich_server_image: "ghcr.io/immich-app/immich-server:{{ immich_version }}"
immich_ml_image: "ghcr.io/immich-app/immich-machine-learning:{{ immich_version }}"
immich_redis_image: docker.io/valkey/valkey:9-alpine
immich_postgres_image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
