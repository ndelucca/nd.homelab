---
# Sincroniza los secrets de Actions a NIVEL USUARIO en Forgejo desde el vault, de forma
# reproducible: la fuente de verdad son los valores vaulteados en el repo; cada corrida los
# empuja vía API con basic-auth del admin (mismo patrón que roles/forgejo/tasks/mirror.yml).
# Idempotente: PUT sobreescribe. Se saltea cualquier secret cuyo valor no esté en el vault.
#
# Al ser a nivel usuario, TODOS los repos del usuario heredan estos secrets (no hay que
# setearlos por repo).

- name: Ensure the admin password is available to sync secrets
  ansible.builtin.assert:
    that:
      - forgejo_runner_admin_password | length > 0
    fail_msg: >-
      forgejo_runner_admin_password (forgejo_admin_password del vault) es requerido para
      sincronizar los secrets de Actions.
  when:
    - forgejo_runner_sync_secrets | bool
    - (forgejo_runner_deploy_ssh_private_key | length > 0) or (forgejo_runner_registry_token | length > 0)

- name: Sync user-level Actions secrets to Forgejo
  ansible.builtin.uri:
    url: "{{ forgejo_runner_api_base }}/user/actions/secrets/{{ item.name }}"
    method: PUT
    url_username: "{{ forgejo_runner_admin_user }}"
    url_password: "{{ forgejo_runner_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      data: "{{ item.value }}"
    status_code: [201, 204]
  loop:
    - { name: "DEPLOY_SSH_KEY", value: "{{ forgejo_runner_deploy_ssh_private_key }}" }
    - { name: "REGISTRY_TOKEN", value: "{{ forgejo_runner_registry_token }}" }
  loop_control:
    label: "{{ item.name }}"
  when:
    - forgejo_runner_sync_secrets | bool
    - item.value | length > 0
  no_log: true
