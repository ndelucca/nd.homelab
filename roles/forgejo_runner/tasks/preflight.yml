---
# Chequeos de preflight y armado de directorios para el Forgejo Runner.

- name: Verify Fedora operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] == "Fedora"
    fail_msg: "This role only supports Fedora"
    success_msg: "Running on Fedora {{ ansible_facts['distribution_version'] }}"

- name: Resolve runner user UID for rootless Podman
  ansible.builtin.getent:
    database: passwd
    key: "{{ forgejo_runner_user }}"
  check_mode: false

- name: Set forgejo_runner_uid fact
  ansible.builtin.set_fact:
    forgejo_runner_uid: "{{ ansible_facts['getent_passwd'][forgejo_runner_user][1] }}"

- name: Display user UID
  ansible.builtin.debug:
    msg: "Using UID {{ forgejo_runner_uid }} for user {{ forgejo_runner_user }}"

- name: Ensure base directory exists
  ansible.builtin.file:
    path: "{{ forgejo_runner_base_dir }}"
    state: directory
    owner: "{{ forgejo_runner_user }}"
    group: "{{ forgejo_runner_group }}"
    mode: '0755'
  become: true

- name: Ensure data and config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ forgejo_runner_user }}"
    group: "{{ forgejo_runner_group }}"
    mode: '0750'
  become: true
  loop:
    - "{{ forgejo_runner_data_dir }}"
    - "{{ forgejo_runner_config_dir }}"
