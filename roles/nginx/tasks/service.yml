---
# Gestiona el servicio NGINX (lo habilita pero NO lo arranca todavía).

- name: Enable NGINX service
  ansible.builtin.systemd:
    name: nginx
    enabled: true
  become: true
  # Solo habilitar, NO arrancar acá. NGINX lo arrancan los post_tasks de
  # site.yml, después de configurar AdGuard (su admin se muda a 127.0.0.1:8081,
  # liberando los puertos). Centralizar el arranque ahí mantiene el orden
  # explícito en vez de depender de un handler cross-role del role de AdGuard.
