---
# Manage NGINX service (enable but do NOT start yet)

- name: Enable NGINX service
  ansible.builtin.systemd:
    name: nginx
    enabled: true
  become: true
  # Enable only — do NOT start here. NGINX is started by site.yml post_tasks,
  # after AdGuard has been configured (its admin moves to 127.0.0.1:8081, freeing
  # the ports). Centralizing the start there keeps the ordering explicit instead
  # of relying on a cross-role handler in the AdGuard role.
