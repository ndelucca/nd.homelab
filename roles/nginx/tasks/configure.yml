---
- name: Deploy main NGINX configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
    validate: 'nginx -t -c %s'
  become: true
  register: nginx_main_config

- name: Ensure conf.d directory exists
  ansible.builtin.file:
    path: /etc/nginx/conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Ensure snippets directory exists
  ansible.builtin.file:
    path: "{{ nginx_ssl_headers_snippet | dirname }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

# Desplegamos el snippet de headers compartido ANTES que los vhosts que lo
# `include`-an, así el `nginx -t` final lo tiene en disco. Vive fuera de
# conf.d/*.conf para que NGINX no lo auto-cargue como un bloque suelto (a nivel
# http).
- name: Deploy shared TLS security-headers snippet
  ansible.builtin.template:
    src: ssl_headers.inc.j2
    dest: "{{ nginx_ssl_headers_snippet }}"
    owner: root
    group: root
    mode: '0644'
  become: true
  register: nginx_ssl_headers

# Auto-descubre cada template de vhost de servicio, así agregar un servicio es
# solo cuestión de dejar un conf.d/<service>.conf.j2 en este role, sin tener que
# editar acá.
- name: Discover service vhost templates
  ansible.builtin.find:
    paths: "{{ role_path }}/templates/conf.d"
    patterns: "*.conf.j2"
  delegate_to: localhost
  become: false
  register: nginx_conf_templates

- name: Deploy service configurations
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "/etc/nginx/conf.d/{{ item.path | basename | replace('.j2', '') }}"
    owner: root
    group: root
    mode: '0644'
  become: true
  loop: "{{ nginx_conf_templates.files | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: nginx_service_configs

# Limpia los archivos de vhost que quedan huérfanos cuando se elimina un template
# de servicio del role (p. ej. los vhosts absorbidos en 10-services.conf).
# Registramos en un manifiesto exactamente lo que el role desplegó y solo
# borramos los archivos que ESTABAN en nuestro manifiesto anterior pero ya no:
# así un .conf puesto en conf.d por algo distinto a este role nunca se toca (el
# enfoque viejo de reconstrucción por string barría sobre cada *.conf y podía
# matchear archivos no relacionados).
- name: Compute the set of vhost files this run manages
  ansible.builtin.set_fact:
    nginx_managed_vhosts: >-
      {{ nginx_conf_templates.files | map(attribute='path') | map('basename')
         | map('regex_replace', '\.j2$', '') | sort | list }}

- name: Read the previous managed-vhost manifest
  ansible.builtin.slurp:
    src: /etc/nginx/conf.d/.managed_vhosts
  become: true
  register: nginx_prev_manifest
  failed_when: false
  changed_when: false

- name: Remove vhost files this role previously managed but no longer does
  ansible.builtin.file:
    path: "/etc/nginx/conf.d/{{ item }}"
    state: absent
  become: true
  loop: >-
    {{ (nginx_prev_manifest.content | default('') | b64decode).splitlines()
       | map('trim') | select | difference(nginx_managed_vhosts) | list }}
  register: nginx_stale_removed

- name: Write the managed-vhost manifest
  ansible.builtin.copy:
    dest: /etc/nginx/conf.d/.managed_vhosts
    content: "{{ nginx_managed_vhosts | join('\n') + '\n' }}"
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Validate complete NGINX configuration
  ansible.builtin.command: nginx -t
  become: true
  changed_when: false

- name: Set configuration changed flag
  ansible.builtin.set_fact:
    nginx_config:
      changed: >-
        {{ nginx_main_config.changed or nginx_service_configs.changed
           or (nginx_ssl_headers.changed | default(false))
           or (nginx_stale_removed.changed | default(false)) }}

# Recargamos para que los cambios de config tomen efecto. Solo si ya está
# corriendo: en un host nuevo NGINX se arranca más tarde (después de que AdGuard
# libera el puerto 53), y `state: reloaded` fallaría sobre un unit detenido.
- name: Check whether NGINX is already running
  ansible.builtin.systemd:
    name: nginx
  become: true
  register: nginx_runtime
  check_mode: false

- name: Reload NGINX to apply configuration changes
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  become: true
  when:
    - nginx_config.changed | bool
    - nginx_runtime.status.ActiveState == "active"

# El seboolean httpd_can_network_connect lo maneja tasks/selinux.yml (gateado por
# nginx_manage_selinux); no se duplica acá.
