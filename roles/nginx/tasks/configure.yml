---
# Configure NGINX reverse proxy

- name: Deploy main NGINX configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
    validate: 'nginx -t -c %s'
  become: true
  register: nginx_main_config

- name: Ensure conf.d directory exists
  ansible.builtin.file:
    path: /etc/nginx/conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Ensure snippets directory exists
  ansible.builtin.file:
    path: "{{ nginx_ssl_headers_snippet | dirname }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

# Deploy the shared headers snippet BEFORE the vhosts that `include` it, so the
# final `nginx -t` has it on disk. It lives outside conf.d/*.conf so NGINX does
# not auto-load it as a standalone (http-level) block.
- name: Deploy shared TLS security-headers snippet
  ansible.builtin.template:
    src: ssl_headers.inc.j2
    dest: "{{ nginx_ssl_headers_snippet }}"
    owner: root
    group: root
    mode: '0644'
  become: true
  register: nginx_ssl_headers

# Auto-discover every service vhost template so adding a service is just a matter
# of dropping a conf.d/<service>.conf.j2 into this role — no edit here required.
- name: Discover service vhost templates
  ansible.builtin.find:
    paths: "{{ role_path }}/templates/conf.d"
    patterns: "*.conf.j2"
  delegate_to: localhost
  become: false
  register: nginx_conf_templates

- name: Deploy service configurations
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "/etc/nginx/conf.d/{{ item.path | basename | replace('.j2', '') }}"
    owner: root
    group: root
    mode: '0644'
  become: true
  loop: "{{ nginx_conf_templates.files | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: nginx_service_configs

# Prune vhost files left behind when a service template is removed from the role
# (e.g. the vhosts folded into 10-services.conf). We track exactly what the role
# deployed in a manifest and only remove files that WERE in our own previous
# manifest but no longer are — so a .conf placed in conf.d by anything other than
# this role is never touched (the old string-reconstruction approach pruned over
# every *.conf and could match unrelated files).
- name: Compute the set of vhost files this run manages
  ansible.builtin.set_fact:
    nginx_managed_vhosts: >-
      {{ nginx_conf_templates.files | map(attribute='path') | map('basename')
         | map('regex_replace', '\.j2$', '') | sort | list }}

- name: Read the previous managed-vhost manifest
  ansible.builtin.slurp:
    src: /etc/nginx/conf.d/.managed_vhosts
  become: true
  register: nginx_prev_manifest
  failed_when: false
  changed_when: false

- name: Remove vhost files this role previously managed but no longer does
  ansible.builtin.file:
    path: "/etc/nginx/conf.d/{{ item }}"
    state: absent
  become: true
  loop: >-
    {{ (nginx_prev_manifest.content | default('') | b64decode).splitlines()
       | map('trim') | select | difference(nginx_managed_vhosts) | list }}
  register: nginx_stale_removed

- name: Write the managed-vhost manifest
  ansible.builtin.copy:
    dest: /etc/nginx/conf.d/.managed_vhosts
    content: "{{ nginx_managed_vhosts | join('\n') + '\n' }}"
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Validate complete NGINX configuration
  ansible.builtin.command: nginx -t
  become: true
  changed_when: false

- name: Set configuration changed flag
  ansible.builtin.set_fact:
    nginx_config:
      changed: >-
        {{ nginx_main_config.changed or nginx_service_configs.changed
           or (nginx_ssl_headers.changed | default(false))
           or (nginx_stale_removed.changed | default(false)) }}

# Reload so config changes actually take effect. Only when already running:
# on a fresh host NGINX is started later (after AdGuard frees port 53), and
# `state: reloaded` would fail on a stopped unit.
- name: Check whether NGINX is already running
  ansible.builtin.systemd:
    name: nginx
  become: true
  register: nginx_runtime
  check_mode: false

- name: Reload NGINX to apply configuration changes
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  become: true
  when:
    - nginx_config.changed | bool
    - nginx_runtime.status.ActiveState == "active"

- name: Ensure NGINX can connect to network
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true
  become: true
  when: ansible_selinux.status == "enabled"
