---
- name: Install SELinux Python bindings
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name:
      - python3-libselinux
      - python3-policycoreutils
    state: present
  become: true

- name: Allow NGINX to connect to network
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true
  become: true
  when: ansible_facts['selinux'].status == "enabled"
