---
- name: Install NGINX
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name: nginx
    state: present
  become: true

- name: Ensure SSL directory exists
  ansible.builtin.file:
    path: /etc/pki/nginx
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

# Generamos siempre el cert self-signed en las rutas FIJAS nginx_selfsigned_*,
# nunca en nginx_ssl_certificate (que en modo letsencrypt resuelve a la ruta de
# lego). Esto garantiza que el fallback documentado `nginx_tls_mode: selfsigned`
# tenga un cert en disco aunque la emisión con lego nunca haya corrido o haya
# fallado. `creates:` lo mantiene idempotente.
# NOTA: este cert de piso no tiene ruta de renovación: `creates:` implica que se
# genera una sola vez y nunca se refresca. La vigencia de 10 años (3650d) es
# deliberadamente larga para que sobreviva al host; si llega a expirar, borrar el
# archivo y volver a correr.
- name: Generate self-signed SSL certificate (bootstrap floor)
  ansible.builtin.command:
    cmd: >
      openssl req -new -newkey rsa:4096 -days 3650 -nodes -x509
      -subj "/O=home-server (self-signed fallback)/CN={{ nginx_domain }}"
      -keyout {{ nginx_selfsigned_key }}
      -out {{ nginx_selfsigned_cert }}
    creates: "{{ nginx_selfsigned_cert }}"
  become: true
  when: nginx_generate_selfsigned_cert | bool
