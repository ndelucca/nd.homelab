---
# Install NGINX and generate self-signed certificates

- name: Install NGINX
  ansible.builtin.dnf:
    name: nginx
    state: present
  become: true

- name: Ensure SSL directory exists
  ansible.builtin.file:
    path: /etc/pki/nginx
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

# Always generate the self-signed cert at the FIXED nginx_selfsigned_* paths,
# never at nginx_ssl_certificate (which resolves to the lego path in letsencrypt
# mode). This guarantees the documented `nginx_tls_mode: selfsigned` fallback has
# a cert on disk even when lego issuance has never run or has failed. `creates:`
# keeps it idempotent.
- name: Generate self-signed SSL certificate (bootstrap floor)
  ansible.builtin.command:
    cmd: >
      openssl req -new -newkey rsa:4096 -days 3650 -nodes -x509
      -subj "/C=US/ST=State/L=City/O=Organization/CN={{ nginx_domain }}"
      -keyout {{ nginx_selfsigned_key }}
      -out {{ nginx_selfsigned_cert }}
    creates: "{{ nginx_selfsigned_cert }}"
  become: true
  when: nginx_generate_selfsigned_cert | bool
