---
# Default variables for NGINX reverse proxy role

# Domain configuration — host-specific, set the real value in host_vars.
# This neutral default is only a fallback for the self-signed cert CN.
nginx_domain: localhost

# SSL/TLS configuration
nginx_ssl_certificate: /etc/pki/nginx/server.crt
nginx_ssl_certificate_key: /etc/pki/nginx/server.key
nginx_generate_selfsigned_cert: true

# Shared TLS security-headers snippet, deployed by configure.yml and `include`d
# by every HTTPS vhost (standard + bespoke) so the headers live in one place.
nginx_ssl_headers_snippet: /etc/nginx/snippets/ssl_headers.conf

# Self-signed bootstrap floor. ALWAYS generated at these paths regardless of the
# active TLS mode (letsencrypt vs selfsigned), so switching to
# `nginx_tls_mode: selfsigned` has a real cert to fall back to if lego fails.
# group_vars overrides nginx_ssl_certificate to the lego path in letsencrypt mode;
# these two vars stay fixed so the floor never lands on the lego path.
nginx_selfsigned_cert: /etc/pki/nginx/server.crt
nginx_selfsigned_key: /etc/pki/nginx/server.key

# Backend service ports
nginx_adguard_port: 8081
nginx_filebrowser_port: 8080
nginx_jellyfin_port: 8096
nginx_cloud_torrent_port: 9091
nginx_cockpit_port: 9090
nginx_immich_port: 2283
nginx_kavita_port: 5000
nginx_orcaslicer_port: 3001
nginx_home_assistant_port: 8123
nginx_ndmarket_port: 28310
nginx_forgejo_port: 3000
nginx_uptime_kuma_port: 3011

# --- Reverse-proxy vhosts ---------------------------------------------------
# Standard vhosts rendered from this list by conf.d/10-services.conf.j2 (one
# HTTP->HTTPS redirect + one HTTPS server block each, shared cert + security
# headers + X-Forwarded-* set). The bespoke vhosts that need extra named
# locations or an exotic upstream (jellyfin /socket + CSP, cloud-torrent SSE,
# ndmarket SSE, orcaslicer https/no-http2) keep their own conf.d/*.conf.j2.
# Per-entry knobs:
#   subdomain         '' = apex ({{ nginx_domain }}), else <sub>.{{ nginx_domain }}
#   port              loopback upstream port
#   websocket         add Upgrade/Connection headers (default true)
#   forwarded_proto   X-Forwarded-Proto value (default $scheme)
#   client_max_body_size   optional upload cap
#   server_snippet    raw lines injected at server level (before location /)
#   location_snippet  raw lines injected inside location /
nginx_vhosts:
  - {subdomain: "", port: "{{ nginx_adguard_port }}"}
  - {subdomain: "adguard", port: "{{ nginx_adguard_port }}"}
  - {subdomain: "books", port: "{{ nginx_kavita_port }}"}
  - {subdomain: "git", port: "{{ nginx_forgejo_port }}", client_max_body_size: "0"}
  - {subdomain: "home", port: "{{ nginx_home_assistant_port }}"}
  - {subdomain: "status", port: "{{ nginx_uptime_kuma_port }}"}
  - {subdomain: "cockpit", port: "{{ nginx_cockpit_port }}", forwarded_proto: "https", location_snippet: "gzip off;"}
  - subdomain: "files"
    port: "{{ nginx_filebrowser_port }}"
    websocket: false
    client_max_body_size: "0"
    server_snippet: "proxy_request_buffering off;"
    location_snippet: "proxy_buffering off;"
  - subdomain: "gallery"
    port: "{{ nginx_immich_port }}"
    client_max_body_size: "50G"
    server_snippet: |-
      client_body_timeout 600s;
      proxy_read_timeout 600s;
    location_snippet: |-
      proxy_buffering off;
      proxy_request_buffering off;

# Firewall configuration
nginx_firewall_enabled: true
nginx_firewall_zone: FedoraServer

# SELinux configuration
nginx_manage_selinux: true
