---
# Variables por defecto del role de reverse proxy NGINX

# Configuración de dominio: específica del host, setear el valor real en host_vars.
# Este default neutro es solo un fallback para el CN del cert self-signed.
nginx_domain: localhost

# Configuración SSL/TLS
nginx_ssl_certificate: /etc/pki/nginx/server.crt
nginx_ssl_certificate_key: /etc/pki/nginx/server.key
nginx_generate_selfsigned_cert: true

# Snippet de headers de seguridad TLS compartido, desplegado por configure.yml e
# `include`-ado por cada vhost HTTPS (estándar y a medida) para que los headers
# vivan en un solo lugar.
nginx_ssl_headers_snippet: /etc/nginx/snippets/ssl_headers.conf

# Piso de bootstrap self-signed. Se genera SIEMPRE en estas rutas sin importar el
# modo TLS activo (letsencrypt vs selfsigned), así al cambiar a
# `nginx_tls_mode: selfsigned` hay un cert real al que recurrir si lego falla.
# group_vars sobrescribe nginx_ssl_certificate con la ruta de lego en modo
# letsencrypt; estas dos variables quedan fijas para que el piso nunca caiga en
# la ruta de lego.
nginx_selfsigned_cert: /etc/pki/nginx/server.crt
nginx_selfsigned_key: /etc/pki/nginx/server.key

# Puertos de los servicios backend
nginx_adguard_port: 8081
nginx_filebrowser_port: 8080
nginx_jellyfin_port: 8096
nginx_cloud_torrent_port: 9091
nginx_cockpit_port: 9090
nginx_immich_port: 2283
nginx_kavita_port: 5000
nginx_orcaslicer_port: 3001
nginx_home_assistant_port: 8123
nginx_forgejo_port: 3000
nginx_uptime_kuma_port: 3011

# Vhosts de reverse proxy renderizados desde esta lista por
# conf.d/10-services.conf.j2 (un redirect HTTP->HTTPS + un bloque server HTTPS
# cada uno, con cert compartido + headers de seguridad + X-Forwarded-*). Los
# vhosts a medida que necesitan locations nombradas extra o un upstream atípico
# (jellyfin /socket + CSP, cloud-torrent SSE, orcaslicer https/no-http2)
# conservan su propio conf.d/*.conf.j2.
# Parámetros por entrada:
#   subdomain         '' = apex ({{ nginx_domain }}), si no <sub>.{{ nginx_domain }}
#   port              puerto del upstream en loopback
#   websocket         agrega headers Upgrade/Connection (default true)
#   forwarded_proto   valor de X-Forwarded-Proto (default $scheme)
#   client_max_body_size   límite de subida opcional
#   server_snippet    líneas crudas inyectadas a nivel server (antes de location /)
#   location_snippet  líneas crudas inyectadas dentro de location /
nginx_vhosts:
  - {subdomain: "", port: "{{ nginx_adguard_port }}"}
  - {subdomain: "adguard", port: "{{ nginx_adguard_port }}"}
  - {subdomain: "books", port: "{{ nginx_kavita_port }}"}
  - {subdomain: "git", port: "{{ nginx_forgejo_port }}", client_max_body_size: "0"}
  - {subdomain: "home", port: "{{ nginx_home_assistant_port }}"}
  - {subdomain: "status", port: "{{ nginx_uptime_kuma_port }}"}
  - {subdomain: "cockpit", port: "{{ nginx_cockpit_port }}", forwarded_proto: "https", location_snippet: "gzip off;"}
  - subdomain: "files"
    port: "{{ nginx_filebrowser_port }}"
    websocket: false
    client_max_body_size: "0"
    server_snippet: "proxy_request_buffering off;"
    location_snippet: "proxy_buffering off;"
  - subdomain: "gallery"
    port: "{{ nginx_immich_port }}"
    client_max_body_size: "50G"
    server_snippet: |-
      client_body_timeout 600s;
      proxy_read_timeout 600s;
    location_snippet: |-
      proxy_buffering off;
      proxy_request_buffering off;

# Configuración del firewall
nginx_firewall_enabled: true
nginx_firewall_zone: FedoraServer

# Configuración de SELinux
nginx_manage_selinux: true
