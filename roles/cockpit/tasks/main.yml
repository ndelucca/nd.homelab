---
# Tareas principales del role Cockpit

- name: Install Podman packages
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name: "{{ cockpit_podman_packages }}"
    state: present
  become: true

- name: Install Cockpit packages
  vars:
    mitogen_task_isolation: fork  # Mitogen: aísla el módulo dnf5 en un fork (evita el crash por el estado global de libdnf5)
  ansible.builtin.dnf:
    name: "{{ cockpit_packages }}"
    state: present
  become: true
  notify: Restart cockpit

- name: Create Cockpit configuration directory
  ansible.builtin.file:
    path: /etc/cockpit
    state: directory
    mode: '0755'
  become: true

- name: Deploy Cockpit reverse proxy configuration
  ansible.builtin.template:
    src: cockpit.conf.j2
    dest: /etc/cockpit/cockpit.conf
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Restart cockpit socket

- name: Create cockpit.socket drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/cockpit.socket.d
    state: directory
    mode: '0755'
  become: true

- name: Bind cockpit.socket to localhost (reachable only via NGINX)
  ansible.builtin.template:
    src: cockpit-socket-override.conf.j2
    dest: /etc/systemd/system/cockpit.socket.d/override.conf
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Restart cockpit socket

- name: Enable and start Cockpit socket
  ansible.builtin.systemd:
    name: "{{ cockpit_service_name }}"
    enabled: "{{ cockpit_service_enabled }}"
    state: "{{ cockpit_service_state }}"
    daemon_reload: true
  become: true

- name: Enable and start Podman socket (for API access)
  ansible.builtin.systemd:
    name: podman.socket
    enabled: "{{ cockpit_podman_enable_socket }}"
    state: "{{ 'started' if cockpit_podman_enable_socket else 'stopped' }}"
    daemon_reload: true
  become: true

- name: Configure Podman for rootless operation
  ansible.builtin.command: loginctl enable-linger {{ ansible_user }}
  args:
    creates: /var/lib/systemd/linger/{{ ansible_user }}
  become: true

- name: Display Podman version
  ansible.builtin.command: podman --version
  register: cockpit_podman_version_check
  changed_when: false
  check_mode: false  # solo lectura; corre en --check para mostrar la versión con exactitud

- name: Show installed Podman version
  ansible.builtin.debug:
    msg: "Installed {{ cockpit_podman_version_check.stdout }}"
