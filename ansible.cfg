[defaults]
inventory = ./inventory

collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections

forks = 5

# --- Mitogen (descomentar las 2 líneas para activar; comentar para volver a vanilla) ---
# Acelera la ejecución multiplexando Python sobre una sola conexión SSH por host.
# Vendorizado en vendor/ (ver vendor/README.md). Estrategias: mitogen_linear | mitogen_free | mitogen_host_pinned.
# strategy_plugins = ./vendor/mitogen-0.3.50/ansible_mitogen/plugins/strategy
# strategy = mitogen_linear

gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

host_key_checking = False
# Identidad de conexión por defecto. El inventario define ansible_user por host
# (todos ndelucca); esto lo replica para que los comandos ad-hoc se comporten igual.
remote_user = ndelucca
private_key_file = ~/.ssh/id_ed25519

become = True
become_method = sudo
become_user = root
become_ask_pass = False

stdout_callback = default
result_format = yaml
callbacks_enabled = ansible.posix.profile_tasks, ansible.posix.timer
nocows = 1
display_skipped_hosts = False
display_ok_hosts = True

interpreter_python = auto_silent

roles_path = ./roles:~/.ansible/roles:/usr/share/ansible/roles

retry_files_enabled = False

# Ejecuta los handlers notificados aunque una tarea posterior del mismo play falle.
# Sin esto, una falla entre el cambio de un unit notificado y su flush_handlers deja
# el unit nuevo en disco con el viejo todavía cargado (los roles de contenedores
# despliegan vía Quadlet + flush_handlers a mitad del rol).
force_handlers = True

private_role_vars = True
allow_world_readable_tmpfiles = False
no_target_syslog = True
module_set_locale = True
command_warnings = True
vault_password_file = ./.vault_pass

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ForwardAgent=yes
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
