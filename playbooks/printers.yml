---
# TLS para la Pi con MainsailOS (impresora 3D): emite su propio certificado real
# vía el challenge ACME DNS-01 (deSEC) y sirve la UI de Mainsail sobre HTTPS.
#
# DNS-01 solo crea un registro TXT mediante la API de deSEC, así que nada queda
# expuesto a internet y la Pi no depende del servidor Fedora.
#
# SIEMPRE limitar a la impresora; nunca al servidor Fedora:
#   ansible-playbook playbooks/printers.yml -l ndelucca-raspberry-printer
#   ansible-playbook playbooks/printers.yml -l ndelucca-raspberry-printer --tags acme
#   ansible-playbook playbooks/printers.yml -l ndelucca-raspberry-printer --check

- name: Configure HTTPS on the MainsailOS printer
  hosts: printers
  gather_facts: true

  roles:
    # Emitir el cert primero para que mainsail_tls lo encuentre en disco.
    - role: acme
      tags: ['acme', 'tls']
      when: acme_enabled | default(false) | bool

    - role: mainsail_tls
      tags: ['mainsail_tls', 'tls']
