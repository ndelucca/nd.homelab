---
# Playbook de gestión de /etc/hosts.
# Uso: ansible-playbook playbooks/hosts.yml -e local_host=ndelucca-acer
#
# La variable local_host debe coincidir con el hostname de inventario de la
# máquina desde la que corrés. Ese host usará connection: local (sin SSH).

# Actualizar /etc/hosts en la máquina local (no requiere SSH).
- name: Manage /etc/hosts on local machine
  hosts: "{{ local_host | default('none') }}"
  connection: local
  gather_facts: true
  become: true

  tasks:
    - name: Add inventory hosts to /etc/hosts (local connection)
      ansible.builtin.blockinfile:
        path: /etc/hosts
        block: |
          192.168.10.1 ndelucca-router
          {% for host in groups['all'] %}
          {{ hostvars[host]['ansible_host'] }} {{ host }}
          {% endfor %}
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Inventory Hosts"
        backup: true
        create: false
        state: present

# Actualizar /etc/hosts en los hosts remotos (vía SSH).
- name: Manage /etc/hosts on remote hosts
  hosts: all:!{{ local_host | default('none') }}
  gather_facts: true
  become: true

  tasks:
    - name: Add inventory hosts to /etc/hosts (SSH connection)
      ansible.builtin.blockinfile:
        path: /etc/hosts
        block: |
          192.168.10.1 ndelucca-router
          {% for host in groups['all'] %}
          {{ hostvars[host]['ansible_host'] }} {{ host }}
          {% endfor %}
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Inventory Hosts"
        backup: true
        create: false
        state: present
