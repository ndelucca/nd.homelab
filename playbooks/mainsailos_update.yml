---
# Safely update the MainsailOS 3D-printer Pi.
#
# Updates the Klipper stack (klipper, moonraker, mainsail, crowsnest) through
# Moonraker's update API - the same thing the Mainsail "Update" button does -
# plus the Debian OS packages. Backs up printer_data first, never reinstalls,
# never flashes the MCU, and aborts mid-print.
#
# ALWAYS limit to the printer; never the Fedora server.
#
# Usage:
#   ansible-playbook playbooks/mainsailos_update.yml -l ndelucca-raspberry-printer
#   ansible-playbook playbooks/mainsailos_update.yml -l ndelucca-raspberry-printer --check
#   ansible-playbook playbooks/mainsailos_update.yml -l ndelucca-raspberry-printer --tags backup
#   ansible-playbook playbooks/mainsailos_update.yml -l ndelucca-raspberry-printer \
#       -e mainsailos_reboot_if_required=false   # warn instead of auto-reboot

- name: Update MainsailOS printer
  hosts: printers
  gather_facts: true

  roles:
    - role: mainsailos_update
      tags: ['mainsailos', 'printer', 'update']
