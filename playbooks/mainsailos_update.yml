---
# Actualizar de forma segura la Pi con MainsailOS (impresora 3D).
#
# Actualiza el stack de Klipper (klipper, moonraker, mainsail, crowsnest) a través
# de la API de actualización de Moonraker — lo mismo que hace el botón "Update" de
# Mainsail — más los paquetes del SO Debian. Primero hace backup de printer_data,
# nunca reinstala, nunca flashea el MCU y aborta si hay una impresión en curso.
#
# SIEMPRE limitar a la impresora; nunca al servidor Fedora.
#
# Uso:
#   ansible-playbook playbooks/mainsailos_update.yml -l ndelucca-raspberry-printer
#   ansible-playbook playbooks/mainsailos_update.yml -l ndelucca-raspberry-printer --check
#   ansible-playbook playbooks/mainsailos_update.yml -l ndelucca-raspberry-printer --tags backup
#   ansible-playbook playbooks/mainsailos_update.yml -l ndelucca-raspberry-printer \
#       -e mainsailos_reboot_if_required=false   # avisar en vez de auto-reiniciar

- name: Update MainsailOS printer
  hosts: printers
  gather_facts: true

  roles:
    - role: mainsailos_update
      tags: ['mainsailos', 'printer', 'update']
