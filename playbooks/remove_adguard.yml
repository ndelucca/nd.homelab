---
# Playbook para remover AdGuard Home instalado como binario nativo.
#
# Uso: ansible-playbook playbooks/remove_adguard.yml

- name: Remove AdGuard Home (native binary)
  hosts: homeservers
  become: true

  vars:
    # Replicar las variables del rol.
    adguard_service_name: AdGuardHome
    adguard_install_dir: /usr/local/bin
    adguard_working_dir: /opt/AdGuardHome
    adguard_user: adguard
    adguard_group: adguard
    adguard_firewall_zone: public

    remove_data: true  # Poner en false para conservar configuración y datos

  tasks:
    - name: Check if AdGuard Home binary exists
      ansible.builtin.stat:
        path: "{{ adguard_install_dir }}/AdGuardHome"
      register: adguard_binary

    - name: Stop AdGuard Home service
      ansible.builtin.systemd:
        name: "{{ adguard_service_name }}"
        state: stopped
      failed_when: false
      when: adguard_binary.stat.exists

    - name: Uninstall AdGuard Home service
      ansible.builtin.command: "{{ adguard_install_dir }}/AdGuardHome -s uninstall"
      failed_when: false
      when: adguard_binary.stat.exists
      register: uninstall_result

    - name: Reload systemd after service removal
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Remove AdGuard Home binary
      ansible.builtin.file:
        path: "{{ adguard_install_dir }}/AdGuardHome"
        state: absent

    - name: Remove working directory
      ansible.builtin.file:
        path: "{{ adguard_working_dir }}"
        state: absent
      when: remove_data | bool

    - name: Remove AdGuard Home user
      ansible.builtin.user:
        name: "{{ adguard_user }}"
        state: absent
        remove: true

    - name: Remove firewall rules for AdGuard Home
      ansible.posix.firewalld:
        zone: "{{ adguard_firewall_zone }}"
        port: "{{ item }}"
        permanent: true
        immediate: true
        state: disabled
      loop:
        - 3000/tcp  # UI web (setup inicial)
        - 80/tcp    # UI web (interfaz de admin)
        - 53/tcp    # DNS
        - 53/udp    # DNS
        - 853/tcp   # DNS-over-TLS
        - 853/udp   # DNS-over-QUIC
        - 443/tcp   # DNS-over-HTTPS
      failed_when: false

    - name: Remove DHCP service from firewall
      ansible.posix.firewalld:
        zone: "{{ adguard_firewall_zone }}"
        service: dhcp
        permanent: true
        immediate: true
        state: disabled
      failed_when: false

    - name: Check if systemd-resolved stub listener was disabled
      ansible.builtin.stat:
        path: /etc/systemd/resolved.conf.d/adguardhome.conf
      register: resolved_config

    - name: Remove systemd-resolved configuration
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d/adguardhome.conf
        state: absent
      when: resolved_config.stat.exists
      notify: restart systemd-resolved

    - name: Remove SELinux file contexts for AdGuard Home
      community.general.sefcontext:
        target: "{{ item }}"
        state: absent
      loop:
        - "{{ adguard_install_dir }}/AdGuardHome"
        - "{{ adguard_working_dir }}(/.*)?"
      failed_when: false

    # El rol service_maintenance despliega un watchdog de arranque en frío para
    # AdGuard y un drop-in de espera de red. Hay que desmontarlos también, o
    # seguirán disparándose y registrando fallas al intentar reiniciar un servicio
    # que ya no existe.
    - name: Stop and disable the AdGuard service watchdog timer
      ansible.builtin.systemd:
        name: service-watchdog.timer
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove the service watchdog units and the AdGuard drop-in
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/service-watchdog.timer
        - /etc/systemd/system/service-watchdog.service
        - /etc/systemd/system/AdGuardHome.service.d

    - name: Reload systemd after watchdog removal
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          AdGuard Home (native binary) has been removed.

          Binary removed: {{ adguard_install_dir }}/AdGuardHome
          User removed: {{ adguard_user }}
          Data removed: {{ remove_data }}

          {% if not remove_data %}
          Configuration and data preserved in:
          - {{ adguard_working_dir }}
          {% endif %}

          If systemd-resolved was disabled, it will be restarted.
          You may need to manually reconfigure DNS settings.

  handlers:
    - name: restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted
