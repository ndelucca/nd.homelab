---
# Helper de actualización a demanda.
#
# Las imágenes de contenedor ahora están FIJADAS en los defaults de cada rol
# (immich_version, home_assistant_version, monitoring_version, digest de
# kavita_image, forgejo_version, orcaslicer_image, ...). Las actualizaciones son
# deliberadas y quedan registradas en git:
#
#   1. Subir la variable de versión/digest en roles/<app>/defaults/main.yml
#   2. Re-correr el rol:  ansible-playbook playbooks/site.yml -l ndelucca-server --tags <app>
#
# Este playbook solo REPORTA si existen imágenes más nuevas upstream (un dry-run);
# no muta nada, porque se removió AutoUpdate=registry para mantener reproducibles
# las versiones desplegadas.
#
# Los binarios nativos (FileBrowser, AdGuard Home) se auto-actualizan al último
# release en una corrida normal de site.yml (verificado por checksum), así que no
# se cubren acá.
#
# Uso:
#   ansible-playbook playbooks/update.yml -l ndelucca-server
#
# ADVERTENCIA: Immich corre migraciones de DB irreversibles al arrancar. Hacé
# backup de su base de datos antes de un salto grande de versión (ver README /
# docs/RESTORE.md).

- name: Report available container image updates (read-only)
  hosts: homeservers
  gather_facts: true

  vars:
    # uid del usuario dueño de los contenedores rootless (ndelucca = 1000). Se usa el valor
    # canónico pinneado (storage.yml), NO ansible_user_uid: el setup corre bajo become=root
    # (become=True global), así que ansible_user_uid resolvería a 0 y apuntaría a /run/user/0.
    podman_user_uid: "{{ app_storage_uid }}"

  tasks:
    - name: Check upstream for newer images (dry-run; no changes made)
      ansible.builtin.command: podman auto-update --dry-run
      # Los contenedores rootless pertenecen al usuario de servicio sin privilegios,
      # no a root. ansible.cfg pone become=True de forma global; se sobrescribe acá
      # para que el comando corra en el contexto de usuario/runtime correcto.
      become: false
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ podman_user_uid }}"
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ podman_user_uid }}/bus"
      register: podman_auto_update_dryrun
      changed_when: false

    - name: Report image-update status
      ansible.builtin.debug:
        msg: >-
          {{ podman_auto_update_dryrun.stdout_lines
             | default(['Images are pinned; bump the version var in the role and re-run to upgrade.']) }}
