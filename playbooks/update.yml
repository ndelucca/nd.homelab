---
# On-demand update helper.
#
# Container images are now PINNED in each role's defaults (immich_version,
# home_assistant_version, monitoring_version, kavita_image digest, forgejo_version,
# orcaslicer_image, ...). Updates are deliberate and tracked in git:
#
#   1. Bump the version/digest var in roles/<app>/defaults/main.yml
#   2. Re-run the role:  ansible-playbook playbooks/site.yml -l ndelucca-server --tags <app>
#
# This playbook only REPORTS whether newer images exist upstream (a dry-run); it
# does not mutate anything, because AutoUpdate=registry was removed to keep the
# deployed versions reproducible.
#
# Native binaries (FileBrowser, AdGuard Home) self-update to the newest release
# on a normal site.yml run (checksum-verified), so they are not covered here.
#
# Usage:
#   ansible-playbook playbooks/update.yml -l ndelucca-server
#
# WARNING: Immich runs irreversible DB migrations on start. Back up its
# database before a big version jump (see README / docs/RESTORE.md).

- name: Report available container image updates (read-only)
  hosts: homeservers
  gather_facts: true

  vars:
    # uid of the user that owns the rootless containers (ndelucca = 1000)
    podman_user_uid: "{{ ansible_user_uid | default(1000) }}"

  tasks:
    - name: Check upstream for newer images (dry-run; no changes made)
      ansible.builtin.command: podman auto-update --dry-run
      # Rootless containers belong to the unprivileged service user, not root.
      # ansible.cfg sets become=True globally; override it here so the command
      # runs in the right user/runtime context.
      become: false
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ podman_user_uid }}"
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ podman_user_uid }}/bus"
      register: podman_auto_update_dryrun
      changed_when: false

    - name: Report image-update status
      ansible.builtin.debug:
        msg: >-
          {{ podman_auto_update_dryrun.stdout_lines
             | default(['Images are pinned; bump the version var in the role and re-run to upgrade.']) }}
