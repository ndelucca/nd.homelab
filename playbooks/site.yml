---
# Playbook principal de orquestación del home server.
# Uso: ansible-playbook playbooks/site.yml

- name: Configure home servers
  hosts: homeservers
  gather_facts: true

  roles:
    - role: storage
      tags: ['storage', 'disks']

    - role: cockpit
      tags: ['cockpit', 'monitoring']

    # Emitir el cert wildcard real ANTES de nginx: `nginx -t` valida los vhosts y
    # requiere que el archivo ssl_certificate configurado ya exista en disco.
    - role: acme
      tags: ['acme', 'tls']
      when: acme_enabled | default(false) | bool

    - role: nginx
      tags: ['nginx', 'proxy']

    - role: adguard
      tags: ['adguard', 'dns']

    - role: filebrowser
      tags: ['filebrowser', 'files']

    - role: jellyfin
      tags: ['jellyfin', 'media']

    - role: cloud_torrent
      tags: ['cloud_torrent', 'torrent', 'media']

    - role: immich
      tags: ['immich', 'photos']

    - role: kavita
      tags: ['kavita', 'books', 'reading']

    - role: orcaslicer
      tags: ['orcaslicer', '3dprint', 'slicer']

    - role: home_assistant
      tags: ['home_assistant', 'automation', 'smart-home']

    - role: forgejo
      tags: ['forgejo', 'git', 'vcs']

    # Después de forgejo: el runner toma su token de registro de la CLI del contenedor
    # de Forgejo, que debe estar arriba.
    - role: forgejo_runner
      tags: ['forgejo_runner', 'actions', 'ci']
      when: forgejo_runner_enabled | default(false) | bool

    # Canal de deploy (forced-command) que usan los workflows para reiniciar apps.
    - role: deploy_ssh
      tags: ['deploy_ssh', 'actions', 'ci']
      when: deploy_ssh_enabled | default(false) | bool

    # App buildeada/deployada por Forgejo Actions (repo git.<dom>/ndelucca/nd.market).
    - role: nd_market
      tags: ['nd_market', 'market']

    - role: monitoring
      tags: ['monitoring', 'uptime-kuma']

    - role: backup
      tags: ['backup', 'restic']

    - role: service_maintenance
      tags: ['service_maintenance', 'watchdog']

    - role: firewall
      tags: ['firewall']
      when: firewall_enabled | default(true)

  post_tasks:
    # Arrancar NGINX al final, después de que AdGuard esté configurado y haya
    # liberado/reasignado sus puertos. El rol nginx solo HABILITA el unit;
    # arrancarlo acá mantiene el orden explícito a nivel de orquestación en lugar
    # de enterrarlo en un handler de AdGuard de otro rol. Sin ignore_errors — un
    # NGINX roto debe hacerse visible.
    - name: Ensure NGINX is running
      ansible.builtin.systemd:
        name: nginx
        state: started
      become: true
      tags: ['nginx', 'proxy']
