---
# Main orchestration playbook for home server setup
# Usage: ansible-playbook playbooks/site.yml

- name: Configure home servers
  hosts: homeservers
  gather_facts: true

  roles:
    - role: storage
      tags: ['storage', 'disks']

    - role: cockpit
      tags: ['cockpit', 'monitoring']

    # Issue the real wildcard cert BEFORE nginx: `nginx -t` validates the vhosts
    # and requires the configured ssl_certificate file to already exist on disk.
    - role: acme
      tags: ['acme', 'tls']
      when: acme_enabled | default(false) | bool

    - role: nginx
      tags: ['nginx', 'proxy']

    - role: adguard_home
      tags: ['adguard', 'dns']

    - role: filebrowser
      tags: ['filebrowser', 'files']

    - role: jellyfin
      tags: ['jellyfin', 'media']

    - role: cloud_torrent
      tags: ['cloud-torrent', 'torrent', 'media']

    - role: immich
      tags: ['immich', 'photos']

    - role: kavita
      tags: ['kavita', 'books', 'reading']

    - role: orcaslicer
      tags: ['orcaslicer', '3dprint', 'slicer']

    - role: home_assistant
      tags: ['home_assistant', 'automation', 'smart-home']

    - role: forgejo
      tags: ['forgejo', 'git', 'vcs']

    - role: monitoring
      tags: ['monitoring', 'uptime-kuma']

    - role: backup
      tags: ['backup', 'restic']

    - role: service_maintenance
      tags: ['service_maintenance', 'watchdog']

    - role: firewall
      tags: ['firewall']
      when: firewall_enabled | default(true)
